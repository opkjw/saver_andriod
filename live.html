<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>모야모야 - 우리아이 야구기록</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}

    .topbar{background:#0f172a;border-bottom:1px solid rgba(255,255,255,0.08);padding:7px 20px;display:flex;align-items:center;justify-content:center;gap:7px;position:sticky;top:0;z-index:11}
    .topbar-icon{width:18px;height:18px;border-radius:5px;object-fit:cover}
    .topbar-title{font-size:12px;color:#64748b;font-weight:600;letter-spacing:0.2px}
    .hdr{background:linear-gradient(135deg,#1e3a8a,#1e40af);padding:14px 20px 12px;position:sticky;top:33px;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .live-badge{background:#ef4444;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:1px;animation:blink 1.5s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
    .team-lbl{font-size:13px;color:#93c5fd;font-weight:600}
    .score-row{display:flex;align-items:center;justify-content:center;gap:14px;margin:8px 0 6px}
    .score-team{text-align:center;flex:1}
    .score-team-name{font-size:12px;color:#93c5fd;margin-bottom:2px}
    .score-num{font-size:52px;font-weight:800;color:#fff;line-height:1}
    .vs-icon-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
    .vs-icon-img{width:54px;height:54px;border-radius:16px;object-fit:cover;box-shadow:0 3px 16px rgba(0,0,0,0.55),0 0 0 2px rgba(255,255,255,0.18)}
    .vs-icon-lbl{font-size:12px;color:#ef4444;font-weight:800;letter-spacing:1.5px;text-shadow:0 0 8px rgba(239,68,68,0.5)}
    .chips{display:flex;justify-content:center;gap:10px;margin-top:8px;flex-wrap:wrap}
    .chip{border-radius:20px;padding:4px 14px;font-size:13px;font-weight:700}
    .chip-inn{background:rgba(59,130,246,0.25);color:#93c5fd}
    .chip-out{background:rgba(239,68,68,0.25);color:#fca5a5}

    /* 베이스 다이아몬드 */
    .diamond-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0 8px;gap:6px}
    .diamond{position:relative;width:120px;height:120px}
    .base{position:absolute;width:32px;height:32px;transform:rotate(45deg);background:#1e293b;border:2px solid #334155;border-radius:4px;transition:all 0.25s}
    .base.on{background:#22c55e;border-color:#16a34a;box-shadow:0 0 14px rgba(34,197,94,0.6)}
    .b2{top:2px;left:50%;transform:translateX(-50%) rotate(45deg)}
    .b3{top:50%;left:2px;transform:translateY(-50%) rotate(45deg)}
    .b1{top:50%;right:2px;transform:translateY(-50%) rotate(45deg)}
    .home-base{bottom:2px;left:50%;transform:translateX(-50%) rotate(45deg);position:absolute;width:32px;height:32px;background:#1e293b;border:2px solid #475569;border-radius:4px}
    .out-dots{display:flex;gap:8px}
    .out-dot{width:14px;height:14px;border-radius:50%;background:#1e293b;border:2px solid #334155;transition:all 0.25s}
    .out-dot.on{background:#ef4444;border-color:#dc2626;box-shadow:0 0 8px rgba(239,68,68,0.5)}

    /* 라이브 기록 */
    .section{padding:0 16px;margin-top:14px;margin-bottom:30px}
    .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .sec-title{font-size:10px;font-weight:700;color:#475569;letter-spacing:1.5px}
    .inn-badge{font-size:11px;font-weight:700;color:#60a5fa;background:rgba(59,130,246,0.15);padding:2px 10px;border-radius:10px}

    .live-list{display:flex;flex-direction:column;gap:6px}
    .live-item{background:#1e293b;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px}
    .type-badge{font-size:10px;font-weight:800;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .type-bat{background:rgba(34,197,94,0.2);color:#4ade80}
    .type-pit{background:rgba(59,130,246,0.2);color:#60a5fa}
    .live-player{font-size:14px;font-weight:600;color:#cbd5e1;flex:1}
    .live-oc{font-size:13px;font-weight:700;padding:3px 10px;border-radius:8px}
    .oc-hit{background:rgba(34,197,94,0.2);color:#4ade80}
    .oc-out{background:rgba(239,68,68,0.15);color:#f87171}
    .oc-bb{background:rgba(59,130,246,0.2);color:#60a5fa}
    .live-extra{font-size:11px;color:#64748b;min-width:38px;text-align:right;white-space:nowrap}

    /* 투수 카드 */
    .pit-card{background:#1e293b;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin:0 16px}
    .jersey{width:40px;height:40px;border-radius:50%;background:#1e3a8a;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#93c5fd;flex-shrink:0}
    .pinfo{flex:1}
    .pname{font-size:17px;font-weight:700}
    .psub{font-size:12px;color:#64748b;margin-top:2px}

    .divider{height:1px;background:#1e293b;margin:14px 0}
    .waiting{text-align:center;padding:20px;color:#475569;font-size:13px}

    .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:12px;color:#64748b;padding:24px;text-align:center}
    .spinner{width:36px;height:36px;border:3px solid #1e293b;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="loading" class="center">
  <div class="spinner"></div>
  <div>경기 정보 불러오는 중...</div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <img src="moya_icon.png" class="topbar-icon" alt="">
    <span class="topbar-title">모야모야 · 우리아이 야구기록</span>
  </div>
  <div class="hdr">
    <div class="hdr-top">
      <span class="live-badge" id="live-badge">LIVE</span>
      <span class="team-lbl" id="team-name">모야모야</span>
    </div>
    <div class="score-row">
      <div class="score-team">
        <div class="score-team-name">우리팀</div>
        <div class="score-num" id="my-score">0</div>
      </div>
      <div class="vs-icon-wrap">
        <img src="moya_icon.png" class="vs-icon-img" alt="모야모야">
        <div class="vs-icon-lbl">VS</div>
      </div>
      <div class="score-team">
        <div class="score-team-name" id="opp-name">상대팀</div>
        <div class="score-num" id="opp-score">0</div>
      </div>
    </div>
    <div class="chips">
      <span class="chip chip-inn" id="chip-inn">-회 -</span>
      <span class="chip chip-out" id="chip-out">0아웃</span>
    </div>
  </div>

  <!-- 라이브 전용 영역 (종료 시 숨김) -->
  <div id="live-state">
    <!-- 베이스 다이아몬드 -->
    <div class="diamond-wrap">
      <div class="diamond">
        <div class="base b2" id="b2"></div>
        <div class="base b3" id="b3"></div>
        <div class="base b1" id="b1"></div>
        <div class="home-base"></div>
      </div>
      <div class="out-dots">
        <div class="out-dot" id="od1"></div>
        <div class="out-dot" id="od2"></div>
        <div class="out-dot" id="od3"></div>
      </div>
    </div>

    <!-- 현재 투수 -->
    <div style="margin-top:14px">
      <div style="font-size:10px;font-weight:700;color:#475569;letter-spacing:1.5px;padding:0 16px;margin-bottom:6px">현재 투수</div>
      <div class="pit-card">
        <div class="jersey" id="pit-no">-</div>
        <div class="pinfo">
          <div class="pname" id="pit-name">대기 중</div>
          <div class="psub" id="pit-sub"></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 이번 이닝 라이브 기록 -->
    <div class="section">
      <div class="sec-hdr">
        <span class="sec-title">이번 이닝 라이브 기록</span>
        <span class="inn-badge" id="inn-badge"></span>
      </div>
      <div id="live-list" class="live-list">
        <div class="waiting">기록 대기 중...</div>
      </div>
    </div>
  </div>

  <!-- 경기 종료 메시지 -->
  <div id="ended-view" style="display:none;text-align:center;padding:40px 20px">
    <div style="font-size:48px;margin-bottom:16px">⚾</div>
    <div style="font-size:20px;font-weight:800;color:#f1f5f9;margin-bottom:8px">경기 종료</div>
    <div style="font-size:14px;color:#64748b">수고하셨습니다!</div>
  </div>
</div>

<div id="err-view" style="display:none">
  <div class="center">
    <div style="font-size:40px">⚾</div>
    <div id="err-msg" style="color:#f87171;font-size:15px;font-weight:600"></div>
    <div id="err-sub" style="font-size:13px;margin-top:4px"></div>
  </div>
</div>

<script>
var SURL = 'https://urtcsfgcjqognbxzqgnb.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVydGNzZmdjanFvZ25ieHpxZ25iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTAxNzQsImV4cCI6MjA5NDc2NjE3NH0.Ypb6cUFbL-MDkseuGby-sOH74SAyyoV0ToIDaE8Ur0E';

var params   = new URLSearchParams(location.search);
var teamCode = (params.get('code')||'').toUpperCase();
var teamId   = params.get('team')||'';

var sb, players=[], batLogs=[], pitRuns=[], liveLog=[], gameState={}, currentGame=null;
var prevHalfKey = null; // 'inning.topBot' — 변경 시 liveLog 초기화

function el(id){return document.getElementById(id);}
function showEl(id){el(id).style.display='';}
function hideEl(id){el(id).style.display='none';}

var OC_LABEL={'1B':'단타','2B':'2루타','3B':'3루타','HR':'홈런','K':'삼진','BB':'볼넷','GO':'땅볼','FO':'플라이','DP':'병살','HBP':'몸맞','SF':'희플','SH':'희번','FC':'야선','E':'실책','W':'볼넷','IBB':'고의4구'};
function ocLabel(oc){return OC_LABEL[oc]||oc;}
function ocClass(oc){
  if(['1B','2B','3B','HR'].indexOf(oc)>-1)return 'oc-hit';
  if(oc==='BB'||oc==='HBP'||oc==='W'||oc==='IBB')return 'oc-bb';
  return 'oc-out';
}
function playerOf(no){return players.find(function(p){return p.no===Number(no)||p.no===no;})||null;}

function myScore(){return batLogs.reduce(function(s,e){return s+(e.run||0);},0);}
function oppScore(){return pitRuns.reduce(function(s,e){return s+(e.earned||0);},0);}

function renderState(){
  var gs=gameState, g=currentGame;
  if(!g) return;

  hideEl('loading'); hideEl('err-view'); showEl('app');

  // 점수 (bat_log.run 합계 / pit_runs.earned 합계)
  el('my-score').textContent  = myScore();
  el('opp-score').textContent = oppScore();
  el('opp-name').textContent  = g.opponent||'상대팀';

  // LIVE 배지 / 종료 분기
  var isLive = g.status==='active'||g.status==='live';
  el('live-badge').textContent       = isLive?'LIVE':'종료';
  el('live-badge').style.background  = isLive?'#ef4444':'#475569';
  el('live-badge').style.animation   = isLive?'blink 1.5s infinite':'none';

  if(!isLive){
    el('chip-inn').textContent = '경기 종료';
    el('chip-inn').style.background = 'rgba(100,116,139,0.25)';
    el('chip-inn').style.color = '#94a3b8';
    hideEl('chip-out');
    hideEl('live-state');
    showEl('ended-view');
    return;
  }

  showEl('chip-out');
  showEl('live-state');
  hideEl('ended-view');
  el('chip-inn').style.background = '';
  el('chip-inn').style.color = '';

  // 이닝/아웃
  var inn  = gs.inning||'-';
  var half = gs.topBot==='bot'?'말':(gs.topBot==='top'?'초':'-');
  var outs = typeof gs.outs==='number'?gs.outs:'-';
  el('chip-inn').textContent = inn+'회 '+half;
  el('chip-out').textContent = outs+'아웃';
  el('inn-badge').textContent = (gs.inning?gs.inning+'회 '+half:'');

  // 아웃 도트
  for(var i=1;i<=3;i++){
    var dot=el('od'+i);
    dot.className='out-dot'+(typeof gs.outs==='number'&&gs.outs>=i?' on':'');
  }

  // 베이스
  var bases=gs.bases||{b1:null,b2:null,b3:null};
  el('b1').className='base b1'+(bases.b1!=null?' on':'');
  el('b2').className='base b2'+(bases.b2!=null?' on':'');
  el('b3').className='base b3'+(bases.b3!=null?' on':'');

  // 현재 투수
  var pitNo=gs.curPit;
  var pit=pitNo!=null?playerOf(pitNo):null;
  el('pit-no').textContent  = pitNo!=null?('#'+pitNo):'-';
  el('pit-name').textContent= pit?pit.name:'대기 중';
  el('pit-sub').textContent = pit?(pit.pos||'투수'):'';

  // 라이브 기록 목록
  if(liveLog.length===0){
    el('live-list').innerHTML='<div class="waiting">이번 이닝 기록 대기 중...</div>';
  }else{
    el('live-list').innerHTML=liveLog.slice().reverse().map(function(e){
      var p=playerOf(e.player_no);
      var name=p?(p.name+' #'+e.player_no):('#'+e.player_no);
      var typeBadge=e.type==='bat'
        ?'<div class="type-badge type-bat">타</div>'
        :'<div class="type-badge type-pit">투</div>';
      var extra='';
      if(e.type==='bat'){
        if(e.rbi>0)extra+=e.rbi+'타점 ';
        if(e.run>0)extra+=e.run+'득점';
        if(e.sb>0)extra+='도루';
      }
      return '<div class="live-item">'
        +typeBadge
        +'<div class="live-player">'+name+'</div>'
        +'<div class="live-oc '+ocClass(e.oc)+'">'+ocLabel(e.oc)+'</div>'
        +'<div class="live-extra">'+extra.trim()+'</div>'
        +'</div>';
    }).join('');
  }
}

function halfKey(inning, topBot){
  return (inning||0)+'.'+(topBot||'');
}

function applyBroadcast(payload){
  if(!payload)return;

  // 경기 종료 브로드캐스트
  if(payload.endGame&&currentGame&&payload.endGame===currentGame.id){
    currentGame.status='ended';
    renderState();
    return;
  }

  // 이닝/초말 변경 감지 → liveLog 초기화
  var newInning = payload.inning!=null?payload.inning:gameState.inning;
  var newTopBot = payload.topBot!=null?payload.topBot:gameState.topBot;
  var newKey = halfKey(newInning, newTopBot);
  if(prevHalfKey!==null && prevHalfKey!==newKey){
    liveLog=[];
  }
  if(newInning!=null) gameState.inning=newInning;
  if(newTopBot!=null) gameState.topBot=newTopBot;
  prevHalfKey=newKey;

  if(typeof payload.outs==='number') gameState.outs=payload.outs;
  if(payload.bases)                  gameState.bases=payload.bases;
  if('curPit' in payload)            gameState.curPit=payload.curPit;

  // 타석 엔트리 → batLogs + liveLog
  if(payload.batEntry){
    var be=payload.batEntry;
    var bidx=batLogs.findIndex(function(l){return l.id===be.id;});
    var entry={id:be.id,game_id:be.gid,player_no:be.pno,oc:be.oc,zone:be.zone||null,run:be.run||0,rbi:be.rbi||0,sb:be.sb||0,cs:be.cs||0};
    if(bidx>-1)batLogs[bidx]=Object.assign(batLogs[bidx],entry);
    else batLogs.push(entry);
    var lidx=liveLog.findIndex(function(l){return l.id===be.id;});
    if(lidx>-1)Object.assign(liveLog[lidx],{oc:be.oc,run:be.run||0,rbi:be.rbi||0,sb:be.sb||0,cs:be.cs||0});
    else liveLog.push({type:'bat',id:be.id,player_no:be.pno,oc:be.oc,run:be.run||0,rbi:be.rbi||0,sb:be.sb||0,cs:be.cs||0});
  }

  // 타석 수정 (득점/도루 등 업데이트)
  if(payload.batUpdate){
    var bu=payload.batUpdate;
    var bi=batLogs.findIndex(function(l){return l.id===bu.id;});
    if(bi>-1)Object.assign(batLogs[bi],bu);
    var li=liveLog.findIndex(function(l){return l.id===bu.id;});
    if(li>-1)Object.assign(liveLog[li],{run:bu.run||0,rbi:bu.rbi||0,sb:bu.sb||0,cs:bu.cs||0});
  }

  // 투수 기록 엔트리 → liveLog
  if(payload.pitEntry){
    var pe=payload.pitEntry;
    var peli=liveLog.findIndex(function(l){return l.type==='pit'&&l.id===pe.id;});
    if(peli<0)liveLog.push({type:'pit',id:pe.id,player_no:pe.pno,oc:pe.oc});
  }

  // 실점 엔트리 → pitRuns (상대 점수용)
  if(payload.pitRunEntries&&payload.pitRunEntries.length){
    payload.pitRunEntries.forEach(function(r){
      var ri=pitRuns.findIndex(function(p){return p.id===r.id;});
      if(ri>-1)pitRuns[ri]=Object.assign(pitRuns[ri],r);
      else pitRuns.push({id:r.id,game_id:r.gid,player_no:r.pno,earned:r.earned||0});
    });
  }

  renderState();
}

async function load(){
  if(!teamCode&&!teamId){
    el('err-msg').textContent='올바른 중계 링크가 아닙니다';
    el('err-sub').textContent='?code=초대코드 를 포함한 링크를 사용하세요';
    hideEl('loading'); showEl('err-view');
    return;
  }

  var script=document.createElement('script');
  script.src='supabase.umd.js';
  document.head.appendChild(script);
  await new Promise(function(r){script.onload=r;});

  sb=window.supabase.createClient(SURL,SKEY);

  // 초대코드로 팀 조회
  if(teamCode){
    var tc=await sb.from('teams').select('id,name').eq('invite_code',teamCode);
    if(tc.error||!tc.data||!tc.data.length){
      var tc2=await sb.from('teams').select('id,name').eq('invite_code_recorder',teamCode);
      if(tc2.error||!tc2.data||!tc2.data.length){
        el('err-msg').textContent='팀을 찾을 수 없습니다 ('+teamCode+')';
        hideEl('loading'); showEl('err-view'); return;
      }
      teamId=tc2.data[0].id; el('team-name').textContent=tc2.data[0].name;
    }else{
      teamId=tc.data[0].id; el('team-name').textContent=tc.data[0].name;
    }
  }else{
    var tn=await sb.from('teams').select('name').eq('id',teamId);
    if(tn.data&&tn.data.length) el('team-name').textContent=tn.data[0].name;
  }

  // 선수 명단
  var pr=await sb.from('players').select('no,name,pos').eq('team_id',teamId);
  players=pr.data||[];

  // 최근 경기 (active 우선)
  var gr=await sb.from('games').select('*').eq('team_id',teamId)
    .in('status',['active','live'])
    .order('date',{ascending:false}).limit(1);
  if(!gr.data||!gr.data.length){
    gr=await sb.from('games').select('*').eq('team_id',teamId)
      .order('date',{ascending:false}).limit(1);
  }
  if(gr.error||!gr.data||!gr.data.length){
    el('err-msg').textContent='진행 중인 경기가 없습니다';
    hideEl('loading'); showEl('err-view'); return;
  }
  currentGame=gr.data[0];

  // 타석 기록 초기 로드
  var lr=await sb.from('bat_log').select('*')
    .eq('team_id',teamId).eq('game_id',currentGame.id)
    .order('created_at',{ascending:true});
  batLogs=lr.data||[];

  // 실점 기록 초기 로드
  var rr=await sb.from('pit_runs').select('*')
    .eq('team_id',teamId).eq('game_id',currentGame.id);
  pitRuns=rr.data||[];

  renderState();

  // ── Realtime 채널 (앱과 동일한 채널) ───────────────────────────
  var ch=sb.channel('team-'+teamId);

  // 브로드캐스트 (아웃/베이스/이닝/투수/타석/실점)
  ch.on('broadcast',{event:'game_state'},function(msg){
    applyBroadcast(msg.payload);
  });

  // bat_log INSERT (브로드캐스트 누락 보완)
  ch.on('postgres_changes',{event:'INSERT',schema:'public',table:'bat_log',filter:'team_id=eq.'+teamId},
    function(p){
      if(!p.new||p.new.game_id!==currentGame.id)return;
      var exists=batLogs.find(function(l){return l.id===p.new.id;});
      if(!exists){
        batLogs.push(p.new);
        var li=liveLog.findIndex(function(l){return l.id===p.new.id;});
        if(li<0)liveLog.push({type:'bat',id:p.new.id,player_no:p.new.player_no,oc:p.new.oc,run:p.new.run||0,rbi:p.new.rbi||0,sb:p.new.sb||0,cs:p.new.cs||0});
      }
      renderState();
    });

  // bat_log UPDATE (득점/도루 변경)
  ch.on('postgres_changes',{event:'UPDATE',schema:'public',table:'bat_log',filter:'team_id=eq.'+teamId},
    function(p){
      if(!p.new||p.new.game_id!==currentGame.id)return;
      var bi=batLogs.findIndex(function(l){return l.id===p.new.id;});
      if(bi>-1)Object.assign(batLogs[bi],p.new);
      var li=liveLog.findIndex(function(l){return l.id===p.new.id;});
      if(li>-1)Object.assign(liveLog[li],{run:p.new.run||0,rbi:p.new.rbi||0,sb:p.new.sb||0,cs:p.new.cs||0});
      renderState();
    });

  // pit_runs INSERT/UPDATE (상대 점수)
  ch.on('postgres_changes',{event:'INSERT',schema:'public',table:'pit_runs',filter:'team_id=eq.'+teamId},
    function(p){
      if(!p.new||p.new.game_id!==currentGame.id)return;
      var ri=pitRuns.findIndex(function(r){return r.id===p.new.id;});
      if(ri>-1)Object.assign(pitRuns[ri],p.new); else pitRuns.push(p.new);
      renderState();
    });
  ch.on('postgres_changes',{event:'UPDATE',schema:'public',table:'pit_runs',filter:'team_id=eq.'+teamId},
    function(p){
      if(!p.new||p.new.game_id!==currentGame.id)return;
      var ri=pitRuns.findIndex(function(r){return r.id===p.new.id;});
      if(ri>-1)Object.assign(pitRuns[ri],p.new); else pitRuns.push(p.new);
      renderState();
    });

  // pit_bf INSERT (투수 기록 → 라이브 기록에 추가)
  ch.on('postgres_changes',{event:'INSERT',schema:'public',table:'pit_bf',filter:'team_id=eq.'+teamId},
    function(p){
      if(!p.new||p.new.game_id!==currentGame.id)return;
      var li=liveLog.findIndex(function(l){return l.type==='pit'&&l.id===p.new.id;});
      if(li<0)liveLog.push({type:'pit',id:p.new.id,player_no:p.new.player_no,oc:p.new.oc});
      renderState();
    });

  ch.subscribe(function(status){console.log('[live]',status);});
}

load();
</script>
</body>
</html>
