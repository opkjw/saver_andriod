<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>모야모야 중계</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}

    .hdr{background:linear-gradient(135deg,#1e3a8a,#1e40af);padding:16px 20px 12px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .live-badge{background:#ef4444;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:1px;animation:blink 1.5s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
    .team-lbl{font-size:13px;color:#93c5fd;font-weight:600}
    .score-row{display:flex;align-items:center;justify-content:center;gap:16px;margin:10px 0 6px}
    .score-team{text-align:center;flex:1}
    .score-team-name{font-size:12px;color:#93c5fd;margin-bottom:2px}
    .score-num{font-size:52px;font-weight:800;color:#fff;line-height:1}
    .score-vs{font-size:16px;color:#475569;font-weight:700}
    .chips{display:flex;justify-content:center;gap:10px;margin-top:8px;flex-wrap:wrap}
    .chip{border-radius:20px;padding:4px 14px;font-size:13px;font-weight:700}
    .chip-inn{background:rgba(59,130,246,0.25);color:#93c5fd}
    .chip-out{background:rgba(239,68,68,0.25);color:#fca5a5}
    .chip-end{background:rgba(100,116,139,0.3);color:#94a3b8}

    /* 베이스 다이아몬드 */
    .diamond-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0 8px;gap:6px}
    .diamond{position:relative;width:120px;height:120px}
    .base{position:absolute;width:32px;height:32px;transform:rotate(45deg);background:#1e293b;border:2px solid #334155;border-radius:4px;transition:all 0.25s}
    .base.on{background:#22c55e;border-color:#16a34a;box-shadow:0 0 14px rgba(34,197,94,0.6)}
    .b2{top:2px;left:50%;transform:translateX(-50%) rotate(45deg)}
    .b3{top:50%;left:2px;transform:translateY(-50%) rotate(45deg)}
    .b1{top:50%;right:2px;transform:translateY(-50%) rotate(45deg)}
    .home-base{bottom:2px;left:50%;transform:translateX(-50%) rotate(45deg);position:absolute;width:32px;height:32px;background:#1e293b;border:2px solid #475569;border-radius:4px}
    .out-dots{display:flex;gap:8px}
    .out-dot{width:14px;height:14px;border-radius:50%;background:#1e293b;border:2px solid #334155;transition:all 0.25s}
    .out-dot.on{background:#ef4444;border-color:#dc2626;box-shadow:0 0 8px rgba(239,68,68,0.5)}

    /* 카드 */
    .section{padding:0 16px;margin-top:14px}
    .sec-title{font-size:10px;font-weight:700;color:#475569;letter-spacing:1.5px;margin-bottom:6px}
    .card{background:#1e293b;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px}
    .jersey{width:44px;height:44px;border-radius:50%;background:#1e3a8a;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#93c5fd;flex-shrink:0}
    .pinfo{flex:1}
    .pname{font-size:18px;font-weight:700}
    .psub{font-size:12px;color:#64748b;margin-top:2px}
    .pstat{text-align:right}
    .pstat-val{font-size:20px;font-weight:800;color:#38bdf8}
    .pstat-lbl{font-size:10px;color:#64748b}

    /* 타석 로그 */
    .log-list{display:flex;flex-direction:column;gap:7px;margin-bottom:30px}
    .log-item{background:#1e293b;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px}
    .log-inn{font-size:11px;color:#475569;width:34px;flex-shrink:0}
    .log-player{font-size:14px;font-weight:600;color:#cbd5e1;flex:1}
    .log-oc{font-size:13px;font-weight:700;padding:3px 10px;border-radius:8px}
    .oc-hit{background:rgba(34,197,94,0.2);color:#4ade80}
    .oc-out{background:rgba(239,68,68,0.15);color:#f87171}
    .oc-bb{background:rgba(59,130,246,0.2);color:#60a5fa}
    .log-extra{font-size:11px;color:#64748b;min-width:38px;text-align:right}

    .divider{height:1px;background:#1e293b;margin:14px 0}
    .waiting{text-align:center;padding:16px;color:#475569;font-size:13px}

    .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:12px;color:#64748b;padding:24px;text-align:center}
    .spinner{width:36px;height:36px;border:3px solid #1e293b;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="loading" class="center">
  <div class="spinner"></div>
  <div>경기 정보 불러오는 중...</div>
</div>

<div id="app" style="display:none">
  <div class="hdr">
    <div class="hdr-top">
      <span class="live-badge" id="live-badge">LIVE</span>
      <span class="team-lbl" id="team-name">모야모야</span>
    </div>
    <div class="score-row">
      <div class="score-team">
        <div class="score-team-name">우리팀</div>
        <div class="score-num" id="my-score">0</div>
      </div>
      <div class="score-vs">VS</div>
      <div class="score-team">
        <div class="score-team-name" id="opp-name">상대팀</div>
        <div class="score-num" id="opp-score">0</div>
      </div>
    </div>
    <div class="chips">
      <span class="chip chip-inn" id="chip-inn">-회 -</span>
      <span class="chip chip-out" id="chip-out">0아웃</span>
    </div>
  </div>

  <!-- 베이스 다이아몬드 -->
  <div class="diamond-wrap">
    <div class="diamond">
      <div class="base b2" id="b2"></div>
      <div class="base b3" id="b3"></div>
      <div class="base b1" id="b1"></div>
      <div class="home-base"></div>
    </div>
    <div class="out-dots">
      <div class="out-dot" id="od1"></div>
      <div class="out-dot" id="od2"></div>
      <div class="out-dot" id="od3"></div>
    </div>
  </div>

  <!-- 현재 투수 -->
  <div class="section">
    <div class="sec-title">현재 투수</div>
    <div class="card" id="pit-card">
      <div class="jersey" id="pit-no">-</div>
      <div class="pinfo">
        <div class="pname" id="pit-name">-</div>
        <div class="psub" id="pit-sub">-</div>
      </div>
    </div>
  </div>

  <!-- 현재 타자 -->
  <div class="section" style="margin-top:10px">
    <div class="sec-title">현재 타자</div>
    <div class="card" id="bat-card">
      <div class="jersey" id="bat-no">-</div>
      <div class="pinfo">
        <div class="pname" id="bat-name">-</div>
        <div class="psub" id="bat-sub">-</div>
      </div>
      <div class="pstat">
        <div class="pstat-val" id="bat-avg">-</div>
        <div class="pstat-lbl">오늘 타율</div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 타석 로그 -->
  <div class="section">
    <div class="sec-title">최근 타석</div>
    <div id="log-list" class="log-list">
      <div class="waiting">타석 기록이 없습니다</div>
    </div>
  </div>
</div>

<div id="err-view" style="display:none">
  <div class="center">
    <div style="font-size:40px">⚾</div>
    <div id="err-msg" style="color:#f87171;font-size:15px;font-weight:600"></div>
    <div id="err-sub" style="font-size:13px;margin-top:4px"></div>
  </div>
</div>

<script>
var SURL = 'https://urtcsfgcjqognbxzqgnb.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVydGNzZmdjanFvZ25ieHpxZ25iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTAxNzQsImV4cCI6MjA5NDc2NjE3NH0.Ypb6cUFbL-MDkseuGby-sOH74SAyyoV0ToIDaE8Ur0E';

var params = new URLSearchParams(location.search);
var teamCode = (params.get('code')||'').toUpperCase();
var teamId   = params.get('team')||'';

var sb, players=[], logs=[], gameState={}, currentGame=null;

function el(id){return document.getElementById(id);}
function showEl(id){el(id).style.display='';}
function hideEl(id){el(id).style.display='none';}

var OC_LABEL={'1B':'단타','2B':'2루타','3B':'3루타','HR':'홈런','K':'삼진','BB':'볼넷','GO':'땅볼','FO':'플라이','DP':'병살','HBP':'몸맞','SF':'희플','SH':'희번','FC':'야선','E':'실책'};
function ocLabel(oc){return OC_LABEL[oc]||oc;}
function ocClass(oc){
  if(['1B','2B','3B','HR'].indexOf(oc)>-1)return 'oc-hit';
  if(oc==='BB'||oc==='HBP')return 'oc-bb';
  return 'oc-out';
}
function playerOf(no){return players.find(function(p){return p.no===Number(no)||p.no===no;})||null;}
function calcAvg(pno){
  var ab=0,h=0;
  logs.forEach(function(e){
    if(e.player_no!==pno)return;
    if(['BB','HBP','SF','SH'].indexOf(e.oc)>-1)return;
    ab++;
    if(['1B','2B','3B','HR'].indexOf(e.oc)>-1)h++;
  });
  return ab?('.'+String(Math.round(h/ab*1000)).padStart(3,'0')):'---';
}

function renderState(){
  var gs = gameState;
  var g  = currentGame;
  if(!g) return;

  hideEl('loading'); hideEl('err-view'); showEl('app');

  // 스코어
  el('my-score').textContent = g.my_score||0;
  el('opp-score').textContent = g.opp_score||0;
  el('opp-name').textContent  = g.opponent||'상대팀';

  // LIVE 뱃지
  var isLive = g.status==='active'||g.status==='live';
  el('live-badge').textContent = isLive?'LIVE':'종료';
  el('live-badge').style.background = isLive?'#ef4444':'#475569';
  el('live-badge').style.animation = isLive?'blink 1.5s infinite':'none';

  // 이닝/아웃 (브로드캐스트 수신 시 채움)
  var inn   = gs.inning||'-';
  var half  = gs.topBot==='bot'?'말':(gs.topBot==='top'?'초':'-');
  var outs  = typeof gs.outs==='number'?gs.outs:'-';
  el('chip-inn').textContent = inn+'회 '+half;
  el('chip-out').textContent = outs+'아웃';

  // 아웃 도트
  for(var i=1;i<=3;i++){
    var dot=el('od'+i);
    dot.className='out-dot'+(typeof gs.outs==='number'&&gs.outs>=i?' on':'');
  }

  // 베이스
  var bases=gs.bases||{b1:null,b2:null,b3:null};
  el('b1').className='base b1'+(bases.b1!=null?' on':'');
  el('b2').className='base b2'+(bases.b2!=null?' on':'');
  el('b3').className='base b3'+(bases.b3!=null?' on':'');

  // 현재 투수
  var pitNo = gs.curPit;
  var pit   = pitNo!=null?playerOf(pitNo):null;
  el('pit-no').textContent   = pitNo!=null?('#'+pitNo):'-';
  el('pit-name').textContent = pit?pit.name:'대기 중';
  el('pit-sub').textContent  = pit?(pit.pos||'투수'):'';

  // 현재 타자 (최근 bat_log 기준)
  if(logs.length>0){
    var last=logs[logs.length-1];
    var bp=playerOf(last.player_no);
    el('bat-no').textContent  = '#'+last.player_no;
    el('bat-name').textContent= bp?bp.name:('#'+last.player_no);
    el('bat-sub').textContent = bp?(bp.pos||''):'';
    el('bat-avg').textContent = calcAvg(last.player_no);
  }

  // 타석 로그
  var recent=logs.slice().reverse().slice(0,20);
  if(recent.length===0){
    el('log-list').innerHTML='<div class="waiting">타석 기록이 없습니다</div>';
  }else{
    el('log-list').innerHTML=recent.map(function(e){
      var p2=playerOf(e.player_no);
      var name=p2?p2.name:('#'+e.player_no);
      var extra='';
      if(e.rbi>0)extra+=e.rbi+'타점 ';
      if(e.run>0)extra+=e.run+'득점';
      return '<div class="log-item">'
        +'<div class="log-inn">'+(e.inn?e.inn+'회':'-')+'</div>'
        +'<div class="log-player">'+name+'</div>'
        +'<div class="log-oc '+ocClass(e.oc)+'">'+ocLabel(e.oc)+'</div>'
        +'<div class="log-extra">'+extra.trim()+'</div>'
        +'</div>';
    }).join('');
  }
}

function applyBroadcast(payload){
  if(!payload)return;
  // 이닝/아웃/베이스/투수 업데이트
  if(payload.inning!=null)   gameState.inning = payload.inning;
  if(payload.topBot!=null)   gameState.topBot = payload.topBot;
  if(typeof payload.outs==='number') gameState.outs = payload.outs;
  if(payload.bases)          gameState.bases  = payload.bases;
  if('curPit' in payload)    gameState.curPit = payload.curPit;
  // 타석 엔트리 추가
  if(payload.batEntry){
    var be=payload.batEntry;
    var exist=logs.findIndex(function(l){return l.id===be.id;});
    if(exist>-1)logs[exist]=Object.assign(logs[exist],be);
    else logs.push({id:be.id,game_id:be.gid,player_no:be.pno,oc:be.oc,zone:be.zone,run:be.run||0,rbi:be.rbi||0,sb:be.sb||0,cs:be.cs||0,inn:be.inn||null});
  }
  if(payload.batUpdate){
    var bu=payload.batUpdate;
    var idx=logs.findIndex(function(l){return l.id===bu.id;});
    if(idx>-1)Object.assign(logs[idx],bu);
  }
  // 점수는 games 테이블 realtime으로 처리
  renderState();
}

async function load(){
  if(!teamCode&&!teamId){
    el('err-msg').textContent='올바른 중계 링크가 아닙니다';
    el('err-sub').textContent='?code=초대코드 를 포함한 링크를 사용하세요';
    hideEl('loading'); showEl('err-view');
    return;
  }

  var script=document.createElement('script');
  script.src='supabase.umd.js';
  document.head.appendChild(script);
  await new Promise(function(r){script.onload=r;});

  sb=window.supabase.createClient(SURL,SKEY);

  // 초대코드로 팀 조회
  if(teamCode){
    var tc=await sb.from('teams').select('id,name').eq('invite_code',teamCode);
    if(tc.error||!tc.data||!tc.data.length){
      el('err-msg').textContent='팀을 찾을 수 없습니다 ('+teamCode+')';
      hideEl('loading'); showEl('err-view'); return;
    }
    teamId=tc.data[0].id;
    el('team-name').textContent=tc.data[0].name;
  } else {
    var tn=await sb.from('teams').select('name').eq('id',teamId);
    if(tn.data&&tn.data.length) el('team-name').textContent=tn.data[0].name;
  }

  // 선수 명단
  var pr=await sb.from('players').select('no,name,pos').eq('team_id',teamId);
  players=pr.data||[];

  // 최근 경기
  var gr=await sb.from('games').select('*').eq('team_id',teamId)
    .order('date',{ascending:false}).limit(1);
  if(gr.error||!gr.data||!gr.data.length){
    el('err-msg').textContent='진행 중인 경기가 없습니다';
    hideEl('loading'); showEl('err-view'); return;
  }
  currentGame=gr.data[0];

  // 타석 기록 초기 로드
  var lr=await sb.from('bat_log').select('*')
    .eq('team_id',teamId).eq('game_id',currentGame.id)
    .order('created_at',{ascending:true});
  logs=lr.data||[];

  renderState();

  // ── Realtime 채널 구독 (앱과 동일한 채널) ──────────────────
  var ch=sb.channel('team-'+teamId);

  // 브로드캐스트 수신 (아웃/베이스/이닝/투수/타석)
  ch.on('broadcast',{event:'game_state'},function(payload){
    applyBroadcast(payload.payload);
  });

  // games UPDATE (점수 변경)
  ch.on('postgres_changes',{event:'UPDATE',schema:'public',table:'games',filter:'team_id=eq.'+teamId},
    function(payload){
      if(payload.new&&payload.new.id===currentGame.id){
        currentGame=Object.assign({},currentGame,payload.new);
        renderState();
      }
    });

  // bat_log INSERT (혹시 브로드캐스트 누락 시 보완)
  ch.on('postgres_changes',{event:'INSERT',schema:'public',table:'bat_log',filter:'team_id=eq.'+teamId},
    function(payload){
      if(!payload.new||payload.new.game_id!==currentGame.id)return;
      var exists=logs.find(function(l){return l.id===payload.new.id;});
      if(!exists)logs.push(payload.new);
      renderState();
    });

  ch.subscribe(function(status){console.log('[live]',status);});
}

load();
</script>
</body>
</html>
