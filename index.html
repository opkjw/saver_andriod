<style>
:root{--navy:#1B3A6B;--red:#922B21;--bg:#f9fafb;--card:#ffffff;--bg2:#f3f4f6;--txt:#111827;--txt2:#4b5563;--bdr:#e5e7eb;--bdr2:#d1d5db;--r:8px;--rl:12px;--sfb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans KR',sans-serif}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:var(--bg)}
.ghdr{background:var(--navy);color:#fff;padding:11px 14px;padding-top:calc(11px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative}
.gh-score{position:absolute;left:50%;transform:translateX(-50%);text-align:center;line-height:1;pointer-events:none}
.gh-score-num{font-size:20px;font-weight:700;letter-spacing:2px}
.gh-score-lbl{font-size:11px;opacity:.8;display:flex;justify-content:space-between;margin-top:3px}
.gh-title{font-size:15px;font-weight:600}.gh-sub{font-size:11px;opacity:.72;margin-top:2px}
.gh-right{display:flex;align-items:center;gap:6px}
.gh-btn{background:rgba(255,255,255,.18);border:none;color:#fff;padding:5px 10px;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:inherit;min-height:44px}
.gh-icon{background:none;border:none;color:rgba(255,255,255,.88);font-size:20px;cursor:pointer;padding:10px;line-height:1;position:relative;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.pdot{position:absolute;top:1px;right:1px;width:7px;height:7px;border-radius:50%;background:#f59e0b;border:1.5px solid var(--navy)}
.tabbar{display:flex;background:var(--card);border-top:1px solid var(--bdr);flex-shrink:0;padding-bottom:var(--sfb)}
.tab{flex:1;padding:8px 2px 10px;text-align:center;border:none;background:none;cursor:pointer;font-size:12px;color:var(--txt2);line-height:1.3;font-family:inherit;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tab i{display:block;font-size:22px;margin-bottom:2px}
.tab.on{color:var(--navy)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.stabs{display:flex;margin:10px 12px 0;background:var(--bg2);border-radius:var(--r);padding:3px;gap:3px}
.stab{flex:1;padding:8px 4px;border:none;border-radius:6px;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--txt2);display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;min-height:44px}
.stab.on{background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.stab.bat.on{color:var(--navy)}.stab.pit.on{color:var(--red)}
.pcard{margin:10px 12px 0;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:12px 14px}
.pcard-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pcard-l{display:flex;align-items:center;gap:10px}
.pav{width:38px;height:38px;border-radius:50%;background:var(--red);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pcard-name{font-size:15px;font-weight:600;color:var(--txt)}.pcard-role{font-size:11px;color:var(--txt2);margin-top:1px}
.pchg{background:none;border:1px solid var(--bdr2);border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--txt2);cursor:pointer;font-family:inherit;min-height:44px;display:flex;align-items:center;justify-content:center}
.pstats{display:flex}
.pstat{flex:1;text-align:center;padding:0 4px}
.pstat:not(:last-child){border-right:1px solid var(--bdr)}
.pstat-val{font-size:20px;font-weight:600;color:var(--txt);line-height:1}
.pstat-lbl{font-size:11px;color:var(--txt2);margin-top:3px}
.pstat.em .pstat-val{color:var(--red)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px}
.pbtn{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 11px;cursor:pointer;display:flex;align-items:center;gap:9px;min-height:52px;width:100%;text-align:left;font-family:inherit}
.pbtn:active{background:var(--bg2)}
.pbtn.sel-b{border:2px solid var(--navy);background:#EBF0FB}
.pbtn.sel-r{border:2px solid var(--red);background:#FDEDEC}
.pno{width:30px;height:30px;border-radius:50%;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pno.b{background:var(--navy)}.pno.r{background:var(--red)}
.pn{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp{font-size:11px;color:var(--txt2)}
.ocsec{padding:8px 12px}
.oclbl{font-size:11px;font-weight:500;color:var(--txt2);padding:5px 0 5px}
.ocgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ocbtn{border:none;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500;padding:12px 4px;min-height:52px;line-height:1.25;width:100%;font-family:inherit}
.ocbtn:active{filter:brightness(.88);transform:scale(.97)}
.shdr{padding:11px 14px 0;display:flex;align-items:center;gap:9px}
.back{background:none;border:none;cursor:pointer;color:var(--txt2);font-size:24px;padding:0;line-height:1;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.s-title{font-size:15px;font-weight:600;color:var(--txt)}.s-sub{font-size:12px;color:var(--txt2)}
.badge{padding:4px 11px;border-radius:var(--r);font-size:12px;font-weight:500}
.extras{display:grid;gap:8px;padding:8px 12px}
.excard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 8px;text-align:center}
.exlbl{font-size:11px;color:var(--txt2);margin-bottom:6px}
.exval{font-size:24px;font-weight:600;color:var(--txt);line-height:1;margin-bottom:7px}
.exbtns{display:flex;justify-content:center;gap:10px}
.exbtn{width:44px;height:44px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--txt);font-family:inherit}
.callout{margin:8px 12px 0;background:var(--bg2);border-left:3px solid var(--navy);border-radius:0 var(--r) var(--r) 0;padding:9px 12px;font-size:11px;color:var(--txt2);line-height:1.6}
.callout strong{color:var(--navy)}
.savewrap{padding:8px 12px 14px}
.savebtn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.savebtn:active{background:#152f58}
.runlist{padding:8px 12px}
.runitem{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.runno{width:32px;height:32px;border-radius:50%;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.runbtn{color:#fff;border:none;border-radius:var(--r);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;min-height:44px}
.runsec{padding:8px 12px}
.rbigrow{display:flex;gap:10px;margin-bottom:14px}
.rbigbtn{flex:1;padding:16px 10px;border:none;border-radius:var(--rl);cursor:pointer;text-align:center;font-size:14px;font-weight:600;line-height:1.4;font-family:inherit}
.rbigbtn:active{filter:brightness(.9)}
.rbigbtn.earn{background:#FDEDEC;color:var(--red);border:1px solid #F5B7B1}
.rbigbtn.uearn{background:var(--bg2);color:#374151;border:1px solid var(--bdr)}
.rminirow{display:flex;gap:8px;margin-bottom:12px}
.rmini{flex:1;background:var(--bg2);border-radius:var(--r);padding:10px;text-align:center}
.rminiv{font-size:22px;font-weight:700}
.rminil{font-size:11px;color:var(--txt2);margin-top:2px}
.rlogitem{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.rlogitem:last-child{border-bottom:none}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rdot.e{background:#e74c3c}.rdot.u{background:#95a5a6}
.rdel{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:18px;padding:2px;line-height:1;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.logitem{background:var(--card);border-bottom:1px solid var(--bdr);padding:10px 14px;display:flex;align-items:center;gap:10px}
.logbadge{width:40px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;text-align:center;line-height:1.2}
.logplayer{font-size:13px;font-weight:600;color:var(--txt)}
.logdetail{font-size:11px;color:var(--txt2);margin-top:1px}
.delbtn{background:none;border:none;color:var(--txt2);cursor:pointer;padding:4px;font-size:19px;line-height:1;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.statwrap{overflow-x:auto;padding:0 12px 16px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:360px}
th{padding:7px 5px;text-align:center;font-weight:600;white-space:nowrap;background:var(--navy);color:#fff}
table.pit th{background:var(--red)}
td{padding:10px 5px;text-align:center;border-bottom:1px solid var(--bdr);color:var(--txt);white-space:nowrap}
tr:nth-child(even) td{background:var(--bg2)}
.hi{color:var(--navy);font-weight:600}.hir{color:var(--red);font-weight:600}
.sth{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;text-decoration-color:rgba(255,255,255,.5)}
.sth:active{opacity:.7}
.seclbl{padding:10px 14px 4px;font-size:11px;font-weight:600;color:var(--txt2);letter-spacing:.04em;text-transform:uppercase}
.empty{padding:40px 20px;text-align:center;color:var(--txt2)}
.cfgwrap{padding:12px}
.cfgcard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:15px;margin-bottom:10px}
.cfgtitle{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cfginput{width:100%;border:1px solid var(--bdr2);border-radius:var(--r);padding:10px 11px;font-size:16px;font-family:'SF Mono',Consolas,monospace;color:var(--txt);background:var(--bg2);outline:none;margin-bottom:8px;-webkit-appearance:none}
.cfginput:focus{border-color:var(--navy)}
.cfgrow{display:flex;gap:7px}
.cfgbtn{flex:1;padding:11px 9px;min-height:44px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt);cursor:pointer;font-size:12px;text-align:center;font-family:inherit}
.cfgbtn.pr{background:var(--navy);color:#fff;border-color:var(--navy)}
.connst{display:none;margin-top:6px;font-size:11px}
.srow{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid var(--bdr)}
.srow:last-of-type{border-bottom:none}
.srow span:first-child{color:var(--txt2)}
.syncbig{width:100%;margin-top:10px;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.syncbig:active{background:#152f58}
.syncbig:disabled{opacity:.38;cursor:not-allowed}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end}
.modal{background:var(--card);border-radius:var(--rl) var(--rl) 0 0;padding:20px 16px;padding-bottom:calc(20px + var(--sfb));width:100%;max-width:430px;margin:0 auto;max-height:88vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:14px}
.modal input[type=text],.modal input[type=number],.modal input[type=date]{width:100%;border:1.5px solid var(--bdr2);border-radius:var(--r);padding:12px 14px;font-size:16px;font-family:inherit;color:var(--txt);background:var(--bg2);outline:none;margin-bottom:10px;-webkit-appearance:none}
.modal input:focus{border-color:var(--navy)}
.mlbl{font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.mbtns{display:flex;gap:8px;margin-top:6px}
.mcancel{flex:1;padding:13px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt2);cursor:pointer;font-size:15px;font-family:inherit}
.mok{flex:2;padding:14px;border:none;border-radius:var(--r);background:var(--navy);color:#fff;cursor:pointer;font-size:15px;font-weight:600;font-family:inherit}
.em-lbl{font-size:11px;font-weight:600;color:var(--txt2);margin:10px 0 6px}
.em-ocgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:4px}
.em-ocbtn{border:none;border-radius:var(--r);cursor:pointer;font-size:11px;font-weight:500;padding:9px 3px;min-height:44px;line-height:1.2;width:100%;font-family:inherit;transition:opacity .15s}
.em-row{display:grid;gap:8px;margin-bottom:10px}
.em-card{background:var(--bg2);border-radius:var(--r);padding:9px 8px;text-align:center}
.em-card-lbl{font-size:11px;color:var(--txt2);margin-bottom:5px}
.em-card-val{font-size:20px;font-weight:600;color:var(--txt);line-height:1;margin-bottom:5px}
.em-card-btns{display:flex;justify-content:center;gap:8px}
.em-card-btn{width:44px;height:44px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--card);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.em-btns{display:flex;gap:8px;margin-top:14px}
.em-cancel{flex:1;padding:12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt2);cursor:pointer;font-size:14px;font-family:inherit}
.em-save{flex:2;padding:13px;border:none;border-radius:var(--r);background:var(--navy);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
.em-zone-of{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:4px}
.em-zone-if{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.em-zbtn{padding:8px 2px;border-radius:var(--r);font-size:11px;cursor:pointer;font-family:inherit;border:1px solid var(--bdr);background:var(--bg2);color:var(--txt2)}
#toast{position:fixed;bottom:calc(72px + var(--sfb));left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:99;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-weight:500}
#toast.ok{background:#15803d}#toast.err{background:#991b1b}#toast.off{opacity:0}
#setup-overlay{position:fixed;inset:0;background:var(--navy);z-index:300;display:none;flex-direction:column;align-items:stretch;overflow:hidden}
.su-progress{display:flex;gap:5px;justify-content:center;padding:calc(18px + env(safe-area-inset-top,0px)) 0 0}
.su-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.42);transition:all .35s}
.su-dot.on{background:#fff;width:24px;border-radius:3px}
.su-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px calc(32px + env(safe-area-inset-left,0px)) 8px calc(32px + env(safe-area-inset-right,0px));text-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch}
.su-icon{font-size:72px;line-height:1;margin-bottom:22px;animation:suPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes suPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.su-title{font-size:27px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:11px;animation:suUp .35s ease-out}
.su-desc{font-size:14px;color:rgba(255,255,255,.65);line-height:1.75;margin-bottom:28px;animation:suUp .35s ease-out .05s both}
@keyframes suUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.su-field{width:100%;text-align:left;margin-bottom:10px}
.su-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.su-input{width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.36);border-radius:13px;padding:16px 17px;font-size:16px;color:#fff;outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color .2s,background .2s}
.su-input:focus{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.16)}
.su-input::placeholder{color:rgba(255,255,255,.5)}
.su-actions{padding:8px 24px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:8px;align-items:center}
.su-next{width:100%;padding:17px;background:#fff;color:var(--navy);border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.su-next:active{opacity:.82}
.su-skip{background:none;border:none;color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;padding:8px 16px;font-family:inherit;min-height:44px}
.su-skip:active{color:rgba(255,255,255,.9)}
.su-summary{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 18px;width:100%;text-align:left;font-size:14px;color:rgba(255,255,255,.8);line-height:2;margin-bottom:4px}
.su-tip{background:rgba(255,255,255,.07);border-radius:12px;padding:13px 16px;width:100%;font-size:12px;color:rgba(255,255,255,.6);line-height:1.75;text-align:left;margin-top:8px}
.su-connst{font-size:12px;color:rgba(255,255,255,.5);min-height:18px;text-align:center;margin-top:6px;width:100%}
#login-overlay{position:fixed;inset:0;background:var(--navy);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.pin-wrap{width:100%;max-width:340px}
.pin-logo{font-size:52px;text-align:center;margin-bottom:8px}
.pin-title{font-size:22px;font-weight:700;color:#fff;text-align:center;margin-bottom:4px}
.pin-sub{font-size:13px;color:rgba(255,255,255,.6);text-align:center;margin-bottom:32px}
.pin-input{width:100%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:var(--rl);padding:16px 18px;font-size:20px;color:#fff;text-align:center;letter-spacing:6px;outline:none;font-family:inherit;-webkit-appearance:none;margin-bottom:10px}
.pin-input:focus{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.18)}
.pin-input::placeholder{letter-spacing:normal;font-size:14px;color:rgba(255,255,255,.4)}
.pin-btn{width:100%;padding:16px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px}
.pin-btn.primary{background:#fff;color:var(--navy)}
.pin-btn.primary:active{opacity:.85}
.pin-btn.secondary{background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.2)}
.pin-btn.secondary:active{opacity:.7}
.pin-err{font-size:12px;color:#fca5a5;text-align:center;min-height:18px;margin-bottom:8px}
@keyframes flash{0%{background:#fde68a}100%{background:var(--card)}}
.flash{animation:flash .5s ease-out}
.cal-wrap{background:var(--card);border-bottom:1px solid var(--bdr)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px}
.cal-nav span{font-size:15px;font-weight:700;color:var(--txt)}
.cal-nav button{width:44px;height:44px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);cursor:pointer;font-size:18px;color:var(--txt2);display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 6px;gap:2px}

// в”Җв”Җ м•ұ мғҒнғң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let S={

// в”Җв”Җ м ҖмһҘ/л¶Ҳлҹ¬мҳӨкё° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function load(){
  try{
    const raw=localStorage.getItem('bb_final');
    if(raw){
      const d=JSON.parse(raw);
      ['blog','pit_bf','pit_runs','games','game','gcnt','scriptUrl','scriptToken','lastSync','rosterDirty','deletedGids','schoolName','bases','outs','pitBases','pitOuts'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
      if(d.myPlayer!=null)S.myPlayer=parseInt(d.myPlayer)||null;
      S.syncedIds=new Set(d.syncedIds||[]);
      // downloadedGids: м ҖмһҘлҗң к°’ ліөмӣҗ, м—Ҷмңјл©ҙ кё°мЎҙ лЎңм»¬ л ҲмҪ”л“ңм—җм„ң bootstrap
      if(d.downloadedGids&&d.downloadedGids.length){
        S.downloadedGids=new Set(d.downloadedGids);
      }else{
        var _gids=new Set();
        (S.blog||[]).forEach(function(e){if(e.gid)_gids.add(e.gid);});
        (S.pit_bf||[]).forEach(function(e){if(e.gid)_gids.add(e.gid);});
        (S.pit_runs||[]).forEach(function(e){if(e.gid)_gids.add(e.gid);});
        S.downloadedGids=_gids;
      }
      if(d.setupDone!==undefined)S.setupDone=d.setupDone;
      else S.setupDone=!!(S.scriptUrl||S.games.length>0||S.schoolName);
      if(d.setupStep!==undefined)S.setupStep=d.setupStep;
      if(d.roster&&d.roster.length>0){parseRosterSiblings(d.roster);ROSTER.splice(0,ROSTER.length,...d.roster);}
    }
    var sr=sessionStorage.getItem('bb_role');
    if(sr)S.role=sr;
  }catch(e){console.error(e);}
}
function save(){
  try{
    localStorage.setItem('bb_final',JSON.stringify({
      blog:S.blog,pit_bf:S.pit_bf,pit_runs:S.pit_runs,games:S.games,
      game:S.game,gcnt:S.gcnt,scriptUrl:S.scriptUrl,lastSync:S.lastSync,
      syncedIds:[...S.syncedIds],downloadedGids:[...S.downloadedGids],roster:ROSTER,rosterDirty:S.rosterDirty,myPlayer:S.myPlayer,
      deletedGids:S.deletedGids,schoolName:S.schoolName,scriptToken:S.scriptToken,setupDone:S.setupDone,setupStep:S.setupStep,bases:S.bases,outs:S.outs,pitBases:S.pitBases,pitOuts:S.pitOuts,
    }));
  }catch(e){console.error(e);}
}

function parseRosterSiblings(roster){
  (roster||[]).forEach(function(p){
    if(!p.siblings||p.siblings===''||p.siblings===null){p.siblings=[];return;}
    if(Array.isArray(p.siblings))return;
    if(typeof p.siblings==='string'){
      var s=p.siblings.trim();
      try{
        var parsed=JSON.parse(s);
        p.siblings=Array.isArray(parsed)?parsed.map(Number).filter(function(n){return!isNaN(n);}):[];
      }catch(e){
        // "5,7" нҳ•мӢқ fallback
        p.siblings=s.split(',').map(function(x){return parseInt(x.trim());}).filter(function(n){return!isNaN(n);});
      }
    }
  });
}
function getSiblingGroup(){
  if(!S.myPlayer)return[];
  // к°ҷмқҖ лІҲнҳёк°Җ нғҖмһҗ/нҲ¬мҲҳ л‘җ н•ӯлӘ©мңјлЎң мһҲмқ„ мҲҳ мһҲмңјлҜҖлЎң лӘЁл“  н•ӯлӘ©м—җм„ң siblings мҲҳм§‘
  var sibNos=[];
  ROSTER.filter(function(x){return x.no===S.myPlayer;}).forEach(function(me){
    if(me.siblings)me.siblings.forEach(function(s){if(sibNos.indexOf(s)<0)sibNos.push(s);});
  });
  if(!sibNos.length)return[];
  var seen=new Set();
  return sibNos.map(function(sno){return ROSTER.find(function(x){return x.no===sno;});}).filter(function(p){return p&&!seen.has(p.no)&&seen.add(p.no);});
}
function activeNo(){return S.activeChild!=null?S.activeChild:S.myPlayer;}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(m,type=''){
  const t=document.getElementById('toast');
  t.textContent=m;t.className=type||'';
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('off'),2000);
}

// в”Җв”Җ нҶөкі„ кі„мӮ° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function paS(o){
  const noAB=["BB","IBB","HBP","SF","SH"],hits=["1B","2B","3B","HR"];
  return{pa:1,ab:noAB.includes(o)?0:1,h:hits.includes(o)?1:0,
    d2:o==="2B"?1:0,d3:o==="3B"?1:0,hr:o==="HR"?1:0,
    bb:(o==="BB"||o==="IBB")?1:0,hbp:o==="HBP"?1:0,so:(o==="K"||o==="KWP")?1:0,sf:o==="SF"?1:0};
}
// MLB кё°мӨҖ л“ұкёү нҢҗлі„
const MLB_BENCH={
  AVG: {good:0.280,bad:0.220,rev:false},
  OBP: {good:0.350,bad:0.300,rev:false},
  SLG: {good:0.450,bad:0.350,rev:false},
  OPS: {good:0.800,bad:0.650,rev:false},
  wOBA:{good:0.360,bad:0.300,rev:false},
  'wRC+':{good:115,bad:85,rev:false},
  ISO: {good:0.170,bad:0.090,rev:false},
  BABIP:{good:0.340,bad:0.260,rev:false},
  'BB%':{good:0.10,bad:0.06,rev:false},
  'K%': {good:0.15,bad:0.23,rev:true},
  'BB/K':{good:0.70,bad:0.35,rev:false},
  WAR: {good:2.0,bad:0,rev:false},
  ERA: {good:3.50,bad:5.00,rev:true},
  WHIP:{good:1.20,bad:1.50,rev:true},
  FIP: {good:3.50,bad:5.00,rev:true},
  'K/9':{good:9.0,bad:6.0,rev:false},
  'BB/9':{good:3.0,bad:4.5,rev:true},
  'pitK%':{good:0.25,bad:0.15,rev:false},
  'pitBB%':{good:0.08,bad:0.12,rev:true},
};
function statTier(key,val){
  const b=MLB_BENCH[key];
  if(!b)return'avg';
  if(b.rev)return val<=b.good?'good':val>=b.bad?'bad':'avg';
  return val>=b.good?'good':val<=b.bad?'bad':'avg';
}
function tierStyle(tier){
  if(tier==='good')return{bg:'#f0fdf4',fc:'#15803d',mark:'в–І'};
  if(tier==='bad') return{bg:'#fff5f5',fc:'#b91c1c',mark:'в–ј'};
  return{bg:'var(--card)',fc:'var(--txt2)',mark:'вҖ”'};
}
function batAgg(filtGids){
  const m={};
  for(const e of S.blog){
    if(filtGids&&!filtGids.has(e.gid))continue;
    const k=e.pn;
    if(!m[k])m[k]={name:k,no:e.pno,pa:0,ab:0,h:0,d2:0,d3:0,hr:0,bb:0,hbp:0,so:0,sf:0,rbi:0,run:0,sb:0,cs:0,gids:new Set()};
    const t=m[k],s=paS(e.oc);
    for(const f of['pa','ab','h','d2','d3','hr','bb','hbp','so','sf'])t[f]+=s[f];
    t.rbi+=e.rbi||0;t.run+=e.run||0;t.sb+=e.sb||0;t.cs+=e.cs||0;
    if(e.gid)t.gids.add(e.gid);
  }
  const wBB=0.69,wHBP=0.72,w1B=0.89,w2B=1.27,w3B=1.62,wHR=2.10;
  const players=Object.values(m).map(t=>{
    const singles=t.h-t.d2-t.d3-t.hr;
    const avg=t.ab>0?t.h/t.ab:0;
    const od=t.ab+t.bb+t.hbp+t.sf;
    const obp=od>0?(t.h+t.bb+t.hbp)/od:0;
    const slg=t.ab>0?(t.h+t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const iso=t.ab>0?(t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const bd=t.ab-t.so-t.hr+t.sf;
    const babip=bd>0?(t.h-t.hr)/bd:0;
    const wn=wBB*t.bb+wHBP*t.hbp+w1B*singles+w2B*t.d2+w3B*t.d3+wHR*t.hr;
    const wd=t.ab+t.bb+t.hbp+t.sf;
    const woba=wd>0?wn/wd:0;
    return{...t,avg,obp,slg,ops:obp+slg,iso,babip,woba,
      bbp:t.pa>0?t.bb/t.pa:0,kp:t.pa>0?t.so/t.pa:0,
      bbk:t.so>0?t.bb/t.so:(t.bb>0?99:0),g:t.gids.size,singles};
  });
  const totalPA=players.reduce((s,p)=>s+p.pa,0);
  const lgwOBA=totalPA>0?players.reduce((s,p)=>s+p.woba*p.pa,0)/totalPA:0.320;
  return players.map(p=>{
    const wrc_plus=lgwOBA>0?Math.round(p.woba/lgwOBA*100):100;
    const bat_runs=(p.woba-lgwOBA)/1.15*p.pa;
    const repl_runs=2.0*p.pa/100;
    const war=(bat_runs+repl_runs)/10;
    return{...p,wrc_plus,war};
  }).sort((a,b)=>b.ops-a.ops);
}
function calcPitStats(pno,gid,filtGids){
  let bf=S.pit_bf.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  let runs=S.pit_runs.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  if(filtGids){bf=bf.filter(e=>filtGids.has(e.gid));runs=runs.filter(e=>filtGids.has(e.gid));}
  const h=bf.filter(e=>['1B','2B','3B','HR'].includes(e.oc)).length;
  const hr=bf.filter(e=>e.oc==='HR').length;
  const bb=bf.filter(e=>['BB','IBB'].includes(e.oc)).length;
  const k=bf.filter(e=>e.oc==='K').length;
  const outs=bf.reduce((s,e)=>s+ocOuts(e.oc),0);
  const er=runs.filter(e=>e.earned).length,rv=runs.length;
  const iF=Math.floor(outs/3),iR=outs%3,ipf=iF+iR/3;
  const ipd=iR>0?iF+'.'+iR:''+iF;
  const era=ipf>0?er*9/ipf:0,whip=ipf>0?(h+bb)/ipf:0;
  const fip=ipf>0?(13*hr+3*bb-2*k)/ipf+3.10:0;
  return{bf:bf.length,h,hr,bb,k,outs,r:rv,er,ipd,ipf,era,whip,fip,
    k9:ipf>0?k*9/ipf:0,bb9:ipf>0?bb*9/ipf:0};
}
function pitAgg(filtGids){
  const src=filtGids?S.pit_bf.filter(e=>filtGids.has(e.gid)):S.pit_bf;
  const pnos=[...new Set(src.map(e=>e.pno))];
  return pnos.map(pno=>{
    const p=ROSTER.find(x=>x.no===pno)||{name:'#'+pno};
    const g=new Set(src.filter(e=>e.pno===pno).map(e=>e.gid)).size;
    return{...calcPitStats(pno,null,filtGids),name:p.name,no:pno,g};
  }).sort((a,b)=>a.era-b.era);
}
function getBattersThisGame(){
  if(!S.game)return ROSTER.filter(p=>p.r==='b');
  const app=new Set(S.blog.filter(e=>e.gid===S.game.id).map(e=>e.pno));
  const all=ROSTER.filter(p=>p.r==='b');
  return[...all.filter(p=>app.has(p.no)),...all.filter(p=>!app.has(p.no))];
}
function getRunsThisGame(pno){
  if(!S.game)return 0;
  return S.blog.filter(e=>e.gid===S.game.id&&e.pno===pno).reduce((s,e)=>s+(e.run||0),0);
}
function gameScore(gid){
  var our=S.blog.filter(function(e){return e.gid===gid;}).reduce(function(s,e){return s+(e.run||0);},0);
  var opp=S.pit_runs.filter(function(e){return e.gid===gid;}).length;
  var hasBat=S.blog.some(function(e){return e.gid===gid;});
  var hasPit=S.pit_runs.some(function(e){return e.gid===gid;});
  return{our:our,opp:opp,has:hasBat||hasPit};
}
function pendingCount(){
  return S.blog.filter(e=>!S.syncedIds.has(e.id)).length
    +S.pit_bf.filter(e=>!S.syncedIds.has(e.id)).length
    +S.pit_runs.filter(e=>!S.syncedIds.has(e.id)).length
    +S.games.filter(g=>!S.syncedIds.has('g_'+g.id)).length
    +(S.deletedGids&&S.deletedGids.length?S.deletedGids.length:0)
    +(S.rosterDirty?1:0);
}

async function doLogin(){
  var pin=(document.getElementById('pin-input')||{}).value||'';
  var errEl=document.getElementById('pin-err');
  if(!pin){if(errEl)errEl.textContent='PINмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.';return;}
  if(!S.scriptUrl){localLogin();return;}
  if(errEl)errEl.textContent='нҷ•мқё мӨ‘...';
  try{
    var res=await fetch(S.scriptUrl+'?action=login&pin='+encodeURIComponent(pin));
    var data=await res.json();
    if(data.status==='ok'&&data.role){
      sessionStorage.setItem('bb_role',data.role);
      S.role=data.role;
      document.getElementById('login-overlay').style.display='none';
      r();
    }else{
      if(errEl)errEl.textContent=data.message||'PINмқҙ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ.';
    }

    if(errEl)errEl.textContent='м„ңлІ„м—җ м—°кІ°н•  мҲҳ м—ҶмҠөлӢҲлӢӨ.';
  }
}
function localLogin(){
  sessionStorage.setItem('bb_role','admin');
  S.role='admin';
  document.getElementById('login-overlay').style.display='none';
  r();
}
function doLogout(){
  sessionStorage.removeItem('bb_role');
  S.role=null;
  renderLogin();
}

function saveSetupSchool(){

async function saveSetupUrl(){
  var el=document.getElementById('su-url');
  var url=el?el.value.trim():'';
  var st=document.getElementById('su-connst');
  var btn=document.getElementById('su-fetch-btn');
  if(!url){
    if(st){st.textContent='вҡ  URLмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.';st.style.color='#fca5a5';}
    return;
  }
  if(st){st.textContent='вҸі лҚ°мқҙн„° л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...';st.style.color='rgba(255,255,255,.6)';}
  if(btn){btn.disabled=true;btn.textContent='л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...';}
  try{
    var res=await fetch(url+'?action=fetch');
    var data=await res.json();
    if(data.status!=='ok')throw new Error(data.message||'м„ңлІ„ мҳӨлҘҳ');
    S.scriptUrl=url;
    S.games=data.games||[];
    S.blog=data.bat_log||[];
    S.pit_bf=data.pit_bf||[];
    S.pit_runs=data.pit_runs||[];
    if(data.roster&&data.roster.length>0){parseRosterSiblings(data.roster);ROSTER.splice(0,ROSTER.length,...data.roster);}
    S.syncedIds=new Set();
    (data.games||[]).forEach(function(g){S.syncedIds.add('g_'+g.id);});
    (data.bat_log||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_bf||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_runs||[]).forEach(function(e){S.syncedIds.add(e.id);});
    if(data.teamName)S.schoolName=data.teamName;
    S.lastSync=Date.now();save();
    // нҒҙлқјмҡ°л“ңм—җм„ң нҢҖлӘ…мқҙ мҷ”мңјл©ҙ step 2(нҢҖлӘ… мһ…л Ҙ) кұҙл„ҲлңҖ
    S.setupStep=S.schoolName?3:2;renderSetup();
  }catch(err){
    if(st){st.textContent='вң— м—°кІ° мӢӨнҢЁ вҖ” URLмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”';st.style.color='#fca5a5';}
    if(btn){btn.disabled=false;btn.textContent='м—°кІ° л°Ҹ л¶Ҳлҹ¬мҳӨкё°';}
  }
}
function finishSetup(asAdmin){
  S.setupDone=true;
  if(asAdmin){
    if(!S.scriptUrl){S.role='admin';sessionStorage.setItem('bb_role','admin');}
    else{S.role=null;sessionStorage.removeItem('bb_role');}
  } else {
    S.role='user';sessionStorage.setItem('bb_role','user');
  }
  save();
  document.getElementById('setup-overlay').style.display='none';
  renderLogin();r();
}

  S.showPlayerSel=false;save();
  document.getElementById('setup-overlay').style.display='none';
  r();
}

function renderGHdr(){
  const pc=pendingCount();
  const isFirstVisit=!S.setupDone;
  const isUser=S.role==='user';
  var scoreHtml='';
  if(S.game&&(S.tab===0||S.tab===1)){
    var sc=gameScore(S.game.id);
    scoreHtml='<div class="gh-score">'
      +'<div class="gh-score-num">'+sc.our+' : '+sc.opp+'</div>'
      +'<div class="gh-score-lbl"><span>мҡ°лҰ¬</span><span>мғҒлҢҖ</span></div>'
      +'</div>';
  }
  document.getElementById('ghdr').innerHTML=S.game
    ?('<div class="ghdr"><div><div class="gh-title">vs '+esc(S.game.opp)+'</div>'
      +'<div class="gh-sub">'+esc(S.game.date)+(S.game.no!=null?' В· G'+String(S.game.no).padStart(2,'0'):'')
      +(S.game.type==='P'?' В· <span style="background:rgba(255,255,255,.25);border-radius:3px;padding:1px 6px;font-size:10px">м—°мҠө</span>':'')

      +'<div class="gh-right">'
      +'<button class="gh-icon" onclick="setTab(4)">вҳҒ'+(pc>0?'<div class="pdot"></div>':'')+'</button>'
      +(!isUser?'<button class="gh-btn" onclick="showGameModal()" style="background:rgba(255,255,255,.15)">ліҖкІҪ</button>':'')
      +(!isUser?'<button class="gh-btn" onclick="endGame()" style="background:#c0392b;font-weight:700">в–  мў…лЈҢ</button>':'')
      +(isUser?'<button class="gh-btn" onclick="leaveGame()" style="background:rgba(255,255,255,.15)">вҶҗ лӮҳк°Җкё°</button>':'')
      +'</div></div>')
    :('<div class="ghdr"><div>'
      +'<div class="gh-title">вҡҫ лӘЁм•јлӘЁм•ј-мҡ°лҰ¬м•„мқҙ м•јкө¬ кё°лЎқ</div>'
      +'<div class="gh-sub">'+(isFirstVisit?'рҹ‘Ү м„Өм • нғӯм—җм„ң мҙҲкё° м„Өм •мқ„ мӢңмһ‘н•ҳм„ёмҡ”':'кІҪкё°лҘј мӢңмһ‘н•ҳм„ёмҡ”')+'</div>'
      +'</div>'
      +'<div class="gh-right">'
      +(pc>0?'<button class="gh-icon" style="position:relative" onclick="setTab(4)">вҳҒ<div class="pdot"></div></button>':'')
      +(isFirstVisit?'<button class="gh-btn" style="background:#f59e0b;color:#78350f;font-weight:700" onclick="setTab(4)">вҡҷ мҙҲкё° м„Өм •</button>':'<button class="gh-btn" onclick="showGameModal()">+ кІҪкё° мӢңмһ‘</button>')
      +'</div></div>');
}
function renderTabs(){
  const ts=[{e:'вҡҫ',l:'нғҖмһҗмһ…л Ҙ'},{e:'рҹҺҜ',l:'нҲ¬мҲҳмһ…л Ҙ'},{e:'рҹ“Ӣ',l:'кё°лЎқ'},{e:'рҹ“Ҡ',l:'нҶөкі„'},{e:'вҡҷ',l:'м„Өм •'}];
  const isRecorder=S.role==='recorder';
  document.getElementById('tbr').innerHTML=ts.map((t,i)=>{
    if(isRecorder&&i===3)return'';
    return '<button class="tab'+(S.tab===i?' on':'')+'" onclick="setTab('+i+')">'
      +'<span style="display:block;font-size:22px;margin-bottom:2px">'+t.e+'</span>'+t.l+'</button>';
  }).join('');
}
function renderCt(){
  const el=document.getElementById('ct');
  var sibHtml='';
  if(S.role==='user'&&S.myPlayer&&(S.tab===2||S.tab===3)){
    var me=ROSTER.find(function(x){return x.no===S.myPlayer;});
    var sibs=getSiblingGroup();
    if(sibs.length){
      var curNo=activeNo();
      var allPlayers=[{no:S.myPlayer,name:(me||{}).name||''}].concat(sibs.map(function(p){return{no:p.no,name:p.name};}));
      sibHtml='<div style="display:flex;background:var(--card);border-bottom:2px solid var(--bdr);overflow-x:auto">'
        +allPlayers.map(function(p){
          var sel=p.no===curNo;
          return '<button onclick="S.activeChild='+p.no+';renderCt()" style="flex:1;min-width:80px;padding:12px 4px 10px;background:none;border:none;border-bottom:'+(sel?'3px solid var(--navy)':'3px solid transparent')+';color:'+(sel?'var(--navy)':'var(--txt)')+';font-weight:'+(sel?'700':'400')+';cursor:pointer;font-family:inherit;margin-bottom:-2px">'
            +'<div style="font-size:17px;font-weight:700">#'+p.no+'</div>'
            +'<div style="font-size:12px">'+esc(p.name)+'</div>'
            +'</button>';
        }).join('')
        +'</div>';
    }
  }
  if(S.tab===0)el.innerHTML=rBatTab();
  else if(S.tab===1)el.innerHTML=rPitTab();
  else if(S.tab===2)el.innerHTML=sibHtml+rLog();
  else if(S.tab===3)el.innerHTML=sibHtml+rStats();
  else el.innerHTML=rSettings();
}
function r(){renderSetup();renderPlayerSel();renderLogin();renderGHdr();renderTabs();renderCt();}
function setTab(i){if(i===3&&S.role==='recorder')return;S.tab=i;r();if(i===3)checkAndLoadStats();}

// в”Җв”Җ нғҖмһҗ нғӯ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function rBatTab(){
  if(!S.game)return '<div class="empty" style="padding:40px 24px;line-height:2.2;text-align:center">вҡҫ<br><strong style="font-size:15px">кІҪкё°к°Җ мӢңмһ‘лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ</strong><br><span style="font-size:13px;color:var(--txt2)">нғҖмһҗ кё°лЎқмқ„ мһ…л Ҙн•ҳл Өл©ҙ<br>кІҪкё°лҘј лЁјм Җ мӢңмһ‘н•ҙмЈјм„ёмҡ”</span><br><br><button class="savebtn" onclick="showGameModal()">+ кІҪкё° мӢңмһ‘</button></div>';
  return S.bs===0?rBatPSel():S.bs===1?rOCSel('bat'):S.bs===2?rRunConfirm():rExtras();
}
function rRunInput(){
  const batters=getBattersThisGame();
  const app=S.game?new Set(S.blog.filter(e=>e.gid===S.game.id).map(e=>e.pno)):new Set();
  let h='<div class="runlist"><p style="padding:4px 0 10px;font-size:11px;color:var(--txt2);line-height:1.6">нҷҲмқ„ л°ҹлҠ” мҲңк°„ н•ҙлӢ№ м„ мҲҳмқҳ <strong style="color:var(--navy)">+ л“қм җ</strong>мқ„ нғӯн•ҳм„ёмҡ”.</p>';
  batters.forEach(p=>{
    const runs=getRunsThisGame(p.no);
    const active=app.has(p.no);
    h+='<div class="runitem" id="rr-'+p.no+'" style="'+(active?'':'opacity:.4')+'">'
      +'<div class="runno" style="background:'+(active?'var(--navy)':'#9ca3af')+'">'+p.no+'</div>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--txt)">'+esc(p.name)+'</div>'
      +'<div style="font-size:11px;color:var(--txt2)">'+(active?'мқҙлІҲ кІҪкё° '+runs+'л“қм җ':'лҜём¶ңм „')+'</div></div>'
      +'<button class="runbtn" style="background:var(--navy)" onclick="addBatRun('+p.no+')">+ л“қм җ</button>'
      +'</div>';
  });
  return h+'</div>';
}
function getAllowedNos(){
  if(S.role!=='user')return null;
  var nos=S.myPlayer!=null?[S.myPlayer]:[];
  getSiblingGroup().forEach(function(p){if(nos.indexOf(p.no)<0)nos.push(p.no);});
  return nos;
}
function rBatPSel(){
  let h=rBaseDiagram();
  h+='<div class="seclbl">м„ мҲҳ м„ нғқ</div><div class="pgrid">';
  const allowedNos=getAllowedNos();
  ROSTER.filter(p=>p.r==='b'&&(!allowedNos||allowedNos.indexOf(p.no)>=0)).forEach(p=>{
    h+='<button class="pbtn'+(S.bp===p.no?' sel-b':'')+'" onclick="selBat('+p.no+')">'
      +'<div class="pno b">'+p.no+'</div>'
      +'<div><div class="pn">'+esc(p.name)+'</div><div class="pp">'+esc(p.pos)+'</div></div>'
      +'</button>';
  });
  return h+'</div>';
}
function rOCSel(mode){
  const isP=mode==='pit';
  const p=isP?ROSTER.find(x=>String(x.no)===String(S.curPit)):ROSTER.find(x=>String(x.no)===String(S.bp));
  if(!p)return'<div class="empty">м„ мҲҳлҘј лЁјм Җ м„ нғқн•ҳм„ёмҡ”</div>';
  let h='<div class="shdr"><button class="back" onclick="'+(isP?'S.curPit=null':'S.bs=0')+';r()">вҶҗ</button>'
    +'<div><div class="s-title">'+esc(p.name)+' <span style="font-size:11px;color:var(--txt2)">#'+p.no+'</span></div>'
    +'<div class="s-sub">'+(isP?'мғҒлҢҖ нғҖмһҗ кІ°кіј мһ…л Ҙ':'нғҖм„қ кІ°кіј м„ нғқ')+'</div></div></div>';
  h+='<div class="ocsec"><div class="oclbl">м•ҲнғҖ / м¶ңлЈЁ</div><div class="ocgrid">';
  [...OC_HIT,...OC_OB].forEach(o=>{
    h+='<button class="ocbtn" style="background:'+o.bg+';color:'+o.fg+'" onclick="'+(isP?'pitSelOC':'selOC')+'(\''+o.id+'\')">'+o.l+'</button>';
  });
  h+='</div><div class="oclbl" style="margin-top:8px">м•„мӣғ</div><div class="ocgrid">';
  OC_OUT.forEach(o=>{
    h+='<button class="ocbtn" style="background:'+o.bg+';color:'+o.fg+'" onclick="'+(isP?'pitSelOC':'selOC')+'(\''+o.id+'\')">'+o.l+'</button>';
  });
  h+='</div></div>';
  if(!isP)h+=rBaseDiagram();
  return h;
}

      +(S.bzone

        :'<div style="font-size:13px;color:#D97706">кіөмқҙ лӮ м•„к°„ л°©н–Ҙмқ„ м„ нғқн•ҙмЈјм„ёмҡ”</div>')

function rPitTab(){
  if(!S.game)return '<div class="empty" style="padding:40px 24px;line-height:2.2;text-align:center">рҹҺҜ<br><strong style="font-size:15px">кІҪкё°к°Җ мӢңмһ‘лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ</strong><br><span style="font-size:13px;color:var(--txt2)">нҲ¬мҲҳ кё°лЎқмқ„ мһ…л Ҙн•ҳл Өл©ҙ<br>кІҪкё°лҘј лЁјм Җ мӢңмһ‘н•ҙмЈјм„ёмҡ”</span><br><br><button class="savebtn" onclick="showGameModal()">+ кІҪкё° мӢңмһ‘</button></div>';
  if(S.curPit===null||S.curPit===undefined){
    let h='<div class="seclbl">нҳ„мһ¬ нҲ¬мҲҳ м„ нғқ</div><div class="pgrid">';
    const pitAllowedNos=getAllowedNos();
    ROSTER.filter(p=>p.r==='p'&&(!pitAllowedNos||pitAllowedNos.indexOf(p.no)>=0)).forEach(p=>{
      h+='<button class="pbtn'+(S.curPit===p.no?' sel-r':'')+'" onclick="selPit('+p.no+')">'
        +'<div class="pno r">'+p.no+'</div>'
        +'<div><div class="pn">'+esc(p.name)+'</div><div class="pp">'+esc(p.pos)+'</div></div>'
        +'</button>';
    });
    return h+'</div>';
  }
  const p=ROSTER.find(x=>String(x.no)===String(S.curPit));
  if(!p){S.curPit=null;return rPitTab();}
  const gid=S.game?S.game.id:null;
  const st=calcPitStats(S.curPit,gid);
  let h='<div class="pcard">'
    +'<div class="pcard-hdr"><div class="pcard-l">'
    +'<div class="pav">'+p.no+'</div>'
    +'<div><div class="pcard-name">'+esc(p.name)+'</div><div class="pcard-role">'+esc(p.pos)+' В· нҲ¬кө¬ мӨ‘</div></div>'
    +'</div><button class="pchg" onclick="S.curPit=null;r()">вҮ„ көҗмІҙ</button></div>'
    +'<div class="pstats">'
    +['<div class="pstat em"><div class="pstat-val">'+st.ipd+'</div><div class="pstat-lbl">IP</div></div>',
      '<div class="pstat"><div class="pstat-val">'+st.h+'</div><div class="pstat-lbl">н”јм•ҲнғҖ</div></div>',
      '<div class="pstat"><div class="pstat-val">'+st.bb+'</div><div class="pstat-lbl">ліјл„·</div></div>',
      '<div class="pstat"><div class="pstat-val">'+st.k+'</div><div class="pstat-lbl">мӮјм§„</div></div>',
      '<div class="pstat em"><div class="pstat-val">'+st.er+'</div><div class="pstat-lbl">мһҗмұ…</div></div>',
    ].join('')+'</div></div>';
  h+=rOCSel('pit');
  h+=rPitBaseDiagram();
  var gidNow=S.game?S.game.id:null;
  var runsNow=S.pit_runs.filter(function(e){return e.pno===S.curPit&&(gidNow?e.gid===gidNow:true);});
  if(runsNow.length){
    var erNow=runsNow.filter(function(e){return e.earned;}).length;
    var uerNow=runsNow.length-erNow;
    h+='<div style="margin:0 12px 12px;padding:8px 12px;background:var(--bg2);border-radius:var(--r);font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:8px">'
      +'<span>мқҙлӢқ мӢӨм җ</span>'
      +'<span style="background:#fee2e2;color:#b91c1c;border-radius:4px;padding:2px 8px;font-weight:700">мһҗмұ… '+erNow+'</span>'
      +'<span style="background:var(--bdr);color:var(--txt2);border-radius:4px;padding:2px 8px;font-weight:700">л№„мһҗмұ… '+uerNow+'</span>'
      +'<button onclick="addPitRun(true)" style="margin-left:auto;background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 8px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit">+ мҲҳлҸҷ</button>'
      +'</div>';
  }
  return h;
}

  const gid=S.game?S.game.id:null;
  const runs=S.pit_runs.filter(e=>e.pno===S.curPit&&(gid?e.gid===gid:true));
  const er=runs.filter(e=>e.earned).length,ur=runs.filter(e=>!e.earned).length;
  let h='<div class="runsec"><p style="font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:10px">мӢӨм җ л°ңмғқ мӢң кө¬л¶„н•ҙм„ң нғӯн•ҳм„ёмҡ”</p>'

    +'<button class="rbigbtn uearn" onclick="addPitRun(false)">рҹ’§+ л№„мһҗмұ…м җ<br><span style="font-size:11px;opacity:.7">ERA лҜёл°ҳмҳҒ</span></button>'

    +'<div class="rminirow">'
    +'<div class="rmini"><div class="rminiv" style="color:var(--red)">'+er+'</div><div class="rminil">мһҗмұ…м җ (ER)</div></div>'
    +'<div class="rmini"><div class="rminiv" style="color:var(--txt2)">'+ur+'</div><div class="rminil">л№„мһҗмұ… (UER)</div></div>'
    +'<div class="rmini"><div class="rminiv">'+(er+ur)+'</div><div class="rminil">мҙқ мӢӨм җ (R)</div></div>'
    +'</div>';
  if(runs.length){
    h+='<p style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px">мӢӨм җ кё°лЎқ</p><div>';
    runs.slice().reverse().forEach(e=>{
      h+='<div class="rlogitem" onclick="showEditPitRunModal(\''+e.id+'\')" style="cursor:pointer"><div class="rdot '+(e.earned?'e':'u')+'"></div>'

        +'<span style="font-size:11px;color:var(--txt2)">вңҸ нҺём§‘/мӮӯм ң</span>'
        +'</div>';
    });
    h+='</div>';
  }
  return h+'</div>';
}

}
function togglePitPlayer(pno){
  if(!S.pitExpanded)S.pitExpanded={};

  renderCt();
}
function rLog(){
  // м „мІҙ кІҪкё° лӘ©лЎқ мҲҳм§‘
  const allGames=[...S.games].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  // blog/pit_bfм—җм„ң game м •ліҙ ліҙмҷ„
  const knownGids=new Set(allGames.map(g=>g.id));
  const usedGids=[...new Set([...S.blog.map(e=>e.gid),...S.pit_bf.map(e=>e.gid)])].filter(Boolean);
  usedGids.forEach(gid=>{
    if(!knownGids.has(gid)){
      const sample=S.blog.find(e=>e.gid===gid)||S.pit_bf.find(e=>e.gid===gid);
      if(sample){allGames.push({id:gid,no:'?',date:sample.date||'',opp:sample.opp||'?'});knownGids.add(gid);}
    }
  });
  allGames.sort((a,b)=>String(b.date).localeCompare(String(a.date)));

  if(!allGames.length)
    return'<div class="empty">рҹ“Ӣ<br><br>кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';

  // м„ нғқ кІҪкё°
  const selGid=S.logGameId;

  // лӢ¬л Ҙ н‘ңмӢң мӣ” кІ°м • (кё°ліё: нҳ„мһ¬ л…„/мӣ”)
  const now=new Date();
  const todayMon=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  let calMon=S.calMonth||todayMon;
  const calY=parseInt(calMon.slice(0,4)),calM=parseInt(calMon.slice(5,7));
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const nextMon=calM===12?(calY+1)+'-01':calY+'-'+String(calM+1).padStart(2,'0');
  const firstDow=new Date(calY,calM-1,1).getDay();
  const daysInMon=new Date(calY,calM,0).getDate();

  // мқҙ лӢ¬мқҳ кІҪкё° л§ө {dd -> game}
  const gameMap={};
  allGames.forEach(g=>{
    if(g.date&&g.date.slice(0,7)===calMon){
      const dd=g.date.slice(8,10);
      if(!gameMap[dd])gameMap[dd]=g;
    }
  });

  // лӢ¬л Ҙ л ҢлҚ”
  const DOW=['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];
  let h='<div class="cal-wrap">';
  h+='<div class="cal-nav">'
    +'<button onclick="S.calMonth=\''+prevMon+'\';S.logGameId=null;renderCt()">&#8249;</button>'
    +'<span>'+calY+'л…„ '+calM+'мӣ”</span>'
    +'<button onclick="S.calMonth=\''+nextMon+'\';S.logGameId=null;renderCt()">&#8250;</button>'
    +'</div>';
  h+='<div class="cal-grid">';
  DOW.forEach(function(d,i){
    h+='<div class="cal-dow" style="color:'+(i===0?'#ef4444':i===6?'#3b82f6':'var(--txt2)')+'">'+d+'</div>';
  });
  for(var ei=0;ei<firstDow;ei++)h+='<div class="cal-cell"></div>';
  for(var day=1;day<=daysInMon;day++){
    var ds=String(day).padStart(2,'0');
    var g=gameMap[ds];
    var isSel=g&&g.id===S.logGameId;
    var isOff=g&&(g.type||'O')==='O';
    var dow=new Date(calY,calM-1,day).getDay();
    var dc=dow===0?'#ef4444':dow===6?'#3b82f6':'var(--txt)';
    var isCurG=g&&S.game&&g.id===S.game.id;
    h+='<div class="cal-cell'+(g?' has-game':'')+(isSel?' selected':'')+'"'
      +(g?' onclick="var _gid=\''+g.id+'\';S.logGameId=(_gid===S.logGameId?null:_gid);S.calMonth=\''+calMon+'\';S.logExpanded={};S.pitExpanded={};S.logSection=\'bat\';renderCt()"':'')+' >';
    h+='<span class="cal-day" style="color:'+dc+'">'+(isCurG?'<strong>'+day+'</strong>':day)+'</span>';
    if(g)h+='<span class="cal-dot" style="background:'+(isOff?'var(--navy)':'#16a34a')+'"></span>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="cal-legend">'
    +'<span><span class="cal-dot" style="background:var(--navy);display:inline-block"></span>м •мӢқкІҪкё°</span>'
    +'<span><span class="cal-dot" style="background:#16a34a;display:inline-block"></span>м—°мҠөкІҪкё°</span>'
    +'</div>';

  // м„ нғқ кІҪкё° мҡ”м•Ҫ (лӮ м§ң нҒҙлҰӯ мӢңл§Ң)
  if(selGid){
    const selGame=allGames.find(function(g){return g.id===selGid;});
    if(selGame){
      var sd=selGame.date||'';
      var sdParts=sd.split('-');
      var sdow=sd?['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
      var isOffSel=(selGame.type||'O')==='O';
      var isCurSel=S.game&&S.game.id===selGid;
      h+='<div class="cal-summary">';
      var selSc=gameScore(selGid);
      if(selSc.has){
        var selWin=selSc.our>selSc.opp,selLose=selSc.our<selSc.opp;
        h+='<div style="display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 0 8px;border-bottom:1px solid var(--bdr);margin-bottom:8px">'
          +'<div style="text-align:center"><div style="font-size:11px;color:var(--txt2);margin-bottom:2px">мҡ°лҰ¬нҢҖ</div>'
          +'<div style="font-size:32px;font-weight:900;color:'+(selWin?'#16a34a':'var(--txt)')+'">'+selSc.our+'</div></div>'
          +'<div style="text-align:center"><div style="font-size:14px;font-weight:700;padding:4px 10px;border-radius:6px;background:'+(selWin?'#dcfce7':selLose?'#fee2e2':'var(--bg2)')+';color:'+(selWin?'#15803d':selLose?'#dc2626':'var(--txt2)')+';">'+(selWin?'мҠ№':selLose?'нҢЁ':'л¬ҙ')+'</div></div>'
          +'<div style="text-align:center"><div style="font-size:11px;color:var(--txt2);margin-bottom:2px">мғҒлҢҖнҢҖ</div>'
          +'<div style="font-size:32px;font-weight:900;color:'+(selLose?'#dc2626':'var(--txt)')+'">'+selSc.opp+'</div></div>'
          +'</div>';
      }
      h+='<div class="cal-sum-date">';
      if(sd)h+=parseInt(sdParts[1])+'мӣ” '+parseInt(sdParts[2])+'мқј ('+sdow+') &nbsp;';
      h+='vs '+esc(selGame.opp);
      h+=' <span style="background:'+(isOffSel?'#EBF0FB':'#dcfce7')+';color:'+(isOffSel?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 8px;font-size:11px;font-weight:600">'+(isOffSel?'м •мӢқ':'м—°мҠө')+'</span>';
      if(selGame.status==='active'||(selGame.status===undefined&&isCurSel))
        h+=' <span style="background:#fee2e2;color:#b91c1c;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:700">м§„н–үмӨ‘</span>';
      else if(selGame.status==='ended')
        h+=' <span style="background:#f3f4f6;color:#6b7280;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:600">мў…лЈҢ</span>';
      var _canManageGame=(S.role==='admin'||S.role==='recorder'||!S.role);
      if(_canManageGame){
        h+='<button onclick="showEditGameModal(\''+selGid+'\')" style="margin-left:auto;background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit;flex-shrink:0">вңҸ мҲҳм •</button>';
        if(selGame.status==='active')
          h+='<button onclick="forceEndGame(\''+selGid+'\')" style="background:none;border:1px solid #fbbf24;border-radius:var(--r);padding:3px 10px;font-size:11px;color:#b45309;cursor:pointer;font-family:inherit;flex-shrink:0">вҸ№ к°•м ңмў…лЈҢ</button>';
        else
          h+='<button onclick="delGame(\''+selGid+'\')" style="background:none;border:1px solid #fca5a5;border-radius:var(--r);padding:3px 10px;font-size:11px;color:#dc2626;cursor:pointer;font-family:inherit;flex-shrink:0">рҹ—‘ мӮӯм ң</button>';
      }
      h+='</div>';
      var _isAddAllowed=(S.role==='admin'||S.role==='recorder'||!S.role);
      if(_isAddAllowed){
        h+='<div style="display:flex;gap:8px;margin-top:10px">'
          +'<button onclick="startAddToGame(\''+selGid+'\',\'bat\')" style="flex:1;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">вҡҫ нғҖмһҗ кё°лЎқ м¶”к°Җ</button>'
          +'<button onclick="startAddToGame(\''+selGid+'\',\'pit\')" style="flex:1;background:var(--red);color:#fff;border:none;border-radius:var(--r);padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">рҹҺҜ нҲ¬мҲҳ кё°лЎқ м¶”к°Җ</button>'
          +'</div>';
      }

      // лҢҖн‘ң м„ мҲҳ кё°лЎқ
      var _an=activeNo();
      if(_an){
        var mp=ROSTER.find(function(x){return x.no===_an;});
        if(mp){
          var mpBat=S.blog.filter(function(e){return e.gid===selGid&&e.pno===_an;});
          var mpPit=S.pit_bf.filter(function(e){return e.gid===selGid&&e.pno===_an;});
          h+='<div class="cal-sum-player">#'+mp.no+' '+mp.name+'</div>';
          if(mpBat.length){
            var bAB=0,bH=0,bRBI=0;
            mpBat.forEach(function(e){var s=paS(e.oc);bAB+=s.ab;bH+=s.h;bRBI+=e.rbi||0;});
            h+='<div class="cal-sum-stat">нғҖкІ© В· '+bAB+'нғҖмҲҳ '+bH+'м•ҲнғҖ'+(bRBI?' В· '+bRBI+'нғҖм җ':'')+'</div>';
          }
          if(mpPit.length){
            var ps=calcPitStats(_an,selGid);
            h+='<div class="cal-sum-stat">нҲ¬мҲҳ В· '+ps.ipd+'мқҙлӢқ'+(ps.r?' В· '+ps.r+'мӢӨм җ (мһҗмұ… '+ps.er+')':'')+'</div>';
          }
          if(!mpBat.length&&!mpPit.length)
            h+='<div class="cal-sum-stat" style="color:var(--txt2)">мқҙ кІҪкё° кё°лЎқ м—ҶмқҢ</div>';
        }
      } else {
        h+='<div class="cal-sum-stat" style="color:var(--txt2);font-size:12px">м„Өм •м—җм„ң лҢҖн‘ң м„ мҲҳлҘј м§Җм •н•ҳл©ҙ к°ңмқё кё°лЎқмқҙ н‘ңмӢңлҗ©лӢҲлӢӨ.</div>';
      }
      h+='</div>';
    }
  }
  h+='</div>';

  // лӮ м§ң м—Ҷкұ°лӮҳ л№Ҳ кІҪкё° ліөкө¬ м„№м…ҳ
  const noDateGames=allGames.filter(g=>!g.date||!g.date.match(/^\d{4}-\d{2}-\d{2}$/));
  if(noDateGames.length){
    h+='<div style="margin:8px 12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--rl);padding:12px 14px">';
    h+='<div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:8px">вҡ  лӢ¬л Ҙм—җ н‘ңмӢңлҗҳм§Җ м•ҠмқҖ кІҪкё° ('+noDateGames.length+'к°ң)</div>';
    h+='<div style="font-size:11px;color:#78350f;margin-bottom:10px;line-height:1.6">лӮ м§ң м •ліҙк°Җ м—Ҷм–ҙ лӢ¬л Ҙм—җ н‘ңмӢңлҗҳм§Җ м•ҠмҠөлӢҲлӢӨ. мҲҳм • лІ„нҠјмқ„ лҲҢлҹ¬ лӮ м§ңлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.</div>';
    noDateGames.forEach(function(g){
      var bCnt=S.blog.filter(function(e){return e.gid===g.id;}).length;
      var pCnt=S.pit_bf.filter(function(e){return e.gid===g.id;}).length;
      h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid #fcd34d">';
      h+='<div style="flex:1">';
      h+='<div style="font-size:13px;font-weight:600;color:var(--txt)">vs '+esc(g.opp||'?')+'</div>';
      h+='<div style="font-size:11px;color:var(--txt2)">нғҖм„қ '+bCnt+' В· нҲ¬мҲҳ '+pCnt+'нғҖмһҗ</div>';
      h+='</div>';
      h+='<button onclick="showEditGameModal(\''+g.id+'\')" style="background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">лӮ м§ң мһ…л Ҙ</button>';
      h+='</div>';
    });
    h+='</div>';
  }

  if(!selGid){
    // лӮ м§ң лҜём„ нғқ: мӣ”к°„ м „мІҙ кё°лЎқ л·°
    h+=rLogMonthly(allGames,calMon,calY,calM);
    return h;
  }

  // лӮ м§ң м„ нғқ: н•ҙлӢ№ кІҪкё° мғҒм„ё кё°лЎқ
  const be=S.blog.filter(e=>e.gid===selGid);
  const pbf=S.pit_bf.filter(e=>e.gid===selGid);
  const pr=S.pit_runs.filter(e=>e.gid===selGid);
  const myHighlight=(S.role==='user')?Number(activeNo()):null;

  if(!be.length&&!pbf.length){
    const gidSynced=S.syncedIds.has('g_'+selGid);
    const gidDownloaded=S.downloadedGids.has(selGid);
    const needsLoad=gidSynced&&!gidDownloaded&&S.scriptUrl&&navigator.onLine;
    if(S.logLoading){
      h+='<div style="padding:32px 24px;text-align:center;color:var(--txt2)"><span style="font-size:24px">вҸі</span><br><span style="font-size:13px">кё°лЎқ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</span></div>';
      return h;
    }
    if(needsLoad&&!S.logLoading){
      S.logLoading=true;
      fetchRecordsByGids([selGid]).then(function(){
        S.logLoading=false;
        if(S.tab===2)renderCt();
      });
      h+='<div style="padding:32px 24px;text-align:center;color:var(--txt2)"><span style="font-size:24px">вҸі</span><br><span style="font-size:13px">кё°лЎқ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</span></div>';
      return h;
    }
    h+='<div class="empty" style="padding:24px">мқҙ кІҪкё°мқҳ кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';
    return h;
  }

  // нғҖмһҗ/нҲ¬мҲҳ м„№м…ҳ нғӯ
  var logSec=S.logSection||'bat';
  var secTabS='flex:1;padding:12px 0;border:none;border-bottom:3px solid transparent;background:transparent;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--txt2);';
  h+='<div style="display:flex;border-bottom:1px solid var(--bdr);margin-bottom:4px">'
    +'<button onclick="S.logSection=\'bat\';renderCt()" style="'+secTabS+(logSec==='bat'?'border-bottom-color:var(--navy);color:var(--navy)':'')+'">вҡҫ нғҖмһҗ кё°лЎқ'+(be.length?' ('+be.length+')':'')+'</button>'
    +'<button onclick="S.logSection=\'pit\';renderCt()" style="'+secTabS+(logSec==='pit'?'border-bottom-color:var(--red);color:var(--red)':'')+'">рҹҺҜ нҲ¬мҲҳ кё°лЎқ'+(pbf.length?' ('+pbf.length+')':'')+'</button>'
    +'</div>';

  if(logSec==='bat'&&be.length){
    var logView=S.logView||'seq';
    var aBtnS='border:none;border-radius:var(--r);padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;min-height:36px;';
    var aBtnOff='background:#e5e7eb;color:#111827;';
    h+='<div class="seclbl" style="display:flex;align-items:center;gap:6px">'
      +'<span style="flex:1">нғҖмһҗ кё°лЎқ ('+be.length+'нғҖм„қ)</span>'
      +'<button onclick="S.logView=\'seq\';renderCt()" style="'+aBtnS+(logView==='seq'?'background:var(--navy);color:#fff':aBtnOff)+'">нғҖм„қмҲң</button>'
      +'<button onclick="S.logView=\'player\';renderCt()" style="'+aBtnS+(logView==='player'?'background:var(--navy);color:#fff':aBtnOff)+'">м„ мҲҳлі„</button>'
      +'</div>';

    if(logView==='seq'){
      be.slice().reverse().forEach(function(e){
        var oc=ocInfo(e.oc);
        var ex=[];
        if(e.rbi>0)ex.push(e.rbi+'нғҖм җ');
        if(e.run>0)ex.push(e.run+'л“қм җ');
        if(e.sb>0)ex.push('лҸ„лЈЁ');
        if(e.zone)ex.push('рҹ“Қ'+e.zone);
        var sy=S.syncedIds.has(e.id);
        var isMyChild=myHighlight&&Number(e.pno)===myHighlight;
        h+='<div class="logitem" style="'+(isMyChild?'background:#EBF4FF;border-left:3px solid var(--navy);':'')+'"">'
          +'<div class="logbadge" style="background:'+oc.bg+';color:'+oc.fg+';font-size:10px">'+oc.l+'</div>'
          +'<div style="flex:1;min-width:0">'
          +'<div class="logplayer">'+esc(e.pn)+(isMyChild?' <span style="font-size:10px;background:var(--navy);color:#fff;padding:1px 5px;border-radius:3px;font-weight:700">вҳ… мҡ°лҰ¬ м•„мқҙ</span>':'')+' <span style="font-size:10px;color:'+(sy?'#15803d':'#f59e0b')+'">'+(sy?'вң“':'в—Ҹ')+'</span></div>'
          +'<div class="logdetail">'+(ex.length?ex.join(' В· '):'вҖ”')+'</div>'
          +'</div>'
          +'<button onclick="showEditBatModal(\''+e.id+'\')" style="background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:5px 8px;font-size:11px;color:var(--txt2);cursor:pointer;margin-right:4px;font-family:inherit">вңҸ</button>'
          +'<button class="delbtn" onclick="del(\'b\',\''+e.id+'\')">вң•</button>'
          +'</div>';
      });
    } else {
      // м„ мҲҳлі„ к·ёлЈ№ л·°
      var pGroups={},pOrder=[];
      be.forEach(function(e){
        if(!pGroups[e.pno]){pGroups[e.pno]=[];pOrder.push(e.pno);}
        pGroups[e.pno].push(e);
      });
      pOrder.forEach(function(pno){
        var entries=pGroups[pno];

// мӣ”к°„ м „мІҙ кё°лЎқ л·°
function rLogMonthly(allGames,calMon,calY,calM){
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const monGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===calMon);
  const prevGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===prevMon);
  let h='';

  // лҢҖн‘ң м„ мҲҳ мқҙлІҲлӢ¬ vs м§ҖлӮңлӢ¬ мЈјмҡ” нғҖкІ© м§Җн‘ң 3к°Җм§Җ
  if(activeNo()){
    const myNo=Number(activeNo());
    const curGids=new Set(monGames.map(g=>g.id));
    const prevGids=new Set(prevGames.map(g=>g.id));
    const curBlog=S.blog.filter(e=>curGids.has(e.gid)&&Number(e.pno)===myNo);
    const prevBlog=S.blog.filter(e=>prevGids.has(e.gid)&&Number(e.pno)===myNo);
    function calcMS(entries){
      var ab=0,h2=0,bb=0,hbp=0,sf=0,d2=0,d3=0,hr=0;
      entries.forEach(function(e){var s=paS(e.oc);ab+=s.ab;h2+=s.h;bb+=s.bb;hbp+=s.hbp;sf+=s.sf;d2+=s.d2;d3+=s.d3;hr+=s.hr;});
      var avg=ab>0?h2/ab:null;
      var obp=(ab+bb+hbp+sf)>0?(h2+bb+hbp)/(ab+bb+hbp+sf):null;
      var slg=ab>0?(h2+d2+2*d3+3*hr)/ab:null;
      var ops=(obp!==null&&slg!==null)?obp+slg:null;
      return{avg:avg,obp:obp,ops:ops,pa:entries.length,ab:ab,h:h2};
    }
    const cur=calcMS(curBlog),prev=calcMS(prevBlog);
    const mp=ROSTER.find(function(x){return x.no===myNo;});
    const mpName=mp?mp.name:'#'+myNo;
    const prevMonLabel=(prevMon.slice(0,4)===String(calY)?'':prevMon.slice(0,4)+'л…„ ')+parseInt(prevMon.slice(5,7))+'мӣ”';
    if(cur.pa>0||prev.pa>0){
      h+='<div style="margin:8px 12px 4px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:2px">'+mpName+' '+calM+'мӣ” мЈјмҡ” нғҖкІ©м§Җн‘ң <span style="font-weight:400;color:var(--txt2);font-size:11px">vs '+prevMonLabel+'</span></div>';
      h+='<div style="font-size:12px;color:var(--txt2);margin-bottom:10px">'+cur.ab+'нғҖмҲҳ '+cur.h+'м•ҲнғҖ</div>';
      h+='<div style="display:flex;gap:8px">';
      var stats2=[
        {key:'AVG',cur:cur.avg,prev:prev.avg},
        {key:'OBP',cur:cur.obp,prev:prev.obp},
        {key:'OPS',cur:cur.ops,prev:prev.ops}
      ];
      stats2.forEach(function(st){
        var cf=function(v){return v!==null?v.toFixed(3):'-';};
        var diff=(st.cur!==null&&st.prev!==null)?st.cur-st.prev:null;
        var arrow=diff===null?'':diff>0.001?'вҶ‘':diff<-0.001?'вҶ“':'вҶ’';
        var arrowC=diff===null?'var(--txt2)':diff>0.001?'#16a34a':diff<-0.001?'#dc2626':'var(--txt2)';
        h+='<div style="flex:1;text-align:center;background:var(--bg2);border-radius:var(--r);padding:10px 6px">';
        h+='<div style="font-size:10px;color:var(--txt2);margin-bottom:4px">'+st.key+'</div>';
        h+='<div style="font-size:18px;font-weight:700;color:var(--navy)">'+cf(st.cur)+'</div>';
        h+='<div style="font-size:11px;color:'+arrowC+';margin-top:3px">'+arrow+' '+cf(st.prev)+'</div>';
        h+='</div>';
      });
      h+='</div></div>';
    }
  }

  // мқҙ лӢ¬мқҳ кІҪкё° лӘ©лЎқ
  if(!monGames.length){
    h+='<div class="empty" style="padding:24px">'+calM+'мӣ” кІҪкё° кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';
    return h;
  }
  h+='<div class="seclbl">'+calY+'л…„ '+calM+'мӣ” кІҪкё° лӘ©лЎқ</div>';
  monGames.forEach(function(g){
    var sd=g.date||'';
    var sdParts=sd.split('-');
    var sdow=sd&&sdParts.length===3?['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
    var isOff=(g.type||'O')==='O';
    h+='<div class="logitem" style="cursor:pointer" onclick="S.logGameId=\''+g.id+'\';S.calMonth=\''+calMon+'\';renderCt()">';
    h+='<div style="min-width:0;flex:1">';
    h+='<div style="font-size:13px;font-weight:600;color:var(--txt)">';
    if(sd)h+=parseInt(sdParts[2])+'мқј('+sdow+') ';
    h+='vs '+esc(g.opp);
    h+=' <span style="background:'+(isOff?'#EBF0FB':'#dcfce7')+';color:'+(isOff?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600">'+(isOff?'м •мӢқ':'м—°мҠө')+'</span>';
    h+='</div>';
    if(activeNo()){
      var myNo2=Number(activeNo());
      var mpBat2=S.blog.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var mpPit2=S.pit_bf.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var parts=[];
      if(mpBat2.length){
        var bAB2=0,bH2=0,bRBI2=0;
        mpBat2.forEach(function(e){var s=paS(e.oc);bAB2+=s.ab;bH2+=s.h;bRBI2+=e.rbi||0;});
        parts.push(bAB2+'нғҖмҲҳ '+bH2+'м•ҲнғҖ'+(bRBI2?' В· '+bRBI2+'нғҖм җ':''));
      }
      if(mpPit2.length){var ps2=calcPitStats(myNo2,g.id);parts.push(ps2.ipd+'мқҙлӢқ');}
      if(parts.length)h+='<div style="font-size:11px;color:var(--txt2);margin-top:2px">'+parts.join(' / ')+'</div>';
    }
    h+='</div>';
    var sc=gameScore(g.id);
    if(sc.has){
      var win=sc.our>sc.opp,lose=sc.our<sc.opp;
      h+='<div style="text-align:right;flex-shrink:0;padding-left:10px">'
        +'<div style="font-size:18px;font-weight:800;letter-spacing:1px;color:'+(win?'#16a34a':lose?'#dc2626':'var(--txt2)')+'">'+sc.our+' - '+sc.opp+'</div>'
        +'<div style="font-size:10px;font-weight:700;color:'+(win?'#16a34a':lose?'#dc2626':'var(--txt2)')+';">'+(win?'мҠ№':lose?'нҢЁ':'л¬ҙ')+'</div>'
        +'</div>';
    } else {
      h+='<span style="color:var(--txt2);font-size:18px;padding-left:8px">вҖә</span>';
    }
    h+='</div>';
  });
  return h;
}

function rStats(){

  const sf=S.statsFilter||'all';

  const bs=batAgg(filtGids),ps=pitAgg(filtGids);
  const totalG=S.games.length;
  const offG=S.games.filter(g=>(g.type||'O')==='O').length;

  const myNo=activeNo()!=null?Number(activeNo()):null;

  const myName=myNo?(ROSTER.find(x=>x.no===myNo)||{name:'лҢҖн‘ңм„ мҲҳ'}).name:null;

  const fbBase='padding:6px 14px;border-radius:20px;border:1px solid var(--bdr);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;';
  const fbOn=fbBase+'background:var(--navy);color:#fff;border-color:var(--navy)';
  const fbOff=fbBase+'background:var(--card);color:var(--txt2)';
  const tbtn=(isAdmin&&saberFocusNo!==null)?'<button onclick="S.batShowAll='+(!showAll)+';renderCt()" style="margin-left:auto;background:none;border:1px solid var(--bdr);border-radius:12px;padding:2px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit">'+(showAll?'м„ нғқл§Ң в–І':'м „мІҙ м„ мҲҳ в–ј')+'</button>':'';

  const st=S.statTab||0;
  let h=loadingBanner+'<div style="display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--bdr);background:var(--card)">'
    +'<button onclick="S.statsFilter=\'all\';renderCt()" style="'+(sf==='all'?fbOn:fbOff)+'">м „мІҙ '+totalG+'</button>'

    +'<button class="stab bat'+(st===0?' on':'')+'" onclick="S.statTab=0;renderCt()">вҡҫ нғҖмһҗ</button>'

  if(!bs.length&&!ps.length)return h+'<div class="empty" style="padding:32px">н•ҙлӢ№ кІҪкё° кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';

  if(st===0){
    // в”Җв”Җ нғҖмһҗ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

        +'<div class="statwrap"><table><thead><tr>'
        +'<th style="text-align:left;min-width:62px">м„ мҲҳ</th>'

        +'<th class="sth" onclick="showStatInfo(\'3B\')">3B</th><th class="sth" onclick="showStatInfo(\'HR\')" style="color:#fca5a5">HR</th>'
        +'<th class="sth" onclick="showStatInfo(\'RBI\')">RBI</th><th class="sth" onclick="showStatInfo(\'R\')">R</th>'
        +'<th class="sth" onclick="showStatInfo(\'BB\')">BB</th><th class="sth" onclick="showStatInfo(\'K\')">K</th>'
        +'<th class="sth" onclick="showStatInfo(\'SB\')">SB</th>'
        +'</tr></thead><tbody>';
      batRows.forEach(s=>{
        const sel=Number(s.no)===activeSprayNo;
        const bg=sel?'background:rgba(27,58,107,.13);':'';
        h+='<tr style="cursor:pointer" onclick="setSprayPlayer('+Number(s.no)+')">'
          +'<td style="text-align:left;font-weight:700;'+bg+'color:'+(sel?'var(--navy)':'var(--txt)')+';text-decoration:'+(sel?'underline':'none')+'">'+esc(s.name)+(sel?' рҹ“Қ':'')+'</td>'
          +'<td style="'+bg+'">'+s.pa+'</td><td style="'+bg+'">'+s.ab+'</td><td style="'+bg+'">'+s.h+'</td><td style="'+bg+'">'+s.d2+'</td><td style="'+bg+'">'+s.d3+'</td>'
          +'<td style="'+bg+'color:var(--red);font-weight:600">'+s.hr+'</td>'
          +'<td style="'+bg+'">'+s.rbi+'</td><td style="'+bg+'">'+s.run+'</td><td style="'+bg+'">'+s.bb+'</td><td style="'+bg+'">'+s.so+'</td><td style="'+bg+'">'+s.sb+'</td></tr>';
      });
      h+='</tbody></table></div>';
      if(activeSprayNo!==null)h+=rSprayChart(activeSprayNo);

      h+='<div class="seclbl" style="display:flex;align-items:center">рҹ“Ҡ нғҖмһҗ м„ёмқҙлІ„л§ӨнҠёлҰӯмҠӨ <span style="font-size:10px;font-weight:400;color:var(--txt2);margin-left:4px">вҖ” MLB кё°мӨҖ мғүмғҒ</span>'+tbtn+'</div>';
      const sortedBs=saberFocusNo?[...bs].sort((a,b)=>(Number(b.no)===saberFocusNo?1:0)-(Number(a.no)===saberFocusNo?1:0)):bs;
      if(myNo&&!myBatSt&&!isAdmin){
        h+=rNoRecMsg(myName,'нғҖмһҗ');

    }
  } else {
    // в”Җв”Җ нҲ¬мҲҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    if(ps.length&&pitRows.length){
      const ptbtn=(isAdmin&&pitSaberFocusNo!==null)?'<button onclick="S.pitShowAll='+(!pitShowAll)+';renderCt()" style="margin-left:auto;background:none;border:1px solid var(--bdr);border-radius:12px;padding:2px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit">'+(pitShowAll?'м„ нғқл§Ң в–І':'м „мІҙ м„ мҲҳ в–ј')+'</button>':'';
      h+='<div class="seclbl">рҹҺҜ нҲ¬мҲҳ кё°ліё кё°лЎқ <span style="font-size:10px;font-weight:400;color:var(--txt2)">вҖ” мқҙлҰ„ нғӯ вҶ’ м„ёмқҙлІ„ м—°лҸҷ</span></div>'
        +'<div class="statwrap"><table class="pit"><thead><tr>'

      pitRows.forEach(s=>{
        const sel=Number(s.no)===pitSaberFocusNo;
        const bg=sel?'background:rgba(146,43,33,.13);':'';
        h+='<tr style="cursor:pointer" onclick="setPitFocus('+Number(s.no)+')">'
          +'<td style="text-align:left;font-weight:700;'+bg+'color:'+(sel?'var(--red)':'var(--txt)')+';text-decoration:'+(sel?'underline':'none')+'">'+esc(s.name)+(sel?' рҹ“Қ':'')+'</td>'
          +'<td style="'+bg+'">'+s.g+'</td><td style="'+bg+'">'+s.ipd+'</td><td style="'+bg+'">'+s.h+'</td><td style="'+bg+'">'+s.bb+'</td>'
          +'<td style="'+bg+'color:#1d4ed8;font-weight:600">'+s.k+'</td>'

      h+='<div id="pit-saber-section" class="seclbl" style="display:flex;align-items:center">рҹ“Ҳ нҲ¬мҲҳ м„ёмқҙлІ„л§ӨнҠёлҰӯмҠӨ <span style="font-size:10px;font-weight:400;color:var(--txt2);margin-left:4px">вҖ” MLB кё°мӨҖ мғүмғҒ</span>'+ptbtn+'</div>';
      if(myNo&&!myPitSt&&!isAdmin){

    }

  return h;

// в”Җв”Җ мҠӨн”„л Ҳмқҙ м°ЁнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// в”Җв”Җ мқён„°лһҷнӢ°лёҢ нғҖкө¬ л°©н–Ҙ мһ…л Ҙ лӢӨмқҙм–ҙк·ёлһЁ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
var ZONE_KO={LF:'мўҢмқө',LC:'мўҢмӨ‘',CF:'мӨ‘м•ҷ',RC:'мҡ°мӨ‘',RF:'мҡ°мқө','3B':'3лЈЁ',SS:'мң кІ©','2B':'2лЈЁ','1B':'1лЈЁ'};

function rZoneInput(currentZone,cb){
  var cx=175,cy=278,rIF=105,rOF=218,rHP=10;
  function pxy(deg,r){var rd=deg*Math.PI/180;return{x:(cx+r*Math.sin(rd)).toFixed(1),y:(cy-r*Math.cos(rd)).toFixed(1)};}
  function arc(a1,a2,r1,r2){
    var p1o=pxy(a1,r2),p2o=pxy(a2,r2),p1i=pxy(a1,r1),p2i=pxy(a2,r1);
    return 'M '+p1o.x+' '+p1o.y+' A '+r2+' '+r2+' 0 0 1 '+p2o.x+' '+p2o.y+' L '+p2i.x+' '+p2i.y+' A '+r1+' '+r1+' 0 0 0 '+p1i.x+' '+p1i.y+' Z';
  }
  var IF_Z=[
    {z:'3B',l:'3лЈЁ',a1:-45,a2:-22,c:'#e74c3c'},
    {z:'SS',l:'мң кІ©',a1:-22,a2:1, c:'#e67e22'},
    {z:'2B',l:'2лЈЁ',a1:1,  a2:24, c:'#2ecc71'},
    {z:'1B',l:'1лЈЁ',a1:24, a2:45, c:'#1abc9c'},
  ];
  var OF_Z=[
    {z:'LF',l:'мўҢмқө',a1:-45,a2:-27,c:'#e74c3c'},
    {z:'LC',l:'мўҢмӨ‘',a1:-27,a2:-9, c:'#e67e22'},
    {z:'CF',l:'мӨ‘м•ҷ',a1:-9, a2:9,  c:'#f1c40f'},
    {z:'RC',l:'мҡ°мӨ‘',a1:9,  a2:27, c:'#2ecc71'},
    {z:'RF',l:'мҡ°мқө',a1:27, a2:45, c:'#1abc9c'},
  ];
  var selLabel=currentZone?(zoneKo(currentZone)+' ('+currentZone+') м„ нғқлҗЁ'):'кіөмқҙ лӮ м•„к°„ л°©н–Ҙмқ„ н„°м№ҳн•ҙ мЈјм„ёмҡ”';
  var selColor=currentZone?'#86efac':'rgba(255,255,255,0.4)';
  var h='';
  var bg1=pxy(-45,rOF),bg2=pxy(45,rOF);
  h+='<path d="M '+cx+' '+cy+' L '+bg1.x+' '+bg1.y+' A '+rOF+' '+rOF+' 0 0 1 '+bg2.x+' '+bg2.y+' Z" fill="#1e4d2b"/>';
  var if1=pxy(-45,rIF),if2=pxy(45,rIF);
  h+='<path d="M '+cx+' '+cy+' L '+if1.x+' '+if1.y+' A '+rIF+' '+rIF+' 0 0 1 '+if2.x+' '+if2.y+' Z" fill="#2d6a3f"/>';
  OF_Z.forEach(function(z){

  if(!S.scriptUrl||!gid)return;

      if(ents.length)ents[ents.length-1].run=Math.max(0,(ents[ents.length-1].run||0)-1);
    }
  }
}

function applyPitBaseAdv(oc){
  if(!S.game)return;
  if(!S.pitBases)S.pitBases={b1:null,b2:null,b3:null};
  if(typeof S.pitOuts!=='number')S.pitOuts=0;
  var b={b1:S.pitBases.b1,b2:S.pitBases.b2,b3:S.pitBases.b3};
  var scored=[];
  var batEarned=(oc!=='E'&&oc!=='KWP');
  if(oc==='HR'){
    if(b.b1)scored.push(b.b1);if(b.b2)scored.push(b.b2);if(b.b3)scored.push(b.b3);
    scored.push({earned:batEarned});
    b.b1=null;b.b2=null;b.b3=null;
  }else if(oc==='3B'){
    if(b.b1)scored.push(b.b1);if(b.b2)scored.push(b.b2);if(b.b3)scored.push(b.b3);
    b.b1=null;b.b2=null;b.b3={earned:batEarned};
  }else if(oc==='2B'){
    if(b.b3)scored.push(b.b3);if(b.b2)scored.push(b.b2);
    b.b3=b.b1?b.b1:null;b.b2={earned:batEarned};b.b1=null;
  }else if(oc==='1B'){
    if(b.b3)scored.push(b.b3);
    b.b3=b.b2;b.b2=b.b1;b.b1={earned:batEarned};
  }else if(oc==='E'){
    if(b.b3)scored.push(b.b3);
    b.b3=b.b2;b.b2=b.b1;b.b1={earned:false};
  }else if(oc==='BB'||oc==='IBB'||oc==='HBP'||oc==='KWP'){
    if(b.b1!=null){
      if(b.b2!=null){
        if(b.b3!=null){scored.push(b.b3);b.b3=b.b2;}
        else{b.b3=b.b2;}
        b.b2=b.b1;
      }else{b.b2=b.b1;}

function calcAutoRBI(oc){
  var b=S.bases;
  if(oc==='HR')return (b.b1!=null?1:0)+(b.b2!=null?1:0)+(b.b3!=null?1:0)+1;
  if(oc==='3B')return (b.b1!=null?1:0)+(b.b2!=null?1:0)+(b.b3!=null?1:0);
  if(oc==='2B')return 0;
  if(oc==='1B')return 0;
  if(oc==='SF')return (b.b3!=null?1:0);
  if(oc==='BB'||oc==='IBB'||oc==='HBP'||oc==='KWP')return (b.b1!=null&&b.b2!=null&&b.b3!=null)?1:0;
  return 0;
}
function applyBaseAdvancement(oc,pno){
  if(!S.game)return;
  var b={b1:S.bases.b1,b2:S.bases.b2,b3:S.bases.b3};
  if(oc==='HR'){
    if(b.b1!=null)scoreRunnerBase(b.b1);if(b.b2!=null)scoreRunnerBase(b.b2);if(b.b3!=null)scoreRunnerBase(b.b3);
    scoreRunnerBase(pno);S.bases={b1:null,b2:null,b3:null};
  }else if(oc==='3B'){
    if(b.b1!=null)scoreRunnerBase(b.b1);if(b.b2!=null)scoreRunnerBase(b.b2);if(b.b3!=null)scoreRunnerBase(b.b3);
    S.bases={b1:null,b2:null,b3:pno};
  }else if(oc==='2B'){
    var b3sc2=b.b3!=null&&S.runnerDecisions&&S.runnerDecisions[b.b3];
    var b2sc2=b.b2!=null&&S.runnerDecisions&&S.runnerDecisions[b.b2];
    var b1sc2=b.b1!=null&&S.runnerDecisions&&S.runnerDecisions[b.b1];
    if(b3sc2&&S.runnerDecisions[b.b3]!=='scored')scoreRunnerBase(b.b3);
    if(b2sc2&&S.runnerDecisions[b.b2]!=='scored')scoreRunnerBase(b.b2);
    if(b1sc2&&S.runnerDecisions[b.b1]!=='scored')scoreRunnerBase(b.b1);
    var nb3_2=null;
    if(b.b3!=null&&!b3sc2)nb3_2=b.b3;
    else if(b.b2!=null&&!b2sc2)nb3_2=b.b2;
    else if(b.b1!=null&&!b1sc2)nb3_2=b.b1;
    S.bases={b1:null,b2:pno,b3:nb3_2};
  }else if(oc==='1B'){
    var b3sc1=b.b3!=null&&S.runnerDecisions&&S.runnerDecisions[b.b3];
    var b2sc1=b.b2!=null&&S.runnerDecisions&&S.runnerDecisions[b.b2];
    if(b3sc1&&S.runnerDecisions[b.b3]!=='scored')scoreRunnerBase(b.b3);
    if(b2sc1&&S.runnerDecisions[b.b2]!=='scored')scoreRunnerBase(b.b2);
    var nb3_1=null,nb2_1=null;
    if(b.b3!=null&&!b3sc1){
      nb3_1=b.b3;
      // b3к°Җ мһ”лЈЁ: b2лҸ„ л§үнҳҖ 2лЈЁ мһ”лҘҳ вҶ’ b1мқҖ м§„лЈЁ л¶Ҳк°Җ(лӢЁмҲңнҷ”)
      nb2_1=(b.b2!=null&&!b2sc1)?b.b2:b.b1;
    }else{
      // b3 л“қм җ лҳҗлҠ” м—ҶмқҢ: b2к°Җ 3лЈЁ м§„лЈЁ or л“қм җ
      if(b.b2!=null&&!b2sc1)nb3_1=b.b2;
      nb2_1=b.b1; // b1 к°•м ң 2лЈЁ м§„лЈЁ
    }
    S.bases={b1:pno,b2:nb2_1,b3:nb3_1};
  }else if(oc==='BB'||oc==='IBB'||oc==='HBP'||oc==='KWP'){
    if(b.b1!=null&&b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null&&b.b2!=null){S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null){S.bases={b1:pno,b2:b.b1,b3:b.b3};}
    else{S.bases={b1:pno,b2:b.b2,b3:b.b3};}
  }else if(oc==='E'){
    if(b.b1!=null&&b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null&&b.b2!=null){S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null){S.bases={b1:pno,b2:b.b1,b3:b.b3};}
    else{S.bases={b1:pno,b2:b.b2,b3:b.b3};}
    toast('м¶”к°Җ м§„лЈЁлҠ” лІ мқҙмҠӨ нҳ„нҷ©м—җм„ң мқҙлҸҷн•ҳм„ёмҡ”','');
  }else if(oc==='FC'){
    S.outs=(S.outs||0)+1;
    if(b.b1!=null&&b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null&&b.b2!=null){S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null){S.bases={b1:pno,b2:b.b1,b3:b.b3};}
    else{S.bases={b1:pno,b2:b.b2,b3:b.b3};}
    toast('м•„мӣғлҗң мЈјмһҗлҘј лІ мқҙмҠӨ нҳ„нҷ©м—җм„ң м ңкұ°н•ҙмЈјм„ёмҡ”','');
  }else if(oc==='K'||oc==='GO'||oc==='FO'){
    S.outs=(S.outs||0)+1;
  }else if(oc==='DP'){
    S.outs=(S.outs||0)+2;S.bases={b1:null,b2:b.b2,b3:b.b3};
  }else if(oc==='SF'){
    S.outs=(S.outs||0)+1;if(b.b3!=null)scoreRunnerBase(b.b3);S.bases={b1:b.b1,b2:b.b2,b3:null};
  }else if(oc==='SH'){
    S.outs=(S.outs||0)+1;if(b.b3!=null)scoreRunnerBase(b.b3);

function advanceBase(base){

    save();renderGHdr();renderCt();toast((p?p.name:'м„ мҲҳ')+' нҷҲмқё! '+sc.our+' : '+sc.opp,'ok');
  }else if(base==='b2'){

    save();renderCt();toast((p?p.name:'м„ мҲҳ')+' 3лЈЁ м§„лЈЁ','ok');
  }else if(base==='b1'){
    S.bases.b2=pno;S.bases.b1=null;
    save();renderCt();toast((p?p.name:'м„ мҲҳ')+' 2лЈЁ м§„лЈЁ','ok');

function stealBase(base){
  var pno=S.bases[base];if(pno==null)return;
  if(base==='b1'){S.bases.b2=pno;S.bases.b1=null;}
  else if(base==='b2'){S.bases.b3=pno;S.bases.b2=null;}
  else if(base==='b3'){scoreRunnerBase(pno);S.bases.b3=null;}
  if(S.game){var ents=S.blog.filter(function(e){return e.gid===S.game.id&&Number(e.pno)===Number(pno);});if(ents.length)ents[ents.length-1].sb=(ents[ents.length-1].sb||0)+1;}
  save();renderGHdr();renderCt();
  var p=ROSTER.find(function(x){return Number(x.no)===Number(pno);});
  toast((p?p.name:'м„ мҲҳ')+' лҸ„лЈЁ м„ұкіө!','ok');
}
function caughtBase(base){
  var pno=S.bases[base];if(pno==null)return;
  S.bases[base]=null;S.outs=(S.outs||0)+1;
  if(S.game){var ents=S.blog.filter(function(e){return e.gid===S.game.id&&Number(e.pno)===Number(pno);});if(ents.length)ents[ents.length-1].cs=(ents[ents.length-1].cs||0)+1;}

function checkDuplicateGames(){
  var groups={};
  S.games.forEach(function(g){
    var key=(g.date||'')+'__'+(g.opp||'');

}
function mergeGames(keepGid,removeGid){
  S.blog.forEach(function(e){if(e.gid===removeGid)e.gid=keepGid;});
  S.pit_bf.forEach(function(e){if(e.gid===removeGid)e.gid=keepGid;});
  S.pit_runs.forEach(function(e){if(e.gid===removeGid)e.gid=keepGid;});
  S.games=S.games.filter(function(g){return g.id!==removeGid;});
  if(!S.deletedGids.includes(removeGid))S.deletedGids.push(removeGid);
  S.syncedIds.delete('g_'+removeGid);
  if(S.game&&S.game.id===removeGid){S.game=S.games.find(function(g){return g.id===keepGid;})||null;}
  if(S.logGameId===removeGid)S.logGameId=keepGid;
