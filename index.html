function load(){
  try{
    const raw=localStorage.getItem('bb_final');
    if(raw){
      const d=JSON.parse(raw);
      ['blog','pit_bf','pit_runs','games','game','gcnt','scriptUrl','lastSync','rosterDirty','deletedGids','schoolName','bases','outs','pitBases','pitOuts','teamName','teamLocked','staffTitle','linkedPlayers','nickname'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
      if(d.myPlayer!=null)S.myPlayer=parseInt(d.myPlayer)||null;
      if(d.teamId)S.teamId=d.teamId;
      S.syncedIds=new Set(d.syncedIds||[]);
      // downloadedGids: 저장된 값 복원, 없으면 기존 로컬 레코드에서 bootstrap
      if(d.downloadedGids&&d.downloadedGids.length){
        S.downloadedGids=new Set(d.downloadedGids);
      }else{
        var _gids=new Set();
        (S.blog||[]).forEach(function(e){if(e.gid)_gids.add(e.gid);});
        (S.pit_bf||[]).forEach(function(e){if(e.gid)_gids.add(e.gid);});
        (S.pit_runs||[]).forEach(function(e){if(e.gid)_gids.add(e.gid);});
        S.downloadedGids=_gids;
      }
      if(d.setupDone!==undefined)S.setupDone=d.setupDone;
      else S.setupDone=!!(S.scriptUrl||S.games.length>0||S.schoolName);
      if(d.setupStep!==undefined)S.setupStep=d.setupStep;
      if(d.roster&&d.roster.length>0){parseRosterSiblings(d.roster);ROSTER.splice(0,ROSTER.length,...d.roster);}
    }
    var sr=sessionStorage.getItem('bb_role');
    if(sr)S.role=sr;
  }catch(e){console.error(e);}
}

async function loadFromSupabase(){
  if(!window.SupabaseClient||!S.teamId)return;
  try{
    S.loading=true;renderGHdr&&renderGHdr();
    var data=await SB.fetchTeamData(S.teamId);
    S.games=data.games;
    S.blog=data.bat_log;
    S.pit_bf=data.pit_bf;
    S.pit_runs=data.pit_runs;
    if(data.roster&&data.roster.length>0){parseRosterSiblings(data.roster);ROSTER.splice(0,ROSTER.length,...data.roster);}
    if(data.teamName)S.schoolName=data.teamName;
    if(data.parentProfiles)S.parentProfiles=data.parentProfiles;
    if(data.staffProfiles)S.staffProfiles=data.staffProfiles;
    if(data.teamInviteAdmin)S.teamInviteAdmin=data.teamInviteAdmin;
    // 현재 진행 경기 상태 복원
    if(S.game){var fg=S.games.find(function(g){return g.id===S.game.id;});if(!fg||fg.status==='ended')S.game=null;else S.game=Object.assign({},S.game,fg);}
    if(!S.game){var ag=S.games.find(function(g){return g.status==='active';});if(ag)S.game=ag;}
    S.setupDone=true;
    save();
    S.loading=false;
    startRealtime();
    r();
    console.log('[SB] 데이터 로드 완료: 경기'+S.games.length+'건 타자'+S.blog.length+'건');
  }catch(e){
    S.loading=false;
    console.warn('[SB] loadFromSupabase 오류',e);
    r();
  }
}

function startRealtime(){
  if(!window.SupabaseClient||!S.teamId)return;
  var onRecordInsert=PERM.parent?function(table,row){
    if(table==='bat_log'){
      if(S.blog.some(function(e){return e.id===row.id;}))return;
      S.blog.push({id:row.id,gid:row.game_id,pno:row.player_no,oc:row.oc,zone:row.zone||null,run:row.run||0,rbi:row.rbi||0,sb:row.sb||0,cs:row.cs||0});
      S.syncedIds.add(row.id);
    }else if(table==='pit_bf'){
      if(S.pit_bf.some(function(e){return e.id===row.id;}))return;
      S.pit_bf.push({id:row.id,gid:row.game_id,pno:row.player_no,oc:row.oc});
      S.syncedIds.add(row.id);
    }else if(table==='pit_runs'){
      if(S.pit_runs.some(function(e){return e.id===row.id;}))return;
      S.pit_runs.push({id:row.id,gid:row.game_id,pno:row.player_no,earned:row.earned!==false});
      S.syncedIds.add(row.id);
    }else if(table==='bat_log_update'){
      var idx=S.blog.findIndex(function(e){return e.id===row.id;});
      if(idx>=0){
        S.blog[idx].run=row.run||0;
        S.blog[idx].rbi=row.rbi||0;
        S.blog[idx].sb=row.sb||0;
        S.blog[idx].cs=row.cs||0;
      }else{
        S.blog.push({id:row.id,gid:row.game_id,pno:row.player_no,oc:row.oc,zone:row.zone||null,run:row.run||0,rbi:row.rbi||0,sb:row.sb||0,cs:row.cs||0});
        S.syncedIds.add(row.id);
      }
    }
    save();
    renderGHdr&&renderGHdr();
    if(S.tab===2||S.tab===3)renderCt();
  }:null;
  var onBroadcastReceive=PERM.parent?function(gs){
    // S.bases (타자 탭용): gs.bases 사용
    if(gs.bases)S.bases=gs.bases;
    // S.pitBases (투수 탭용): gs.pitBases 사용
    if(gs.pitBases)S.pitBases=gs.pitBases;
    S.outs=typeof gs.outs==='number'?gs.outs:0;
    S.pitOuts=typeof gs.pitOuts==='number'?gs.pitOuts:0;
    if(gs.inning!=null)S.inning=gs.inning;
    if(gs.topBot!=null)S.topBot=gs.topBot;
    renderGHdr&&renderGHdr();
    if(S.tab===0||S.tab===1)renderCt();
  }:null;
  SB.startRealtime(S.teamId,function(game){
    var mapped={id:game.id,date:game.date,opp:game.opponent,type:game.type||'R',no:game.game_no||1,status:game.status};
    var idx=S.games.findIndex(function(g){return g.id===game.id;});
    if(idx>=0)S.games[idx]=mapped;else S.games.push(mapped);
    if(S.game&&S.game.id===game.id){
      if(game.status==='ended'){
        S.game=null;save();
        toast('감독이 경기를 종료했습니다');
        r();return;
      }
      S.game=Object.assign({},S.game,mapped);
    }
    save();
    renderGHdr&&renderGHdr();
    if(S.tab===2)renderCt();
  },onRecordInsert,onBroadcastReceive);
}
function broadcastGameState(from){
  if(!PERM.canEdit||!S.game||!SB._channel)return;
  var bases,pb;
  if(from==='pit'){
    // 투수 탭 기준: pitBases → bases 동기화
    pb=S.pitBases||{b1:null,b2:null,b3:null};
    bases={b1:pb.b1?pb.b1.pno:null,b2:pb.b2?pb.b2.pno:null,b3:pb.b3?pb.b3.pno:null};
    S.bases=bases;
  }else{
    // 타자 탭 기준: bases → pitBases 동기화
    bases=S.bases||{b1:null,b2:null,b3:null};
    var fp=function(no){return ROSTER.find(function(x){return x.no===no;})||{};};
    pb={
      b1:bases.b1!=null?{pno:bases.b1,pn:fp(bases.b1).name||'',earned:true}:null,
      b2:bases.b2!=null?{pno:bases.b2,pn:fp(bases.b2).name||'',earned:true}:null,
      b3:bases.b3!=null?{pno:bases.b3,pn:fp(bases.b3).name||'',earned:true}:null
    };
    S.pitBases=pb;
  }
  SB.broadcastGameState({
    bases:bases,outs:S.outs||0,
    pitBases:pb,pitOuts:S.pitOuts||0,
    inning:S.inning||1,topBot:S.topBot||'top'
  });
}
function parseRosterSiblings(roster){
  (roster||[]).forEach(function(p){
    if(!p.siblings||p.siblings===''||p.siblings===null){p.siblings=[];return;}
    if(Array.isArray(p.siblings))return;
    if(typeof p.siblings==='string'){
      var s=p.siblings.trim();
      try{
        var parsed=JSON.parse(s);
        p.siblings=Array.isArray(parsed)?parsed.map(Number).filter(function(n){return!isNaN(n);}):[];
      }catch(e){
        // "5,7" 형식 fallback
        p.siblings=s.split(',').map(function(x){return parseInt(x.trim());}).filter(function(n){return!isNaN(n);});
      }
    }
    if(!Array.isArray(p.siblings))p.siblings=[];
  });
}
function getSiblingGroup(){
  if(!S.myPlayer)return[];
  // 같은 번호가 타자/투수 두 항목으로 있을 수 있으므로 모든 항목에서 siblings 수집
  var sibNos=[];
  ROSTER.filter(function(x){return x.no===S.myPlayer;}).forEach(function(me){
    if(Array.isArray(me.siblings))me.siblings.forEach(function(s){if(sibNos.indexOf(s)<0)sibNos.push(s);});
  });
  if(!sibNos.length)return[];
  var seen=new Set();
  return sibNos.map(function(sno){return ROSTER.find(function(x){return x.no===sno;});}).filter(function(p){return p&&!seen.has(p.no)&&seen.add(p.no);});
}
function activeNo(){return S.activeChild!=null?S.activeChild:S.myPlayer;}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(m,type=''){
  const t=document.getElementById('toast');
  t.textContent=m;t.className=type||'';
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('off'),2000);
}

    d2:o==="2B"?1:0,d3:o==="3B"?1:0,hr:o==="HR"?1:0,
    bb:(o==="BB"||o==="IBB")?1:0,hbp:o==="HBP"?1:0,so:(o==="K"||o==="KWP")?1:0,sf:o==="SF"?1:0};
}
// MLB 기준 등급 판별
const MLB_BENCH={
  AVG: {good:0.280,bad:0.220,rev:false},
  OBP: {good:0.350,bad:0.300,rev:false},
  SLG: {good:0.450,bad:0.350,rev:false},
  OPS: {good:0.800,bad:0.650,rev:false},
  wOBA:{good:0.360,bad:0.300,rev:false},
  'wRC+':{good:115,bad:85,rev:false},
  ISO: {good:0.170,bad:0.090,rev:false},
  BABIP:{good:0.340,bad:0.260,rev:false},
  'BB%':{good:0.10,bad:0.06,rev:false},
  'K%': {good:0.15,bad:0.23,rev:true},
  'BB/K':{good:0.70,bad:0.35,rev:false},
  WAR: {good:2.0,bad:0,rev:false},
  ERA: {good:3.50,bad:5.00,rev:true},
  WHIP:{good:1.20,bad:1.50,rev:true},
  FIP: {good:3.50,bad:5.00,rev:true},
  'K/9':{good:9.0,bad:6.0,rev:false},
  'BB/9':{good:3.0,bad:4.5,rev:true},
  'pitK%':{good:0.25,bad:0.15,rev:false},
  'pitBB%':{good:0.08,bad:0.12,rev:true},
};
function statTier(key,val){
  const b=MLB_BENCH[key];
  if(!b)return'avg';
  if(b.rev)return val<=b.good?'good':val>=b.bad?'bad':'avg';
  return val>=b.good?'good':val<=b.bad?'bad':'avg';
}
function tierStyle(tier){
  if(tier==='good')return{bg:'#f0fdf4',fc:'#15803d',mark:'▲'};
  if(tier==='bad') return{bg:'#fff5f5',fc:'#b91c1c',mark:'▼'};
  return{bg:'var(--card)',fc:'var(--txt2)',mark:'—'};
}
function batAgg(filtGids){
  const m={};
  for(const e of S.blog){
    if(filtGids&&!filtGids.has(e.gid))continue;
    const k=e.pno;
    if(!m[k]){const _p=ROSTER.find(function(x){return x.no===e.pno;})||{name:'#'+e.pno};m[k]={name:_p.name,no:e.pno,pa:0,ab:0,h:0,d2:0,d3:0,hr:0,bb:0,hbp:0,so:0,sf:0,rbi:0,run:0,sb:0,cs:0,gids:new Set()};}
    const t=m[k],s=paS(e.oc);
    for(const f of['pa','ab','h','d2','d3','hr','bb','hbp','so','sf'])t[f]+=s[f];
    t.rbi+=e.rbi||0;t.run+=e.run||0;t.sb+=e.sb||0;t.cs+=e.cs||0;
    if(e.gid)t.gids.add(e.gid);
  }
  const wBB=0.69,wHBP=0.72,w1B=0.89,w2B=1.27,w3B=1.62,wHR=2.10;
  const players=Object.values(m).map(t=>{
    const singles=t.h-t.d2-t.d3-t.hr;
    const avg=t.ab>0?t.h/t.ab:0;
    const od=t.ab+t.bb+t.hbp+t.sf;
    const obp=od>0?(t.h+t.bb+t.hbp)/od:0;
    const slg=t.ab>0?(t.h+t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const iso=t.ab>0?(t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const bd=t.ab-t.so-t.hr+t.sf;
    const babip=bd>0?(t.h-t.hr)/bd:0;
    const wn=wBB*t.bb+wHBP*t.hbp+w1B*singles+w2B*t.d2+w3B*t.d3+wHR*t.hr;
    const wd=t.ab+t.bb+t.hbp+t.sf;
    const woba=wd>0?wn/wd:0;
    return{...t,avg,obp,slg,ops:obp+slg,iso,babip,woba,
      bbp:t.pa>0?t.bb/t.pa:0,kp:t.pa>0?t.so/t.pa:0,
      bbk:t.so>0?t.bb/t.so:(t.bb>0?99:0),g:t.gids.size,singles};
  });
  const totalPA=players.reduce((s,p)=>s+p.pa,0);
  const lgwOBA=totalPA>0?players.reduce((s,p)=>s+p.woba*p.pa,0)/totalPA:0.320;
  return players.map(p=>{
    const wrc_plus=lgwOBA>0?Math.round(p.woba/lgwOBA*100):100;
    const bat_runs=(p.woba-lgwOBA)/1.15*p.pa;
    const repl_runs=2.0*p.pa/100;
    const war=(bat_runs+repl_runs)/10;
    return{...p,wrc_plus,war};
  }).sort((a,b)=>b.ops-a.ops);
}
function calcPitStats(pno,gid,filtGids){
  let bf=S.pit_bf.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  let runs=S.pit_runs.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  if(filtGids){bf=bf.filter(e=>filtGids.has(e.gid));runs=runs.filter(e=>filtGids.has(e.gid));}
  const h=bf.filter(e=>['1B','2B','3B','HR'].includes(e.oc)).length;
  const hr=bf.filter(e=>e.oc==='HR').length;
  const bb=bf.filter(e=>['BB','IBB'].includes(e.oc)).length;
  const k=bf.filter(e=>e.oc==='K'||e.oc==='KWP').length;
  const outs=bf.reduce((s,e)=>s+ocOuts(e.oc),0);
  const er=runs.filter(e=>e.earned).length,rv=runs.length;
  const iF=Math.floor(outs/3),iR=outs%3,ipf=iF+iR/3;
  const ipd=iR>0?iF+'.'+iR:''+iF;
  const fracArr=['','⅓','⅔'];
  const ipLabel=iF+(iR>0?fracArr[iR]:'');
  const era=ipf>0?er*9/ipf:0,whip=ipf>0?(h+bb)/ipf:0;
  const fip=ipf>0?(13*hr+3*bb-2*k)/ipf+3.10:0;
  return{bf:bf.length,h,hr,bb,k,outs,r:rv,er,ipd,ipLabel,ipf,era,whip,fip,
    k9:ipf>0?k*9/ipf:0,bb9:ipf>0?bb*9/ipf:0};
}
function pitAgg(filtGids){
  const src=filtGids?S.pit_bf.filter(e=>filtGids.has(e.gid)):S.pit_bf;
  const pnos=[...new Set(src.map(e=>e.pno))];
  return pnos.map(pno=>{
    const p=ROSTER.find(x=>x.no===pno)||{name:'#'+pno};
    const g=new Set(src.filter(e=>e.pno===pno).map(e=>e.gid)).size;
    return{...calcPitStats(pno,null,filtGids),name:p.name,no:pno,g};
  }).sort((a,b)=>a.era-b.era);
}
function getBattersThisGame(){
  if(!S.game)return ROSTER.filter(p=>p.canBat);
  const app=new Set(S.blog.filter(e=>e.gid===S.game.id).map(e=>e.pno));
  const all=ROSTER.filter(p=>p.canBat);
  return[...all.filter(p=>app.has(p.no)),...all.filter(p=>!app.has(p.no))];
}
function getRunsThisGame(pno){
  if(!S.game)return 0;
  return S.blog.filter(e=>e.gid===S.game.id&&e.pno===pno).reduce((s,e)=>s+(e.run||0),0);
}
function gameScore(gid){
  var our=S.blog.filter(function(e){return e.gid===gid;}).reduce(function(s,e){return s+(e.run||0);},0);
  var opp=S.pit_runs.filter(function(e){return e.gid===gid;}).length;
  var hasBat=S.blog.some(function(e){return e.gid===gid;});
  var hasPit=S.pit_runs.some(function(e){return e.gid===gid;});
  return{our:our,opp:opp,has:hasBat||hasPit};
}
function pendingCount(){
  return S.blog.filter(e=>!S.syncedIds.has(e.id)).length
    +S.pit_bf.filter(e=>!S.syncedIds.has(e.id)).length
    +S.pit_runs.filter(e=>!S.syncedIds.has(e.id)).length
    +S.games.filter(g=>!S.syncedIds.has('g_'+g.id)).length
    +(S.deletedGids&&S.deletedGids.length?S.deletedGids.length:0)
    +(S.rosterDirty?1:0);
}

async function _applyGoogleSession(errEl){
  var profile=await SB.getProfile();
  var appRole=SB.mapRole(profile?profile.role:null);
  var teamId=profile?profile.team_id:null;
  sessionStorage.setItem('bb_role',appRole);
  if(appRole!=='user'){S.sprayPlayer=null;S.pitFocus=null;}
  S.role=appRole;S.teamId=teamId;S.setupDone=true;
  if(profile){
    S.profileId=profile.id||null;
    S.staffTitle=profile.staff_title||null;
    S.linkedPlayers=profile.linked_players||[];
    S.nickname=profile.nickname||'';
    if(appRole==='user'&&S.linkedPlayers.length>0)S.myPlayer=S.linkedPlayers[0];
  }
  save();
  if(teamId){document.getElementById('login-overlay').style.display='none';loadFromSupabase();}
  else{showInviteCodeView();}
}
async function doGoogleLogin(){
  var errEl=document.getElementById('pin-err');
  if(!window.SupabaseClient){if(errEl)errEl.textContent='Supabase 연결 중입니다. 잠시 후 다시 시도해주세요.';return;}
  if(errEl)errEl.textContent='';
  // 네이티브 Google Sign-In 시도
  if(window.Capacitor&&Capacitor.Plugins&&Capacitor.Plugins.GoogleAuth){
    try{
      var result=await Capacitor.Plugins.GoogleAuth.signIn();
      if(!result||!result.idToken)throw new Error('ID 토큰 없음');
      var signInRes=await window.SupabaseClient.auth.signInWithIdToken({provider:'google',token:result.idToken});
      if(signInRes.error)throw signInRes.error;
      await _applyGoogleSession(errEl);
      return;
    }catch(e){
      var code=e.code||e.message||'';
      console.warn('[GoogleAuth] 네이티브 로그인 실패 (code='+code+'), OAuth fallback 시도',e);
      // Capacitor가 이전 call을 정리할 시간을 준 뒤 fallback 실행
      setTimeout(async function(){
        try{
          var url=await SB.getGoogleOAuthUrl();
          if(window.Capacitor&&Capacitor.Plugins&&Capacitor.Plugins.Browser){
            await Capacitor.Plugins.Browser.open({url:url,presentationStyle:'popover'});
          }else{
            window.open(url,'_blank');
          }
        }catch(e2){
          console.warn('[GoogleAuth] OAuth fallback 실패',e2);
          if(errEl)errEl.textContent=e2.message||'Google 로그인 실패';
        }
      },300);
      return;
    }
  }
}
// OAuth fallback 콜백 처리 (savermatrix://auth 딥링크)
document.addEventListener('supabase:ready',function(){
  if(!window.Capacitor||!Capacitor.Plugins||!Capacitor.Plugins.App)return;
  Capacitor.Plugins.App.addListener('appUrlOpen',async function(data){
    var url=data.url||'';
    if(!url.startsWith('savermatrix://auth'))return;
    try{
      if(Capacitor.Plugins.Browser)Capacitor.Plugins.Browser.close();
      var hash=url.indexOf('#')>=0?url.split('#')[1]:url.split('?')[1]||'';
      var params=new URLSearchParams(hash);
      var accessToken=params.get('access_token');
      var refreshToken=params.get('refresh_token');
      if(!accessToken||!refreshToken){console.warn('[OAuth] 토큰 없음',url);return;}
      await window.SupabaseClient.auth.setSession({access_token:accessToken,refresh_token:refreshToken});
      await _applyGoogleSession(null);
    }catch(e){console.warn('[OAuth] 콜백 처리 오류',e);}
  });
});

async function doApplyInviteCode(){
  var code=((document.getElementById('ic-code')||{}).value||'').trim().toUpperCase();
  var errEl=document.getElementById('ic-err');
  if(!code){if(errEl)errEl.textContent='초대 코드를 입력해주세요.';return;}
  if(!/^[A-Z0-9]{4,20}$/.test(code)){if(errEl)errEl.textContent='올바르지 않은 초대 코드 형식입니다.';return;}
  if(errEl)errEl.textContent='확인 중...';
  try{
    var result=await SB.applyInviteCode(code);
    var appRole=SB.mapRole(result.role);
    sessionStorage.setItem('bb_role',appRole);
    if(appRole!=='user'){S.sprayPlayer=null;S.pitFocus=null;}
    S.role=appRole;
    S.teamId=result.teamId;
    S.setupDone=true;
    // 학부모: 초대 코드 적용 후 profile 재조회해서 linkedPlayers 세팅
    if(appRole==='user'){
      var freshProfile=await SB.getProfile();
      S.linkedPlayers=(freshProfile&&freshProfile.linked_players)||[];
      if(S.linkedPlayers.length>0)S.myPlayer=S.linkedPlayers[0];
    }
    save();
    document.getElementById('login-overlay').style.display='none';
    toast('✓ 팀에 참가했습니다!','ok');
    loadFromSupabase();
  }catch(e){
    if(errEl)errEl.textContent=e.message||'코드 확인 실패. 다시 시도해주세요.';
  }
}
async function doLogout(){
  sessionStorage.removeItem('bb_role');
  S.role=null;
  if(window.SB){SB.stopRealtime();await SB.signOut().catch(function(){});}
  renderLogin();
}

// 앱 로드 시 ?reset=TOKEN&src=BASE64_MASTER_URL 파라미터 감지
async function checkResetLink(){
  var params=new URLSearchParams(location.search);
  var token=(params.get('reset')||'').trim().toUpperCase();
  if(!token)return;
  history.replaceState(null,'',location.pathname);
  var ol=document.getElementById('setup-overlay');
  if(ol){
    ol.style.display='flex';
    ol.innerHTML='<div class="su-body" style="text-align:center">'
      +'<div class="su-icon">🔐</div>'
      +'<div class="su-title">링크 확인 중...</div>'
      +'<div class="su-desc">잠시만 기다려 주세요</div>'
      +'</div>';
  }
  try{
    var res=await fetch(masterRegUrl()+'?action=validateToken&token='+encodeURIComponent(token));
    var data=await res.json();
    if(data.status!=='ok'){toast(data.message||'유효하지 않은 링크입니다','err');if(ol)ol.style.display='none';return;}
    // 토큰 유효 → 팀 잠금 해제, 셋업 재시작
    S.teamLocked=false;
    S.setupDone=false;
    S.setupStep=1;
    save();
    renderSetup();
  }catch(e){toast('링크 검증 실패: 네트워크 오류','err');if(ol)ol.style.display='none';}
}

var _teamSearchList=[];

async function fetchTeamData(){
  var ol=document.getElementById('setup-overlay');
  if(ol){
    ol.innerHTML='<div class="su-progress"></div>'
      +'<div class="su-body" style="text-align:center">'
      +'<div class="su-icon">☁️</div>'
      +'<div class="su-title">데이터 불러오는 중...</div>'
      +'<div class="su-desc">클라우드에서 팀 정보를<br>가져오고 있습니다</div>'
      +'</div>';
  }
  try{
    var res=await fetch(S.scriptUrl+'?action=fetch');
    var data=await res.json();
    if(data.status!=='ok')throw new Error(data.message||'서버 오류');
    S.games=data.games||[];
    S.blog=data.bat_log||[];
    S.pit_bf=data.pit_bf||[];
    S.pit_runs=data.pit_runs||[];
    if(data.roster&&data.roster.length>0){parseRosterSiblings(data.roster);ROSTER.splice(0,ROSTER.length,...data.roster);}
    S.syncedIds=new Set();
    (data.games||[]).forEach(function(g){S.syncedIds.add('g_'+g.id);});
    (data.bat_log||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_bf||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_runs||[]).forEach(function(e){S.syncedIds.add(e.id);});
    if(data.teamName)S.schoolName=data.teamName;
    S.lastSync=Date.now();
    S.setupStep=3;save();renderSetup();
  }catch(err){
    if(ol){
      ol.innerHTML='<div class="su-progress"></div>'
        +'<div class="su-body" style="text-align:center">'
        +'<div class="su-icon">⚠️</div>'
        +'<div class="su-title">연결 실패</div>'
        +'<div class="su-desc" style="color:#fca5a5">'+(err.message||'네트워크 오류')+'</div>'
        +'</div>'
        +'<div class="su-actions">'
        +'<button class="su-next" onclick="fetchTeamData()">다시 시도</button>'
        +'<button class="su-skip" onclick="S.setupStep=3;save();renderSetup()">건너뛰기</button>'
        +'</div>';
    }
  }
}
async function saveSetupUrl(){
  var el=document.getElementById('su-url');
  var url=el?el.value.trim():'';
  var st=document.getElementById('su-connst');
  var btn=document.getElementById('su-fetch-btn');
  if(!url){
    if(st){st.textContent='⚠ URL을 입력해주세요.';st.style.color='#fca5a5';}
    return;
  }
  if(st){st.textContent='⏳ 데이터 불러오는 중...';st.style.color='rgba(255,255,255,.6)';}
  if(btn){btn.disabled=true;btn.textContent='불러오는 중...';}
  try{
    var res=await fetch(url+'?action=fetch');
    var data=await res.json();
    if(data.status!=='ok')throw new Error(data.message||'서버 오류');
    S.scriptUrl=url;
    S.games=data.games||[];
    S.blog=data.bat_log||[];
    S.pit_bf=data.pit_bf||[];
    S.pit_runs=data.pit_runs||[];
    if(data.roster&&data.roster.length>0){parseRosterSiblings(data.roster);ROSTER.splice(0,ROSTER.length,...data.roster);}
    S.syncedIds=new Set();
    (data.games||[]).forEach(function(g){S.syncedIds.add('g_'+g.id);});
    (data.bat_log||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_bf||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_runs||[]).forEach(function(e){S.syncedIds.add(e.id);});
    if(data.teamName)S.schoolName=data.teamName;
    S.lastSync=Date.now();save();
    // 클라우드에서 팀명이 왔으면 step 2(팀명 입력) 건너뜀
    S.setupStep=S.schoolName?3:2;renderSetup();
  }catch(err){
    if(st){st.textContent='✗ 연결 실패 — URL을 확인해주세요';st.style.color='#fca5a5';}
    if(btn){btn.disabled=false;btn.textContent='연결 및 불러오기';}
  }
}
async function doSetupLogin(){
  var el=document.getElementById('su-pin');
  var pin=el?el.value.trim():'';
  var st=document.getElementById('su-pin-st');
  var btn=document.getElementById('su-pin-btn');
  if(!pin){if(st){st.textContent='⚠ PIN을 입력해주세요.';st.style.color='#fca5a5';}return;}
  if(!S.scriptUrl){finishSetup(false);return;}
  if(st){st.textContent='확인 중...';st.style.color='rgba(255,255,255,.6)';}
  if(btn){btn.disabled=true;}
  try{
    var res=await fetch(S.scriptUrl+'?action=login&pin='+encodeURIComponent(pin));
    var data=await res.json();
    if(data.status==='ok'&&data.role){
      if(data.role!=='user'){
        if(st){st.textContent='학부모 PIN을 입력해주세요.';st.style.color='#fca5a5';}
        if(el)el.value='';
        if(btn){btn.disabled=false;}
        setTimeout(function(){if(el)el.focus();},100);
        return;
      }
      S.role=data.role;
      sessionStorage.setItem('bb_role',data.role);
      finishSetup(false);
    }else{
      if(st){st.textContent=data.message||'PIN이 올바르지 않습니다.';st.style.color='#fca5a5';}
      if(el)el.value='';
      if(btn){btn.disabled=false;}
      setTimeout(function(){if(el)el.focus();},100);
    }
  }catch(e){
    if(st){st.textContent='서버에 연결할 수 없습니다.';st.style.color='#fca5a5';}
    if(btn){btn.disabled=false;}
  }
}
function finishSetup(asAdmin){
  S.setupDone=true;
  if(asAdmin){
    if(!S.scriptUrl){S.role='admin';sessionStorage.setItem('bb_role','admin');}
    else{S.role=null;sessionStorage.removeItem('bb_role');}
  } else {
    if(!S.role){S.role='user';sessionStorage.setItem('bb_role','user');}
    S.teamLocked=true;
  }
  save();
  document.getElementById('setup-overlay').style.display='none';
  renderLogin();r();
}

      +'<div style="flex:1"><div style="font-size:15px;font-weight:600;color:#fff">'+esc(p.name)+'</div><div style="font-size:11px;color:rgba(255,255,255,.5)">'+esc(p.pos)+'</div></div>'
      +(sel?'<div style="color:#fff;font-size:20px;margin-left:auto">✓</div>':'')
      +'</button>';
  });
  ol.innerHTML='<div class="su-progress"></div>'
    +'<div class="su-body">'
    +'<div class="su-icon">👦</div>'
    +'<div class="su-title">우리 아이를<br>선택해주세요</div>'
    +'<div class="su-desc" style="margin-bottom:16px">선택한 선수의 기록만<br>학부모 모드에서 표시됩니다</div>'
    +'<div style="width:100%;max-height:260px;overflow-y:auto;-webkit-overflow-scrolling:touch">'+rosterHtml+'</div>'
    +'</div>'
    +'<div class="su-actions">'
    +'<button class="su-next" onclick="confirmPlayerSel()" '+(S.myPlayer==null?'disabled style="opacity:.4;cursor:not-allowed"':'')+'>확인</button>'
    +'</div>';
}

      +'<div><div style="font-size:13px;font-weight:700;color:var(--txt)">타점 (RBI)</div>'
      +'<div style="font-size:11px;color:var(--txt2);margin-top:3px">득점 확인 기준으로 자동 계산됩니다</div></div>'
      +'<div style="display:flex;align-items:center;gap:14px">'

      +'<div>'
      +'<div style="font-size:11px;font-weight:600;color:'+(S.bzone?'#15803D':'#D97706')+';margin-bottom:4px">🎯 타구 방향 <span style="font-size:10px;background:'+(S.bzone?'#dcfce7':'#FEF3C7')+';color:'+(S.bzone?'#15803D':'#92400E')+';padding:1px 6px;border-radius:3px;font-weight:700">'+(S.bzone?'✓ 선택됨':'필수')+'</span></div>'
      +(S.bzone
        ?'<div style="font-size:20px;font-weight:800;color:#15803D">'+zoneKo(S.bzone)+'<span style="font-size:13px;font-weight:500;color:var(--txt2);margin-left:6px">('+S.bzone+')</span></div>'
        :'<div style="font-size:13px;color:#D97706">공이 날아간 방향을 선택해주세요</div>')
      +'</div>'
      +'<div style="font-size:28px;opacity:'+(S.bzone?'0.7':'0.4')+'">'+(S.bzone?'✅':'🏟️')+'</div>'
      +'</div>';
  }
  const canSave=!isBIP||S.bzone;
  h+='<div class="savewrap"><button class="savebtn" onclick="saveBat()" style="opacity:'+(canSave?'1':'0.4')+';pointer-events:'+(canSave?'auto':'none')+'">✓ 기록 저장</button>'
    +(isBIP&&!S.bzone?'<div style="font-size:11px;color:#D97706;text-align:center;margin-top:6px">타구 방향을 선택해야 저장할 수 있습니다</div>':'')
    +'</div>';
  return h;
}

  if(!S.game)return '<div class="empty" style="padding:40px 24px;line-height:2.2;text-align:center">🎯<br><strong style="font-size:15px">경기가 시작되지 않았습니다</strong><br><span style="font-size:13px;color:var(--txt2)">투수 기록을 입력하려면<br>경기를 먼저 시작해주세요</span><br><br><button class="savebtn" onclick="showGameModal()">+ 경기 시작</button></div>';
  if(S.curPit===null||S.curPit===undefined){
    let h=(PERM.parent&&!isTablet())?rPitBaseDiagram():'';
    h+='<div class="seclbl">현재 투수 선택</div><div class="pgrid">';

    ROSTER.filter(p=>p.canPitch&&(!pitAllowedNos||pitAllowedNos.indexOf(p.no)>=0)).forEach(p=>{
      h+='<button class="pbtn'+(S.curPit===p.no?' sel-r':'')+'" onclick="selPit('+p.no+')">'
        +'<div class="pno r">'+p.no+'</div>'
        +'<div><div class="pn">'+esc(p.name)+'</div><div class="pp">'+esc(p.pos)+'</div></div>'
        +'</button>';
    });

  }
  const p=ROSTER.find(x=>String(x.no)===String(S.curPit));
  if(!p){S.curPit=null;return rPitTab();}
  let h=rOCSel('pit');
  var pitUndoSnap=S.pitUndoStack&&S.pitUndoStack.length?S.pitUndoStack[S.pitUndoStack.length-1]:null;
  if(pitUndoSnap)h+='<div style="display:flex;justify-content:flex-end;padding:6px 14px 0"><button class="undobtn" onclick="undoPitLast()"><span class="undobtn-icon">↺</span><span class="undobtn-text"><span class="undobtn-head">실행 취소</span><span class="undobtn-lbl">'+esc(pitUndoSnap.label)+'</span></span></button></div>';
  if(!isTablet())h+=rPitBaseDiagram();

  if(runsNow.length){
    var erNow=runsNow.filter(function(e){return e.earned;}).length;
    var uerNow=runsNow.length-erNow;
    h+='<div style="margin:0 12px 12px;padding:8px 12px;background:var(--bg2);border-radius:var(--r);font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:8px">'
      +'<span>이닝 실점</span>'
      +'<span style="background:#fee2e2;color:#b91c1c;border-radius:4px;padding:2px 8px;font-weight:700">자책 '+erNow+'</span>'
      +'<span style="background:var(--bdr);color:var(--txt2);border-radius:4px;padding:2px 8px;font-weight:700">비자책 '+uerNow+'</span>'
      +'<button onclick="addPitRun(true)" style="margin-left:auto;background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 8px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit">+ 수동</button>'
      +'</div>';
  }
  return h;
}

    +'<strong>폭투·보크·포일</strong> 등 비타격 실점만 아래 버튼으로 입력하세요.</div>'
    +'<div class="rbigrow">'
    +'<button class="rbigbtn earn" onclick="addPitRun(true)">💧+ 자책점<br><span style="font-size:11px;opacity:.7">폭투·보크 등 ERA 반영</span></button>'
    +'<button class="rbigbtn uearn" onclick="addPitRun(false)">💧+ 비자책점<br><span style="font-size:11px;opacity:.7">실책 관련 ERA 미반영</span></button>'
    +'</div>'
    +'<div class="rminirow">'
    +'<div class="rmini"><div class="rminiv" style="color:var(--red)">'+er+'</div><div class="rminil">자책점 (ER)</div></div>'
    +'<div class="rmini"><div class="rminiv" style="color:var(--txt2)">'+ur+'</div><div class="rminil">비자책 (UER)</div></div>'
    +'<div class="rmini"><div class="rminiv">'+(er+ur)+'</div><div class="rminil">총 실점 (R)</div></div>'
    +'</div>';
  if(runs.length){
    h+='<p style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px">실점 기록</p><div>';
    runs.slice().reverse().forEach(e=>{
      h+='<div class="rlogitem" onclick="showEditPitRunModal(\''+e.id+'\')" style="cursor:pointer"><div class="rdot '+(e.earned?'e':'u')+'"></div>'

    h+='</div>';
  }
  return h+'</div>';
}

  renderCt();
}
function togglePitPlayer(pno){
  if(!S.pitExpanded)S.pitExpanded={};

  renderCt();
}
function rLog(){
  const canEdit=PERM.canEdit;
  // 전체 경기 목록 수집
  const allGames=[...S.games].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  // blog/pit_bf에서 game 정보 보완
  const knownGids=new Set(allGames.map(g=>g.id));
  const usedGids=[...new Set([...S.blog.map(e=>e.gid),...S.pit_bf.map(e=>e.gid)])].filter(Boolean);
  usedGids.forEach(gid=>{
    if(!knownGids.has(gid)){
      const sample=S.blog.find(e=>e.gid===gid)||S.pit_bf.find(e=>e.gid===gid);
      if(sample){allGames.push({id:gid,no:'?',date:sample.date||'',opp:sample.opp||'?'});knownGids.add(gid);}
    }
  });
  allGames.sort((a,b)=>String(b.date).localeCompare(String(a.date)));

  if(!allGames.length)
    return'<div class="empty">📋<br><br>기록이 없습니다.</div>';

  // 선택 경기
  const selGid=S.logGameId;

  // 달력 표시 월 결정 (기본: 현재 년/월)
  const now=new Date();
  const todayMon=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  let calMon=S.calMonth||todayMon;
  const calY=parseInt(calMon.slice(0,4)),calM=parseInt(calMon.slice(5,7));
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const nextMon=calM===12?(calY+1)+'-01':calY+'-'+String(calM+1).padStart(2,'0');
  const firstDow=new Date(calY,calM-1,1).getDay();
  const daysInMon=new Date(calY,calM,0).getDate();

  // 이 달의 경기 맵 {dd -> game}
  const gameMap={};
  allGames.forEach(g=>{
    if(g.date&&g.date.slice(0,7)===calMon){
      const dd=g.date.slice(8,10);
      if(!gameMap[dd])gameMap[dd]=g;
    }
  });
  const noDateGames=allGames.filter(g=>!g.date||!g.date.match(/^\d{4}-\d{2}-\d{2}$/));
  if(isTablet())return rLogIPad(selGid,allGames);

  // 달력 렌더
  const DOW=['일','월','화','수','목','금','토'];
  let h='<div class="cal-wrap">';
  h+='<div class="cal-nav">'
    +'<button onclick="S.calMonth=\''+prevMon+'\';S.logGameId=null;renderCt()">&#8249;</button>'
    +'<span>'+calY+'년 '+calM+'월</span>'
    +'<button onclick="S.calMonth=\''+nextMon+'\';S.logGameId=null;renderCt()">&#8250;</button>'
    +'</div>';
  h+='<div class="cal-grid">';
  DOW.forEach(function(d,i){
    h+='<div class="cal-dow" style="color:'+(i===0?'#ef4444':i===6?'#3b82f6':'var(--txt2)')+'">'+d+'</div>';
  });
  for(var ei=0;ei<firstDow;ei++)h+='<div class="cal-cell"></div>';
  for(var day=1;day<=daysInMon;day++){
    var ds=String(day).padStart(2,'0');
    var g=gameMap[ds];
    var isSel=g&&g.id===S.logGameId;
    var isOff=g&&(g.type||'O')==='O';
    var dow=new Date(calY,calM-1,day).getDay();
    var dc=dow===0?'#ef4444':dow===6?'#3b82f6':'var(--txt)';
    var isCurG=g&&S.game&&g.id===S.game.id;
    h+='<div class="cal-cell'+(g?' has-game':'')+(isSel?' selected':'')+'"'
      +(g?' onclick="var _gid=\''+g.id+'\';S.logGameId=(_gid===S.logGameId?null:_gid);S.calMonth=\''+calMon+'\';S.logExpanded={};S.pitExpanded={};S.logSection=\'bat\';renderCt()"':'')+' >';
    h+='<span class="cal-day" style="color:'+dc+'">'+(isCurG?'<strong>'+day+'</strong>':day)+'</span>';
    if(g)h+='<span class="cal-dot" style="background:'+(isOff?'var(--navy)':'#16a34a')+'"></span>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="cal-legend">'
    +'<span><span class="cal-dot" style="background:var(--navy);display:inline-block"></span>정식경기</span>'
    +'<span><span class="cal-dot" style="background:#16a34a;display:inline-block"></span>연습경기</span>'
    +'</div>';

  // 선택 경기 요약 (날짜 클릭 시만)
  if(selGid){
    const selGame=allGames.find(function(g){return g.id===selGid;});
    if(selGame){
      var sd=selGame.date||'';
      var sdParts=sd.split('-');
      var sdow=sd?['일','월','화','수','목','금','토'][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
      var isOffSel=(selGame.type||'O')==='O';
      var isCurSel=S.game&&S.game.id===selGid;
      h+='<div class="cal-summary">';
      var selSc=gameScore(selGid);
      if(selSc.has){
        var selWin=selSc.our>selSc.opp,selLose=selSc.our<selSc.opp;
        h+='<div style="display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 0 8px;border-bottom:1px solid var(--bdr);margin-bottom:8px">'
          +'<div style="text-align:center"><div style="font-size:11px;color:var(--txt2);margin-bottom:2px">우리팀</div>'
          +'<div style="font-size:32px;font-weight:900;color:'+(selWin?'#16a34a':'var(--txt)')+'">'+selSc.our+'</div></div>'
          +'<div style="text-align:center"><div style="font-size:14px;font-weight:700;padding:4px 10px;border-radius:6px;background:'+(selWin?'#dcfce7':selLose?'#fee2e2':'var(--bg2)')+';color:'+(selWin?'#15803d':selLose?'#dc2626':'var(--txt2)')+';">'+(selWin?'승':selLose?'패':'무')+'</div></div>'
          +'<div style="text-align:center"><div style="font-size:11px;color:var(--txt2);margin-bottom:2px">상대팀</div>'
          +'<div style="font-size:32px;font-weight:900;color:'+(selLose?'#dc2626':'var(--txt)')+'">'+selSc.opp+'</div></div>'
          +'</div>';
      }
      h+='<div class="cal-sum-date">';
      if(sd)h+=parseInt(sdParts[1])+'월 '+parseInt(sdParts[2])+'일 ('+sdow+') &nbsp;';
      h+='vs '+esc(selGame.opp);
      h+=' <span style="background:'+(isOffSel?'#EBF0FB':'#dcfce7')+';color:'+(isOffSel?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 8px;font-size:11px;font-weight:600">'+(isOffSel?'정식':'연습')+'</span>';
      if(selGame.status==='active'||(selGame.status===undefined&&isCurSel))
        h+=' <span style="background:#fee2e2;color:#b91c1c;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:700">진행중</span>';
      else if(selGame.status==='ended')
        h+=' <span style="background:#f3f4f6;color:#6b7280;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:600">종료</span>';
      var _canManageGame=PERM.canManageGame;
      if(_canManageGame){
        h+='<button onclick="showEditGameModal(\''+selGid+'\')" style="margin-left:auto;background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit;flex-shrink:0">✏ 수정</button>';
        if(selGame.status==='active')
          h+='<button onclick="forceEndGame(\''+selGid+'\')" style="background:none;border:1px solid #fbbf24;border-radius:var(--r);padding:3px 10px;font-size:11px;color:#b45309;cursor:pointer;font-family:inherit;flex-shrink:0">⏹ 강제종료</button>';
        else
          h+='<button onclick="delGame(\''+selGid+'\')" style="background:none;border:1px solid #fca5a5;border-radius:var(--r);padding:3px 10px;font-size:11px;color:#dc2626;cursor:pointer;font-family:inherit;flex-shrink:0">🗑 삭제</button>';
      }
      h+='</div>';
      var _isAddAllowed=PERM.canEdit;
      if(_isAddAllowed){
        h+='<div style="display:flex;gap:8px;margin-top:10px">'
          +'<button onclick="startAddToGame(\''+selGid+'\',\'bat\')" style="flex:1;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">⚾ 타자 기록 추가</button>'
          +'<button onclick="startAddToGame(\''+selGid+'\',\'pit\')" style="flex:1;background:var(--red);color:#fff;border:none;border-radius:var(--r);padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">🎯 투수 기록 추가</button>'
          +'</div>';
      }

      // 대표 선수 기록
      var _an=activeNo();
      if(_an){
        var mp=ROSTER.find(function(x){return x.no===_an;});
        if(mp){
          var mpBat=S.blog.filter(function(e){return e.gid===selGid&&e.pno===_an;});
          var mpPit=S.pit_bf.filter(function(e){return e.gid===selGid&&e.pno===_an;});
          h+='<div class="cal-sum-player">#'+mp.no+' '+mp.name+'</div>';
          if(mpBat.length){
            var bAB=0,bH=0,bRBI=0;
            mpBat.forEach(function(e){var s=paS(e.oc);bAB+=s.ab;bH+=s.h;bRBI+=e.rbi||0;});
            h+='<div class="cal-sum-stat">타격 · '+bAB+'타수 '+bH+'안타'+(bRBI?' · '+bRBI+'타점':'')+'</div>';
          }
          if(mpPit.length){
            var ps=calcPitStats(_an,selGid);
            h+='<div class="cal-sum-stat">투수 · '+ps.ipd+'이닝'+(ps.r?' · '+ps.r+'실점 (자책 '+ps.er+')':'')+'</div>';
          }
          if(!mpBat.length&&!mpPit.length)
            h+='<div class="cal-sum-stat" style="color:var(--txt2)">이 경기 기록 없음</div>';
        }
      } else {
        h+='<div class="cal-sum-stat" style="color:var(--txt2);font-size:12px">설정에서 대표 선수를 지정하면 개인 기록이 표시됩니다.</div>';
      }
      h+='</div>';
    }
  }
  h+='</div>';

  // 날짜 없거나 빈 경기 복구 섹션
  if(noDateGames.length){
    h+='<div style="margin:8px 12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--rl);padding:12px 14px">';

    noDateGames.forEach(function(g){
      var bCnt=S.blog.filter(function(e){return e.gid===g.id;}).length;
      var pCnt=S.pit_bf.filter(function(e){return e.gid===g.id;}).length;
      h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid #fcd34d">';
      h+='<div style="flex:1">';
      h+='<div style="font-size:13px;font-weight:600;color:var(--txt)">vs '+esc(g.opp||'?')+'</div>';

// 월간 전체 기록 뷰
function rLogMonthly(allGames,calMon,calY,calM){
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const monGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===calMon);
  const prevGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===prevMon);
  let h='';

  // 대표 선수 이번달 vs 지난달 주요 타격 지표 3가지
  if(S.role==='user'&&activeNo()){
    const myNo=Number(activeNo());
    const curGids=new Set(monGames.map(g=>g.id));
    const prevGids=new Set(prevGames.map(g=>g.id));
    const curBlog=S.blog.filter(e=>curGids.has(e.gid)&&Number(e.pno)===myNo);
    const prevBlog=S.blog.filter(e=>prevGids.has(e.gid)&&Number(e.pno)===myNo);
    function calcMS(entries){
      var ab=0,h2=0,bb=0,hbp=0,sf=0,d2=0,d3=0,hr=0;
      entries.forEach(function(e){var s=paS(e.oc);ab+=s.ab;h2+=s.h;bb+=s.bb;hbp+=s.hbp;sf+=s.sf;d2+=s.d2;d3+=s.d3;hr+=s.hr;});
      var avg=ab>0?h2/ab:null;
      var obp=(ab+bb+hbp+sf)>0?(h2+bb+hbp)/(ab+bb+hbp+sf):null;
      var slg=ab>0?(h2+d2+2*d3+3*hr)/ab:null;
      var ops=(obp!==null&&slg!==null)?obp+slg:null;
      return{avg:avg,obp:obp,ops:ops,pa:entries.length,ab:ab,h:h2};
    }
    const cur=calcMS(curBlog),prev=calcMS(prevBlog);
    const mp=ROSTER.find(function(x){return x.no===myNo;});
    const mpName=mp?mp.name:'#'+myNo;
    const prevMonLabel=(prevMon.slice(0,4)===String(calY)?'':prevMon.slice(0,4)+'년 ')+parseInt(prevMon.slice(5,7))+'월';
    if(cur.pa>0||prev.pa>0){
      h+='<div style="margin:8px 12px 4px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:2px">'+mpName+' '+calM+'월 주요 타격지표 <span style="font-weight:400;color:var(--txt2);font-size:11px">vs '+prevMonLabel+'</span></div>';
      h+='<div style="font-size:12px;color:var(--txt2);margin-bottom:10px">'+cur.ab+'타수 '+cur.h+'안타</div>';
      h+='<div style="display:flex;gap:8px">';
      var stats2=[
        {key:'AVG',cur:cur.avg,prev:prev.avg},
        {key:'OBP',cur:cur.obp,prev:prev.obp},
        {key:'OPS',cur:cur.ops,prev:prev.ops}
      ];
      stats2.forEach(function(st){
        var cf=function(v){return v!==null?v.toFixed(3):'-';};
        var diff=(st.cur!==null&&st.prev!==null)?st.cur-st.prev:null;
        var arrow=diff===null?'':diff>0.001?'↑':diff<-0.001?'↓':'→';
        var arrowC=diff===null?'var(--txt2)':diff>0.001?'#16a34a':diff<-0.001?'#dc2626':'var(--txt2)';
        h+='<div style="flex:1;text-align:center;background:var(--bg2);border-radius:var(--r);padding:10px 6px">';
        h+='<div style="font-size:10px;color:var(--txt2);margin-bottom:4px">'+st.key+'</div>';
        h+='<div style="font-size:18px;font-weight:700;color:var(--navy)">'+cf(st.cur)+'</div>';
        h+='<div style="font-size:11px;color:'+arrowC+';margin-top:3px">'+arrow+' '+cf(st.prev)+'</div>';
        h+='</div>';
      });
      h+='</div></div>';
    }
  }

  // 이 달의 경기 목록
  if(!monGames.length){

  }
  h+='<div class="seclbl">'+calY+'년 '+calM+'월 경기 목록</div>';
  monGames.forEach(function(g){

    var sdParts=sd.split('-');
    var sdow=sd&&sdParts.length===3?['일','월','화','수','목','금','토'][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
    var isOff=(g.type||'O')==='O';
    h+='<div class="logitem" style="cursor:pointer" onclick="S.logGameId=\''+g.id+'\';S.calMonth=\''+calMon+'\';renderCt()">';
    h+='<div style="min-width:0;flex:1">';
    h+='<div style="font-size:13px;font-weight:600;color:var(--txt)">';
    if(sd)h+=parseInt(sdParts[2])+'일('+sdow+') ';
    h+='vs '+esc(g.opp);
    h+=' <span style="background:'+(isOff?'#EBF0FB':'#dcfce7')+';color:'+(isOff?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600">'+(isOff?'정식':'연습')+'</span>';
    if(g.status==='active')h+=' <span style="background:#fee2e2;color:#b91c1c;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:700">진행중</span>';
    h+='</div>';
    if(PERM.parent&&activeNo()){
      var myNo2=Number(activeNo());
      var mpBat2=S.blog.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var mpPit2=S.pit_bf.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var parts=[];
      if(mpBat2.length){
        var bAB2=0,bH2=0,bRBI2=0;
        mpBat2.forEach(function(e){var s=paS(e.oc);bAB2+=s.ab;bH2+=s.h;bRBI2+=e.rbi||0;});
        parts.push(bAB2+'타수 '+bH2+'안타'+(bRBI2?' · '+bRBI2+'타점':''));
      }
      if(mpPit2.length){var ps2=calcPitStats(myNo2,g.id);parts.push(ps2.ipd+'이닝');}
      if(parts.length)h+='<div style="font-size:11px;color:var(--txt2);margin-top:2px">'+parts.join(' / ')+'</div>';
    }
    h+='</div>';
    var sc=gameScore(g.id);
    if(sc.has){
      var win=sc.our>sc.opp,lose=sc.our<sc.opp;
      h+='<div style="text-align:right;flex-shrink:0;padding-left:10px">'
        +'<div style="font-size:18px;font-weight:800;letter-spacing:1px;color:'+(win?'#16a34a':lose?'#dc2626':'var(--txt2)')+'">'+sc.our+' - '+sc.opp+'</div>'
        +'<div style="font-size:10px;font-weight:700;color:'+(win?'#16a34a':lose?'#dc2626':'var(--txt2)')+';">'+(win?'승':lose?'패':'무')+'</div>'
        +'</div>';
    } else {
      h+='<span style="color:var(--txt2);font-size:18px;padding-left:8px">›</span>';
    }
    h+='</div>';
  });
  return h;
}

function rZoneInput(currentZone,cb){
  var cx=175,cy=278,rIF=105,rOF=218,rHP=10;
  function pxy(deg,r){var rd=deg*Math.PI/180;return{x:(cx+r*Math.sin(rd)).toFixed(1),y:(cy-r*Math.cos(rd)).toFixed(1)};}
  function arc(a1,a2,r1,r2){
    var p1o=pxy(a1,r2),p2o=pxy(a2,r2),p1i=pxy(a1,r1),p2i=pxy(a2,r1);
    return 'M '+p1o.x+' '+p1o.y+' A '+r2+' '+r2+' 0 0 1 '+p2o.x+' '+p2o.y+' L '+p2i.x+' '+p2i.y+' A '+r1+' '+r1+' 0 0 0 '+p1i.x+' '+p1i.y+' Z';
  }
  var IF_Z=[
    {z:'3B',l:'3루',a1:-45,a2:-22,c:'#e74c3c'},
    {z:'SS',l:'유격',a1:-22,a2:1, c:'#e67e22'},
    {z:'2B',l:'2루',a1:1,  a2:24, c:'#2ecc71'},
    {z:'1B',l:'1루',a1:24, a2:45, c:'#1abc9c'},
  ];
  var OF_Z=[
    {z:'LF',l:'좌익',a1:-45,a2:-27,c:'#e74c3c'},
    {z:'LC',l:'좌중',a1:-27,a2:-9, c:'#e67e22'},
    {z:'CF',l:'중앙',a1:-9, a2:9,  c:'#f1c40f'},
    {z:'RC',l:'우중',a1:9,  a2:27, c:'#2ecc71'},
    {z:'RF',l:'우익',a1:27, a2:45, c:'#1abc9c'},
  ];
  var selLabel=currentZone?(zoneKo(currentZone)+' ('+currentZone+') 선택됨'):'공이 날아간 방향을 터치해 주세요';
  var selColor=currentZone?'#86efac':'rgba(255,255,255,0.4)';
  var h='';
  var bg1=pxy(-45,rOF),bg2=pxy(45,rOF);
  h+='<path d="M '+cx+' '+cy+' L '+bg1.x+' '+bg1.y+' A '+rOF+' '+rOF+' 0 0 1 '+bg2.x+' '+bg2.y+' Z" fill="#1e4d2b"/>';
  var if1=pxy(-45,rIF),if2=pxy(45,rIF);
  h+='<path d="M '+cx+' '+cy+' L '+if1.x+' '+if1.y+' A '+rIF+' '+rIF+' 0 0 1 '+if2.x+' '+if2.y+' Z" fill="#2d6a3f"/>';
  OF_Z.forEach(function(z){
    var sel=currentZone===z.z;
    h+='<path d="'+arc(z.a1,z.a2,rIF,rOF)+'" fill="'+(sel?z.c:'rgba(255,255,255,0.06)')+'" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" onclick="'+cb+'(&apos;'+z.z+'&apos;)" style="cursor:pointer"/>';

  h+='<path d="M '+bg1.x+' '+bg1.y+' A '+rOF+' '+rOF+' 0 0 1 '+bg2.x+' '+bg2.y+'" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>';
  h+='<polygon points="'+cx+','+(cy-10)+' '+(cx+8)+','+(cy+1)+' '+(cx+4)+','+(cy+9)+' '+(cx-4)+','+(cy+9)+' '+(cx-8)+','+(cy+1)+'" fill="white" opacity=".9"/>';
  // 선택 상태 표시 (필드 위)
  h+='<text x="175" y="12" text-anchor="middle" dominant-baseline="middle" fill="'+selColor+'" font-size="12" font-weight="'+(currentZone?'700':'400')+'">'+selLabel+'</text>';

function rSprayChart(pno){
  var pno2=Number(pno);
  var roster=ROSTER.find(function(x){return Number(x.no)===pno2;});
  var playerName=roster?roster.name:('#'+pno2);
  var blog=S.blog.filter(function(e){return Number(e.pno)===pno2;});
  var entries=blog.filter(function(e){return e.zone;});
  console.log('[SprayChart] pno='+pno2+' name='+playerName+' blog='+blog.length+' zone='+entries.length);
  var cx=175,cy=200,r=162;
  var SECTORS=[
    {label:'3루수', keys:['3B','LF'],           startDeg:-45,endDeg:-26,color:'#e74c3c',inner:'#922b21'},
    {label:'유격수', keys:['SS'],           startDeg:-26,endDeg:-8, color:'#f39c12',inner:'#d35400'},
    {label:'중앙',   keys:['LC','CF','RC'], startDeg:-8, endDeg:10, color:'#f1c40f',inner:'#d4ac0d'},
    {label:'2루수',  keys:['2B'],           startDeg:10, endDeg:28, color:'#2ecc71',inner:'#1e8449'},
    {label:'1루수',  keys:['1B','RF'],           startDeg:28, endDeg:45, color:'#16a085',inner:'#0e6655'},
  ];
  function pxy(deg){
    var rd=deg*Math.PI/180;
    return{x:cx+r*Math.sin(rd),y:cy-r*Math.cos(rd)};
  }
  function f(v){return v.toFixed(1);}
  var sc=SECTORS.map(function(s){
    return Object.assign({},s,{count:s.keys.reduce(function(a,k){return a+(entries.filter(function(e){return e.zone===k;}).length);},0)});
  });
  var total=sc.reduce(function(a,x){return a+x.count;},0);
  var noData=total===0;
  var h='';

  if(noData){
    // 데이터 없을 때도 팬 틀은 보여줌
    var bg0=pxy(-45),bg1=pxy(45);
    h+='<path d="M '+cx+' '+cy+' L '+f(bg0.x)+' '+f(bg0.y)+' A '+r+' '+r+' 0 0 1 '+f(bg1.x)+' '+f(bg1.y)+' Z" fill="rgba(255,255,255,.06)"/>';
    sc.forEach(function(s){
      var p1=pxy(s.startDeg),p2=pxy(s.endDeg);
      h+='<path d="M '+cx+' '+cy+' L '+f(p1.x)+' '+f(p1.y)+' A '+r+' '+r+' 0 0 1 '+f(p2.x)+' '+f(p2.y)+' Z" fill="'+s.color+'" opacity="0.18"/>';
      var mid=(s.startDeg+s.endDeg)/2;
      var ep={x:cx+(r*0.6)*Math.sin(mid*Math.PI/180),y:cy-(r*0.6)*Math.cos(mid*Math.PI/180)};
      h+='<text x="'+f(ep.x)+'" y="'+f(ep.y)+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.25)" font-size="11">'+s.label+'</text>';
    });
  } else {
    // 거리 반호
    [0.48,0.74].forEach(function(ratio){
      var s=pxy(-45),e=pxy(45);
      var ri=r*ratio;
      var si={x:cx+ri*Math.sin(-45*Math.PI/180),y:cy-ri*Math.cos(-45*Math.PI/180)};
      var ei={x:cx+ri*Math.sin(45*Math.PI/180),y:cy-ri*Math.cos(45*Math.PI/180)};
      h+='<path d="M '+f(si.x)+' '+f(si.y)+' A '+f(ri)+' '+f(ri)+' 0 0 1 '+f(ei.x)+' '+f(ei.y)+'" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1" stroke-dasharray="3 4"/>';
    });
    // 섹터
    sc.forEach(function(s){
      var p1=pxy(s.startDeg),p2=pxy(s.endDeg);
      var pct=Math.round(s.count/total*100);
      // 섹터 채움
      h+='<path d="M '+cx+' '+cy+' L '+f(p1.x)+' '+f(p1.y)+' A '+r+' '+r+' 0 0 1 '+f(p2.x)+' '+f(p2.y)+' Z" fill="'+s.color+'" opacity="0.88"/>';
      // 안쪽 어둠
      var ri=r*0.38;
      var p1i={x:cx+ri*Math.sin(s.startDeg*Math.PI/180),y:cy-ri*Math.cos(s.startDeg*Math.PI/180)};
      var p2i={x:cx+ri*Math.sin(s.endDeg*Math.PI/180),y:cy-ri*Math.cos(s.endDeg*Math.PI/180)};
      h+='<path d="M '+cx+' '+cy+' L '+f(p1i.x)+' '+f(p1i.y)+' A '+f(ri)+' '+f(ri)+' 0 0 1 '+f(p2i.x)+' '+f(p2i.y)+' Z" fill="'+s.inner+'" opacity="0.4"/>';
      var mid=(s.startDeg+s.endDeg)/2;
      var lp={x:cx+(r*0.62)*Math.sin(mid*Math.PI/180),y:cy-(r*0.62)*Math.cos(mid*Math.PI/180)};
      // % 텍스트 - 폰트 크기 조정
      h+='<text x="'+f(lp.x)+'" y="'+f(lp.y)+'" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="12" font-weight="900" opacity=".95">'+pct+'%</text>';
      // 타구수
      if(s.count>0){
        h+='<text x="'+f(lp.x)+'" y="'+f(lp.y+15)+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.85)" font-size="11">'+s.count+'타구</text>';
      }
      // 구역 레이블 - 호 가장자리
      var ep={x:cx+(r*0.87)*Math.sin(mid*Math.PI/180),y:cy-(r*0.87)*Math.cos(mid*Math.PI/180)};
      h+='<text x="'+f(ep.x)+'" y="'+f(ep.y)+'" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="11" font-weight="600" opacity="0.9">'+s.label+'</text>';
    });
  }

  // 구분선
  [-26,-8,10,28].forEach(function(deg){
    var ep=pxy(deg);
    h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(ep.x)+'" y2="'+f(ep.y)+'" stroke="rgba(0,0,0,.28)" stroke-width="1.5"/>';
  });
  // 파울라인
  var fl=pxy(-45),fr=pxy(45);
  h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(fl.x)+'" y2="'+f(fl.y)+'" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>';
  h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(fr.x)+'" y2="'+f(fr.y)+'" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>';
  // 외야 펜스 호
  h+='<path d="M '+f(fl.x)+' '+f(fl.y)+' A '+r+' '+r+' 0 0 1 '+f(fr.x)+' '+f(fr.y)+'" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>';
  // 홈플레이트
  h+='<polygon points="'+cx+','+(cy-8)+' '+(cx+6)+','+(cy+1)+' '+(cx+3)+','+(cy+7)+' '+(cx-3)+','+(cy+7)+' '+(cx-6)+','+(cy+1)+'" fill="white" opacity=".9"/>';
  // 제목
  h+='<text x="175" y="12" text-anchor="middle" fill="white" font-size="13" font-weight="700" opacity=".9">'+esc(playerName)+'의 스프레이 차트</text>';
  h+='<text x="175" y="25" text-anchor="middle" fill="rgba(255,255,255,.65)" font-size="11">'+total+'타구 방향 기록 / 전체 '+blog.length+'타석</text>';

  // 하단 요약 통계
  var pull=sc[0].count+sc[1].count;
  var ctr=sc[2].count;
  var oppo=sc[3].count+sc[4].count;
  var pp=total>0?Math.round(pull/total*100):0;
  var cp=total>0?Math.round(ctr/total*100):0;
  var op=total>0?Math.round(oppo/total*100):0;

  return '<div id="spray-section" style="padding:0 12px 8px">'
    +'<div style="background:#111827;border-radius:14px;overflow:hidden;padding:12px 0 10px">'
    +'<div style="display:flex;align-items:center;justify-content:flex-end;padding:0 12px 6px">'
    +'<button onclick="setSprayPlayer('+pno2+')" style="background:rgba(255,255,255,.15);border:none;color:rgba(255,255,255,.85);cursor:pointer;font-size:14px;padding:10px 14px;border-radius:6px;min-height:44px;line-height:1">✕</button>'
    +'</div>'
    +'<svg viewBox="0 0 350 215" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">'+h+'</svg>'
    // 범례
    +'<div style="display:flex;gap:8px;justify-content:center;margin:6px 0 8px;flex-wrap:wrap">'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#e74c3c"></span>당겨치기</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#f39c12"></span>유격수</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#f1c40f"></span>중앙</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#2ecc71"></span>2루수</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#16a085"></span>밀어치기</span>'
    +'</div>'
    // 3단 요약
    +(noData?('<div style="padding:0 12px;text-align:center;font-size:11px;color:rgba(255,255,255,.5)">타구 방향 데이터가 없습니다. 타석 입력 시 방향을 선택하면 표시됩니다.</div>'+'<div style="padding:2px 12px 4px;text-align:center;font-size:10px;color:rgba(255,255,255,.25)">[디버그] pno='+pno2+' 타석='+blog.length+'건 방향='+entries.length+'건</div>'):('<div style="display:flex;gap:6px;margin:0 12px">'+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#f87171">'+pp+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">당겨치기</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#fde047">'+cp+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">중앙</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#4ade80">'+op+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">밀어치기</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:white">'+total+'</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">기록타구</div></div>')+'</div>'))
    +'</div></div>';
}

function copyToClipboard(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){toast('복사됨','ok');}).catch(function(){_fallbackCopy(text);});
  }else{_fallbackCopy(text);}
}
function _fallbackCopy(text){
  var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');toast('복사됨','ok');}catch(e){toast('복사 실패');}
  document.body.removeChild(ta);
}
async function genPlayerCode(playerNo,force){
  if(!PERM.admin)return;
  var p=ROSTER.find(function(x){return x.no===playerNo;});
  if(p&&p.inviteCode&&!force){
    showConfirm('이미 초대코드가 있습니다.<br>다시 생성할까요?',function(){genPlayerCode(playerNo,true);});
    return;
  }
  try{
    var code=await SB.generatePlayerInviteCode(playerNo,S.teamId);
    ROSTER.forEach(function(x){if(x.no===playerNo)x.inviteCode=code;});
    toast('초대코드 생성: '+code,'ok');
    renderCt();
  }catch(e){toast(e.message||'생성 실패');}
}
async function genAllPlayerCodes(){
  if(!PERM.admin)return;
  var hasExisting=ROSTER.some(function(p){return p.inviteCode;});
  if(hasExisting){
    showConfirm('일부 선수에게 이미 초대코드가 있습니다.<br>전체 재생성할까요?',async function(){
      await _doGenAllPlayerCodes();
    });
  }else{
    await _doGenAllPlayerCodes();
  }
}
async function _doGenAllPlayerCodes(){
  if(!ROSTER.length)return;
  toast('생성 중...','ok');
  var failed=0;
  for(var i=0;i<ROSTER.length;i++){
    try{
      var code=await SB.generatePlayerInviteCode(ROSTER[i].no,S.teamId);
      ROSTER[i].inviteCode=code;
    }catch(e){failed++;}

var _lockTimer=null;
function _postLock(action,gid){
  if(!S.scriptUrl||!gid)return;
  fetch(S.scriptUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=UTF-8'},
    body:JSON.stringify({type:'lock',action:action,gid:gid,deviceId:DEVICE_ID,token:S.scriptToken||''})})
    .catch(function(){});
}
function lockGame(gid){
  if(!gid)return;
  _postLock('acquire',gid);
  clearInterval(_lockTimer);
  _lockTimer=setInterval(function(){_postLock('refresh',gid);},3*60*1000);
}
function unlockGame(gid){
  clearInterval(_lockTimer);_lockTimer=null;
  _postLock('release',gid);
}
function endGame(){
  if(!S.game)return;
  if(!confirm('vs '+S.game.opp+' 경기를 종료하시겠습니까?\n\n종료 후 자동으로 동기화됩니다.'))return;
  var gid=S.game.id;
  var gi=S.games.findIndex(function(x){return x.id===gid;});
  if(gi>=0){S.games[gi].status='ended';S.syncedIds.delete('g_'+gid);}
  if(window.SupabaseClient&&S.teamId){var eg=S.games[gi]||{id:gid,opp:S.game?S.game.opp:'?',date:S.game?S.game.date:'',type:'R',no:1,status:'ended'};SB.upsertGame(Object.assign({},eg,{status:'ended'}),S.teamId).catch(function(){});}
  S.game=null;S.curPit=null;S.bs=0;S.batSub=0;S.ps=0;S.undoStack=[];S.pitUndoStack=[];
  save();r();toast('경기 종료 — 동기화 중...');
  unlockGame(gid);
  if(S.scriptUrl&&navigator.onLine){pushGamesOnly();doSync();}
}
function leaveGame(){
  if(!S.game)return;
  if(!confirm('경기에서 나가시겠습니까?\n경기 기록은 유지됩니다.'))return;
  var gid=S.game.id;
  S.game=null;S.curPit=null;S.bs=0;S.batSub=0;S.ps=0;S.undoStack=[];S.pitUndoStack=[];
  save();r();toast('경기에서 나왔습니다');
  unlockGame(gid);
}
function forceEndGame(gid){
  if(PERM.parent)return;
  const g=S.games.find(function(x){return x.id===gid;});
  if(!g)return;
  const label='vs '+(g.opp||'?')+(g.date?' ('+g.date+')':'');
  if(!confirm('경기를 강제 종료하시겠습니까?\n\n'+label+'\n\n종료 후 삭제할 수 있습니다.'))return;
  const gi=S.games.findIndex(function(x){return x.id===gid;});
  if(gi>=0){S.games[gi].status='ended';S.syncedIds.delete('g_'+gid);}
  if(S.game&&S.game.id===gid){S.game=null;S.curPit=null;S.bs=0;S.batSub=0;S.ps=0;S.undoStack=[];S.pitUndoStack=[];unlockGame(gid);}
  save();renderCt();toast('경기가 강제 종료됐습니다','ok');
  if(S.scriptUrl&&navigator.onLine)pushGamesOnly();
}

function undoRunnerAdv(){
  if(!S.runnerDecisions||!S.game)return;
  for(var k in S.runnerDecisions){
    if(S.runnerDecisions[k]==='scored'){
      var ents=S.blog.filter(function(e){return e.gid===S.game.id&&Number(e.pno)===Number(k);});
      if(ents.length)ents[ents.length-1].run=Math.max(0,(ents[ents.length-1].run||0)-1);
    }
  }
}
function confirmRunnerAdv(pno,scored,stay2){
  if(scored){
    scoreRunnerBase(pno);
    var sc=S.game?gameScore(S.game.id):{our:0,opp:0};
    var runner=ROSTER.find(function(x){return Number(x.no)===Number(pno);});
    toast((runner?runner.name:'주자')+' 득점! '+sc.our+' : '+sc.opp,'ok');
    S.runnerDecisions[pno]='scored';
    S.brbi++;
  }else if(stay2){
    S.runnerDecisions[pno]='stay2';
  }else{
    S.runnerDecisions[pno]=false;
  }
  S.pendingScores=S.pendingScores.slice(1);
  if(S.pendingScores.length>0){r();}
  else{S.bs=3;r();}
}

  }
  S.bo=id;S.bzone=null;S.bsb=0;S.bcs=0;
  S.runnerDecisions={};
  var b=S.bases;
  var pending=[];
  if((id==='1B'||id==='2B'||id==='GO')&&b.b3!=null)pending.push({pno:b.b3,from:'b3'});
  if((id==='1B'||id==='2B')&&b.b2!=null)pending.push({pno:b.b2,from:'b2'});

function applyPitBaseAdv(oc,pitBfId){
  if(!S.game)return;
  if(!S.pitBases)S.pitBases={b1:null,b2:null,b3:null};
  if(typeof S.pitOuts!=='number')S.pitOuts=0;
  var b={b1:S.pitBases.b1,b2:S.pitBases.b2,b3:S.pitBases.b3};
  var scored=[];
  var batEarned=(oc!=='E'&&oc!=='KWP');
  var pp=ROSTER.find(function(x){return x.no===S.curPit;});
  var curPno=pp?pp.no:null;var curPn=pp?pp.name:'?';
  var nr=function(earned){return{earned:earned,pno:curPno,pn:curPn};};
  if(oc==='HR'){
    if(b.b1)scored.push(b.b1);if(b.b2)scored.push(b.b2);if(b.b3)scored.push(b.b3);
    scored.push(nr(batEarned));
    b.b1=null;b.b2=null;b.b3=null;
  }else if(oc==='3B'){
    if(b.b1)scored.push(b.b1);if(b.b2)scored.push(b.b2);if(b.b3)scored.push(b.b3);
    b.b1=null;b.b2=null;b.b3=nr(batEarned);
  }else if(oc==='2B'){
    if(b.b3)scored.push(b.b3);if(b.b2)scored.push(b.b2);
    b.b3=b.b1?b.b1:null;b.b2=nr(batEarned);b.b1=null;
  }else if(oc==='1B'){
    if(b.b3)scored.push(b.b3);
    b.b3=b.b2;b.b2=b.b1;b.b1=nr(batEarned);
  }else if(oc==='E'){
    if(b.b3)scored.push(b.b3);
    b.b3=b.b2;b.b2=b.b1;b.b1=nr(false);
  }else if(oc==='BB'||oc==='IBB'||oc==='HBP'||oc==='KWP'){
    if(b.b1!=null){
      if(b.b2!=null){
        if(b.b3!=null){scored.push(b.b3);b.b3=b.b2;}
        else{b.b3=b.b2;}
        b.b2=b.b1;
      }else{b.b2=b.b1;}
    }
    b.b1=nr(batEarned);
  }else if(oc==='FC'){
    S.pitOuts++;
    if(b.b1!=null){
      if(b.b2!=null){
        if(b.b3!=null){scored.push(b.b3);}
        b.b3=b.b2;
      }
      b.b2=b.b1;
    }
    b.b1=nr(true);
  }else if(oc==='K'||oc==='GO'||oc==='FO'){
    S.pitOuts++;
  }else if(oc==='DP'){
    S.pitOuts+=2;b.b1=null;
  }else if(oc==='SF'){
    S.pitOuts++;
    if(b.b3){scored.push(b.b3);b.b3=null;}
  }else if(oc==='SH'){
    S.pitOuts++;
    var shNewB3=(b.b2!=null)?b.b2:(b.b3!=null?b.b3:null);
    if(b.b2!=null&&b.b3!=null){scored.push(b.b3);}
    b.b3=shNewB3;b.b2=b.b1;b.b1=null;
  }
  S.pitBases={b1:b.b1,b2:b.b2,b3:b.b3};
  if(scored.length){
    scored.forEach(function(r){
      var rPno=r.pno!=null?r.pno:curPno;
      var rPn=r.pn||curPn;
      if(rPno!=null)S.pit_runs.push({id:UID(),gid:S.game.id,pno:rPno,pn:rPn,earned:r.earned,pitBfId:pitBfId||null});
    });
  }
  if(S.pitOuts>=3)S.pitOuts=3;
}

function scoreRunnerBase(pno){
  if(!S.game||pno==null)return;
  var ents=S.blog.filter(function(e){return e.gid===S.game.id&&Number(e.pno)===Number(pno);});
  if(ents.length){ents[ents.length-1].run=(ents[ents.length-1].run||0)+1;}
  else{var p=ROSTER.find(function(x){return Number(x.no)===Number(pno);});S.blog.push({id:UID(),gid:S.game.id,date:S.game.date,opp:S.game.opp,pno:pno,pn:p?p.name:'#'+pno,oc:'_RUN',rbi:0,run:1,sb:0,cs:0});}
}
function calcAutoRBI(oc){
  var b=S.bases;
  if(oc==='HR')return (b.b1!=null?1:0)+(b.b2!=null?1:0)+(b.b3!=null?1:0)+1;
  if(oc==='3B')return (b.b1!=null?1:0)+(b.b2!=null?1:0)+(b.b3!=null?1:0);
  if(oc==='2B')return 0;
  if(oc==='1B')return 0;
  if(oc==='SF')return (b.b3!=null?1:0);
  if(oc==='BB'||oc==='IBB'||oc==='HBP'||oc==='KWP')return (b.b1!=null&&b.b2!=null&&b.b3!=null)?1:0;
  return 0;
}
function applyBaseAdvancement(oc,pno){
  if(!S.game)return;
  var b={b1:S.bases.b1,b2:S.bases.b2,b3:S.bases.b3};
  if(oc==='HR'){
    if(b.b1!=null)scoreRunnerBase(b.b1);if(b.b2!=null)scoreRunnerBase(b.b2);if(b.b3!=null)scoreRunnerBase(b.b3);
    scoreRunnerBase(pno);S.bases={b1:null,b2:null,b3:null};
  }else if(oc==='3B'){
    if(b.b1!=null)scoreRunnerBase(b.b1);if(b.b2!=null)scoreRunnerBase(b.b2);if(b.b3!=null)scoreRunnerBase(b.b3);
    S.bases={b1:null,b2:null,b3:pno};
  }else if(oc==='2B'){
    var b3sc2=b.b3!=null&&S.runnerDecisions&&S.runnerDecisions[b.b3];
    var b2sc2=b.b2!=null&&S.runnerDecisions&&S.runnerDecisions[b.b2];
    var b1sc2=b.b1!=null&&S.runnerDecisions&&S.runnerDecisions[b.b1];
    if(b3sc2&&S.runnerDecisions[b.b3]!=='scored')scoreRunnerBase(b.b3);
    if(b2sc2&&S.runnerDecisions[b.b2]!=='scored')scoreRunnerBase(b.b2);
    if(b1sc2&&S.runnerDecisions[b.b1]!=='scored')scoreRunnerBase(b.b1);
    var nb3_2=null;
    if(b.b3!=null&&!b3sc2)nb3_2=b.b3;
    else if(b.b2!=null&&!b2sc2)nb3_2=b.b2;
    else if(b.b1!=null&&!b1sc2)nb3_2=b.b1;
    S.bases={b1:null,b2:pno,b3:nb3_2};
  }else if(oc==='1B'){
    var b3sc1=b.b3!=null&&S.runnerDecisions&&S.runnerDecisions[b.b3];
    var b2dec=b.b2!=null&&S.runnerDecisions?S.runnerDecisions[b.b2]:undefined;
    var nb3_1=null,nb2_1=null;
    if(b.b3!=null&&!b3sc1){
      nb3_1=b.b3;
      if(b2dec==='scored'){
        nb2_1=b.b1;
      }else{
        // stay2 또는 "3루 진루"(b3가 막아 실제 2루 잔류) — b2 stays at 2nd
        nb2_1=b.b2!=null?b.b2:b.b1;
      }
    }else{
      if(b2dec==='stay2'){
        // 진루 없음: b2 stays, b1 empty (stay2는 b1 비었을 때만 제공)
        nb3_1=null;
        nb2_1=b.b2;
      }else if(b.b2!=null&&!b2dec){
        // 3루 진루
        nb3_1=b.b2;
        nb2_1=b.b1;
      }else{
        // b2 scored or b2 null
        nb3_1=null;
        nb2_1=b.b1;
      }
    }
    S.bases={b1:pno,b2:nb2_1,b3:nb3_1};
  }else if(oc==='BB'||oc==='IBB'||oc==='HBP'||oc==='KWP'){
    if(b.b1!=null&&b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null&&b.b2!=null){S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null){S.bases={b1:pno,b2:b.b1,b3:b.b3};}
    else{S.bases={b1:pno,b2:b.b2,b3:b.b3};}
  }else if(oc==='E'){
    if(b.b1!=null&&b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null&&b.b2!=null){S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null){S.bases={b1:pno,b2:b.b1,b3:b.b3};}
    else{S.bases={b1:pno,b2:b.b2,b3:b.b3};}
    toast('추가 진루는 베이스 현황에서 이동하세요','');
  }else if(oc==='FC'){
    S.outs=(S.outs||0)+1;
    if(b.b1!=null&&b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null&&b.b2!=null){S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null){S.bases={b1:pno,b2:b.b1,b3:b.b3};}
    else{S.bases={b1:pno,b2:b.b2,b3:b.b3};}
    toast('아웃된 주자를 베이스 현황에서 제거해주세요','');
  }else if(oc==='K'||oc==='FO'){
    S.outs=(S.outs||0)+1;
  }else if(oc==='GO'){
    S.outs=(S.outs||0)+1;
    if(b.b3!=null&&S.runnerDecisions&&S.runnerDecisions[b.b3]==='scored'){
      S.bases={b1:b.b1,b2:b.b2,b3:null};
    }
  }else if(oc==='DP'){
    S.outs=(S.outs||0)+2;S.bases={b1:null,b2:b.b2,b3:b.b3};
    toast('베이스 현황을 확인하고 필요 시 조정해주세요','');
  }else if(oc==='SF'){
    S.outs=(S.outs||0)+1;if(b.b3!=null)scoreRunnerBase(b.b3);S.bases={b1:b.b1,b2:b.b2,b3:null};
  }else if(oc==='SH'){
    S.outs=(S.outs||0)+1;
    var batShNewB3=(b.b2!=null)?b.b2:(b.b3!=null?b.b3:null);
    if(b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);}
    S.bases={b1:null,b2:b.b1!=null?b.b1:null,b3:batShNewB3};
  }
}
function advanceBase(base){
  var pno=S.bases[base];if(pno==null)return;
  var p=ROSTER.find(function(x){return Number(x.no)===Number(pno);});
  var lbl=(p?p.name:'선수')+(base==='b3'?' 홈인':base==='b2'?' 3루 진루':' 2루 진루');
  pushUndo(snapBaseSt(lbl));
  if(base==='b3'){
    scoreRunnerBase(pno);
    var sc=S.game?gameScore(S.game.id):{our:0,opp:0};
    S.bases.b3=null;
    save();renderGHdr();renderCt();toast((p?p.name:'선수')+' 홈인! '+sc.our+' : '+sc.opp,'ok');
    if(window.SupabaseClient&&S.teamId&&S.game){var _gidAdv=S.game.id;SB.upsertBatLog(S.blog.filter(function(e){return e.gid===_gidAdv&&Number(e.pno)===Number(pno);}),S.teamId).catch(function(){});}
  }else if(base==='b2'){
    S.bases.b3=pno;S.bases.b2=null;
    save();renderCt();toast((p?p.name:'선수')+' 3루 진루','ok');
  }else if(base==='b1'){
    S.bases.b2=pno;S.bases.b1=null;
    save();renderCt();toast((p?p.name:'선수')+' 2루 진루','ok');
  }
  broadcastGameState('bat');
}
function stealBase(base){
  var pno=S.bases[base];if(pno==null)return;
  var p=ROSTER.find(function(x){return Number(x.no)===Number(pno);});
  pushUndo(snapBaseSt((p?p.name:'선수')+' 도루 성공'));
  if(base==='b1'){S.bases.b2=pno;S.bases.b1=null;}
  else if(base==='b2'){S.bases.b3=pno;S.bases.b2=null;}
  else if(base==='b3'){scoreRunnerBase(pno);S.bases.b3=null;}
  if(S.game){var ents=S.blog.filter(function(e){return e.gid===S.game.id&&Number(e.pno)===Number(pno);});if(ents.length)ents[ents.length-1].sb=(ents[ents.length-1].sb||0)+1;}
  save();renderGHdr();renderCt();
  toast((p?p.name:'선수')+' 도루 성공!','ok');
  broadcastGameState('bat');
}
function caughtBase(base){
  var pno=S.bases[base];if(pno==null)return;
  var p=ROSTER.find(function(x){return Number(x.no)===Number(pno);});
  pushUndo(snapBaseSt((p?p.name:'선수')+' 도루 실패'));
  S.bases[base]=null;S.outs=(S.outs||0)+1;
  if(S.game){var ents=S.blog.filter(function(e){return e.gid===S.game.id&&Number(e.pno)===Number(pno);});if(ents.length)ents[ents.length-1].cs=(ents[ents.length-1].cs||0)+1;}
  save();renderCt();
  toast((p?p.name:'선수')+' 도루 실패','');
  broadcastGameState('bat');
}
function removeFromBase(base){
  var pno=S.bases[base];if(pno==null)return;
  var p=ROSTER.find(function(x){return Number(x.no)===Number(pno);});
  pushUndo(snapBaseSt((p?p.name:'선수')+' 아웃'));

function advanceInning(){
  if(S.topBot!=='bot'){S.topBot='bot';}
  else{S.inning=Math.min((S.inning||1)+1,15);S.topBot='top';}
}
function adjInning(d){
  if(!S.game)return;
  if(d>0){advanceInning();}
  else{
    if(S.topBot==='bot'){S.topBot='top';}
    else{S.inning=Math.max((S.inning||1)-1,1);S.topBot='bot';}
  }
  save();renderGHdr();renderCt();broadcastGameState('bat');
}
function endInning(){
  var innLbl=(S.inning||1)+'회'+(S.topBot==='bot'?'말':'초');

  advanceInning();
  S.bases={b1:null,b2:null,b3:null};S.outs=0;save();renderGHdr();renderCt();toast('이닝 종료','ok');broadcastGameState('bat');

function delGame(gid){
  if(PERM.parent){alert('학부모 모드에서는 경기를 삭제할 수 없습니다.');return;}
  const g=S.games.find(x=>x.id===gid);
  if(!g)return;
  if(g.status==='active'){alert('진행 중인 경기는 삭제할 수 없습니다.\n기록 탭에서 먼저 ⏹ 강제종료 후 삭제해주세요.');return;}
  if(S.game&&S.game.id===gid){alert('경기가 진행 중입니다. 먼저 ■ 종료 버튼으로 경기를 끝내주세요.');return;}
  const bCnt=S.blog.filter(e=>e.gid===gid).length;
  const pCnt=S.pit_bf.filter(e=>e.gid===gid).length;
  const label='vs '+(g.opp||'?')+(g.date?' ('+g.date+')':'');
  var msg='경기를 삭제하시겠습니까?\n\n'+label;
  if(bCnt||pCnt)msg+='\n\n타자 기록 '+bCnt+'건, 투수 기록 '+pCnt+'건도 함께 삭제됩니다.';
  if(!confirm(msg))return;
  S.games=S.games.filter(x=>x.id!==gid);
  S.blog=S.blog.filter(e=>e.gid!==gid);
  S.pit_bf=S.pit_bf.filter(e=>e.gid!==gid);
  S.pit_runs=S.pit_runs.filter(e=>e.gid!==gid);
  if(S.logGameId===gid)S.logGameId=null;
  if(S.game&&S.game.id===gid)S.game=null;
  if(!S.deletedGids.includes(gid))S.deletedGids.push(gid);
  S.syncedIds.delete('g_'+gid);
  save();
  if(window.SupabaseClient)SB.deleteGame(gid).catch(function(){});
  toast(label+' 삭제됨','ok');r();
}
function checkDuplicateGames(){
  var groups={};
  S.games.forEach(function(g){
    var key=(g.date||'')+'__'+(g.opp||'');
    if(!groups[key])groups[key]=[];
    groups[key].push(g);
  });
  return Object.values(groups).filter(function(grp){return grp.length>1;});
}
function mergeGames(keepGid,removeGid){
  S.blog.forEach(function(e){if(e.gid===removeGid)e.gid=keepGid;});
  S.pit_bf.forEach(function(e){if(e.gid===removeGid)e.gid=keepGid;});
  S.pit_runs.forEach(function(e){if(e.gid===removeGid)e.gid=keepGid;});
  S.games=S.games.filter(function(g){return g.id!==removeGid;});
  if(!S.deletedGids.includes(removeGid))S.deletedGids.push(removeGid);
  S.syncedIds.delete('g_'+removeGid);
  if(S.game&&S.game.id===removeGid){S.game=S.games.find(function(g){return g.id===keepGid;})||null;}
  if(S.logGameId===removeGid)S.logGameId=keepGid;
  save();
  if(window.SupabaseClient&&S.teamId){
    var kgame=S.games.find(function(g){return g.id===keepGid;});
    if(kgame)SB.upsertGame(kgame,S.teamId).catch(function(){});
    SB.upsertBatLog(S.blog.filter(function(e){return e.gid===keepGid;}),S.teamId).catch(function(){});
    SB.upsertPitBf(S.pit_bf.filter(function(e){return e.gid===keepGid;}),S.teamId).catch(function(){});
    SB.upsertPitRuns(S.pit_runs.filter(function(e){return e.gid===keepGid;}),S.teamId).catch(function(){});
    SB.deleteGame(removeGid).catch(function(){});
  }
  closeModal();toast('경기 병합 완료','ok');r();
}

      :'';

      +'<button onclick="mergeGames(\''+keep+'\',\''+remove+'\')" style="'+btnStyle+'">'+label+'로 병합 (나머지 삭제)</button>'
      +'</div>';
  };
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'
    +'<h3>중복 경기 처리</h3>'
    +'<div style="font-size:13px;color:var(--txt2);margin-bottom:4px">'+esc(g1.date)+' vs '+esc(g1.opp)+'</div>'
    +'<div style="font-size:11px;color:var(--txt2);margin-bottom:12px">⭐ 추천 = 기록자/감독 우선 또는 기록 수 많은 경기</div>'
    +card('경기 A',gid1,gid2,b1,p1,g1,rec1)
    +card('경기 B',gid2,gid1,b2,p2,g2,!rec1)
    +'<button class="mcancel" onclick="closeModal()" style="width:100%;margin-top:4px">취소</button>'
    +'</div></div>';
}

function confirmEditPlayer(no){
  const nn=parseInt(document.getElementById('ep-no').value);
  const nm=document.getElementById('ep-name').value.trim();
  const np=document.getElementById('ep-pos').value.trim();
  const canBat=document.getElementById('ep-bat').checked;
  const canPitch=document.getElementById('ep-pit').checked;
  if(!nm){toast('이름을 입력해주세요','err');return;}
  const idx=ROSTER.findIndex(x=>x.no===no);
  if(idx>=0)ROSTER[idx]={...ROSTER[idx],no:isNaN(nn)?no:nn,name:nm,pos:np,canBat:canBat,canPitch:canPitch};
  S.rosterDirty=true;save();closeModal();
  if(window.SupabaseClient&&S.teamId)SB.upsertRoster(ROSTER,S.teamId).catch(function(){});
  r();toast(nm+' 저장 완료','ok');
}
function deletePlayer(no){
  if(!confirm('이 선수를 삭제하시겠습니까?'))return;
  const idx=ROSTER.findIndex(x=>x.no===no);
  if(idx>=0)ROSTER.splice(idx,1);
  S.rosterDirty=true;save();closeModal();
  if(window.SupabaseClient&&S.teamId)SB.upsertRoster(ROSTER,S.teamId).catch(function(){});
  r();toast('삭제 완료');
}

function confirmAddPlayer(){
  const no=parseInt(document.getElementById('ap-no').value)||0;
  const name=document.getElementById('ap-name').value.trim();
  const pos=document.getElementById('ap-pos').value.trim();
  const canBat=document.getElementById('ap-bat').checked;
  const canPitch=document.getElementById('ap-pit').checked;
  if(!name){toast('이름을 입력해주세요','err');return;}
  if(ROSTER.find(x=>x.no===no)){toast('이미 등록된 번호입니다','err');return;}
  ROSTER.push({no,name,pos,canBat,canPitch,inviteCode:null});
  ROSTER.sort((a,b)=>a.no-b.no);
  S.rosterDirty=true;save();closeModal();
  if(window.SupabaseClient&&S.teamId)SB.upsertRoster(ROSTER,S.teamId).catch(function(){});
  r();toast(name+' 추가 완료','ok');
}

function confirmEditGame(gid){
  const d=document.getElementById('m-date').value.trim();
  const o=document.getElementById('m-opp').value.trim();
  const t=document.getElementById('m-gtype').value||'O';
  if(!d||!o){toast('날짜와 상대팀을 입력해주세요','err');return;}
  // S.games 업데이트 (없으면 추가)
  var g=S.games.find(function(x){return x.id===gid;});
  if(g){g.date=d;g.opp=o;g.type=t;}
  else{S.games.push({id:gid,no:S.gcnt++,date:d,opp:o,type:t});}
  // blog/pit_bf/pit_runs의 date·opp도 동기화
  [S.blog,S.pit_bf,S.pit_runs].forEach(function(arr){
    arr.filter(function(e){return e.gid===gid;}).forEach(function(e){e.date=d;e.opp=o;});
  });
  // 수정된 경기가 재동기화되도록 syncedIds에서 제거
  S.syncedIds.delete('g_'+gid);
  S.blog.filter(function(e){return e.gid===gid;}).forEach(function(e){S.syncedIds.delete(e.id);});
  S.pit_bf.filter(function(e){return e.gid===gid;}).forEach(function(e){S.syncedIds.delete(e.id);});
  // 이 경기를 선택 상태로 + 해당 월로 이동
  S.logGameId=gid;
  S.calMonth=d.slice(0,7);
  save();closeModal();renderCt();toast('경기 정보가 수정됐습니다','ok');
}

function doCreateGame(d,o,t){
  S.game={id:UID(),no:S.gcnt++,date:d,opp:o,type:t,recordedBy:S.role||'admin',status:'active'};
  S.games.push({...S.game});
  S.downloadedGids.add(S.game.id);
  S.curPit=null;S.bases={b1:null,b2:null,b3:null};S.outs=0;S.inning=1;S.topBot='top';save();closeModal();r();toast('vs '+o+' '+(t==='P'?'연습':'정식')+'경기 시작!');
  if(window.SupabaseClient&&S.teamId){SB.upsertGame(S.game,S.teamId).catch(function(e){console.warn('[SB]game',e);});}
  if(S.scriptUrl&&navigator.onLine){
    pushGamesOnly().then(function(res){if(res.ok&&res.pushed)console.log('game auto-pushed');});
    lockGame(S.game.id);

function resumeExistingGame(gid){
  const g=S.games.find(function(x){return x.id===gid;});
  if(!g)return;

function forceCreateGame(){
